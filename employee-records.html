<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e0e0e5">
<title>Employee Records - PedroEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:       #e0e0e5;
  --bg2:      #e8e8ed;
  --shadow-d: #b8b9be;
  --shadow-l: #ffffff;
  --text:     #2a2a2e;
  --text2:    #777;
  --text3:    #aaa;
  --red:      #B32533;
  --red-d:    #8f1e29;
  --card:     #e0e0e5;
  --green:    #27ae60;
  --blue:     #3498db;
  --orange:   #e67e22;
  --purple:   #9b59b6;

  --neu-out:  6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
  --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs:   3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
}

body.dark {
  --bg:       #1e1e24;
  --bg2:      #252530;
  --shadow-d: #0a0a0e;
  --shadow-l: #2a2a32;
  --text:     #e8e8ec;
  --text2:    #888;
  --text3:    #555;
  --card:     #1e1e24;
  --green:    #2ecc71;
  --blue:     #5dade2;
  --orange:   #f39c12;
  --purple:   #b19cd9;

  --neu-out:  6px 6px 16px var(--shadow-d), -2px -2px 8px var(--shadow-l);
  --neu-in:   inset 5px 5px 12px var(--shadow-d), inset -2px -2px 8px var(--shadow-l);
  --neu-sm:   5px 5px 12px var(--shadow-d), -2px -2px 8px var(--shadow-l);
  --neu-xs:   4px 4px 10px var(--shadow-d), -2px -2px 6px var(--shadow-l);
}

body.dark .sig-canvas {
  background: #ffffff;
  border: 1px solid #3a3a42;
}

body.dark .img-upload-box {
  border-color: #3a3a42;
  background: #252530;
}

body.dark .img-upload-box:hover {
  border-color: var(--red);
}

body.dark .modal {
  background: rgba(0, 0, 0, 0.85);
}

body.dark .form-input,
body.dark .form-select,
body.dark .form-textarea {
  background: #252530;
  color: var(--text);
  border: 1px solid #3a3a42;
}

body.dark .form-input::placeholder,
body.dark .form-textarea::placeholder {
  color: var(--text3);
}

body.dark .form-input:focus,
body.dark .form-select:focus,
body.dark .form-textarea:focus {
  outline: 2px solid var(--red);
  outline-offset: 2px;
  border-color: var(--red);
}

body.dark .record-card {
  background: #252530;
}

body.dark .calendar,
body.dark .report-header,
body.dark .stat-card {
  background: #252530;
}

body.dark .cal-day {
  background: #1e1e24;
}

body.dark .cal-day.today {
  background: #252530;
}

body.dark .tabs {
  background: #252530;
}

body.dark .tab.active {
  background: #1e1e24;
}

body.dark .filter-chip {
  background: #252530;
}

body.dark .filter-chip.active {
  background: #1e1e24;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.4s,color 0.4s }

.topbar {
  background: var(--bg);
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
  padding-top: calc(env(safe-area-inset-top,0px) + 14px);
  flex-shrink:0;
  box-shadow: 0 3px 10px rgba(0,0,0,0.07);
  position:sticky; top:0; z-index:50;
}
body.dark .topbar { box-shadow: 0 3px 10px rgba(0,0,0,0.3) }

.tb-left { display:flex; align-items:center; gap:12px }
.tb-back {
  width:36px; height:36px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
}
.tb-back:active { box-shadow:var(--neu-in) }

.tb-title { font-size:16px; font-weight:700; color:var(--text) }

.tb-right { display:flex; align-items:center; gap:12px }
.tb-icon-btn {
  width:36px; height:36px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
  position:relative;
}
.tb-icon-btn:active { box-shadow:var(--neu-in) }
.tb-icon-btn svg { width:18px; height:18px }

.notif-badge {
  position:absolute; top:-4px; right:-4px;
  background:var(--red); color:#fff;
  font-size:9px; font-weight:700;
  width:16px; height:16px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}

.page-wrap {
  flex:1; 
  overflow-y:auto; 
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:16px; 
  padding-bottom:120px;
  height: calc(100vh - 70px - 60px - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px));
}

.tabs {
  display:flex; gap:8px; margin-bottom:16px;
  background:var(--bg); border-radius:16px;
  padding:6px; box-shadow:var(--neu-in);
}
.tab {
  flex:1; padding:10px 16px; border-radius:12px;
  font-size:13px; font-weight:600; text-align:center;
  cursor:pointer; border:none; background:transparent;
  color:var(--text2); font-family:'Inter',sans-serif;
  transition:all 0.2s;
}
.tab.active {
  background:var(--bg); color:var(--red);
  box-shadow:var(--neu-sm);
}

.filter-bar {
  display:flex; gap:8px; margin-bottom:16px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  padding-bottom:4px;
}
.filter-bar::-webkit-scrollbar { display:none }

.filter-chip {
  padding:8px 16px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  font-size:12px; font-weight:600; color:var(--text2);
  white-space:nowrap; cursor:pointer; border:none;
  font-family:'Inter',sans-serif;
}
.filter-chip.active {
  box-shadow:var(--neu-in); color:var(--red);
}

.records-list { display:flex; flex-direction:column; gap:12px; margin-bottom:40px; }

.record-card {
  background:var(--bg); border-radius:16px;
  box-shadow:var(--neu-out); padding:14px;
  cursor:pointer; transition:all 0.15s;
  border-left:4px solid transparent;
}
.record-card:active { box-shadow:var(--neu-in); transform:scale(0.98) }

.record-card.pod-liquidated { border-left-color:var(--blue) }
.record-card.pod-pending { border-left-color:var(--orange) }
.record-card.crates-liquidated { border-left-color:var(--green) }
.record-card.crates-pending { border-left-color:var(--red) }
.record-card.others-liquidated { border-left-color:var(--purple) }
.record-card.others-pending { border-left-color:var(--orange) }

.record-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:10px;
}
.record-title { font-size:14px; font-weight:700; color:var(--text) }
.record-badge {
  padding:4px 10px; border-radius:8px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.5px;
}
.badge-liquidated { background:rgba(46,204,113,0.2); color:var(--green) }
.badge-pending { background:rgba(231,76,60,0.2); color:var(--red) }

.record-meta {
  display:flex; flex-direction:column; gap:6px;
  font-size:12px; color:var(--text2);
}
.record-meta-row {
  display:flex; align-items:center; gap:8px;
}
.record-meta-row svg { width:14px; height:14px; flex-shrink:0 }

.btn-delete {
  width:100%; padding:14px; border-radius:12px;
  font-size:14px; font-weight:700; text-align:center;
  cursor:pointer; border:none; font-family:'Inter',sans-serif;
  background:var(--red); color:#fff;
  box-shadow:0 4px 12px rgba(179,37,51,0.3);
  margin-top:12px;
}
.btn-delete:active { transform:scale(0.97) }

.fab {
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom,0px));
  right:20px;
  width:56px; height:56px; border-radius:50%;
  background:var(--red); color:#fff;
  box-shadow:0 6px 20px rgba(179,37,51,0.4);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; z-index:45;
  transition:all 0.2s;
}
.fab:active { transform:scale(0.92) }
.fab svg { width:24px; height:24px }

.modal {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.6);
  display:none; align-items:flex-end;
  animation:fadeIn 0.2s;
}
.modal.active { display:flex }
.modal.fullscreen { align-items:center; justify-content:center }

@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

.modal-content {
  background:var(--bg); width:100%;
  border-radius:24px 24px 0 0;
  padding:24px; padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
  max-height:90vh; overflow-y:auto;
  animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
}

.modal.fullscreen .modal-content {
  border-radius:24px;
  max-width:100%;
  width:100%;
  max-height:100vh;
  height:100vh;
  padding:20px;
  overflow-y:auto;
  animation:zoomIn 0.3s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
@keyframes zoomIn { from { transform:scale(0.95); opacity:0 } to { transform:scale(1); opacity:1 } }

.modal-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px;
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:10;
  padding-bottom:10px;
}
.modal-title { font-size:18px; font-weight:700; color:var(--text) }
.modal-close {
  width:32px; height:32px; border-radius:50%;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
}
.modal-close:active { box-shadow:var(--neu-in) }

.form-group { margin-bottom:18px }
.form-label {
  display:block; font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:1px;
  color:var(--text3); margin-bottom:8px;
}
.form-input, .form-select, .form-textarea {
  width:100%; padding:14px 16px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-in);
  border:none; font-size:14px; color:var(--text);
  font-family:'Inter',sans-serif;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline:2px solid var(--red); outline-offset:2px;
}
.form-textarea { resize:vertical; min-height:80px }

.radio-group {
  display:flex; gap:12px;
}
.radio-btn {
  flex:1; padding:12px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  text-align:center; font-size:13px; font-weight:600;
  color:var(--text2); cursor:pointer; border:none;
  font-family:'Inter',sans-serif; transition:all 0.2s;
}
.radio-btn.active {
  box-shadow:var(--neu-in); color:var(--red);
}

.sig-container {
  background:var(--bg2); border-radius:12px;
  box-shadow:var(--neu-in); padding:12px;
  margin-bottom:18px;
}
.sig-canvas {
  width:100%; 
  height:120px; 
  border-radius:8px;
  background:#fff; 
  cursor:crosshair;
  touch-action:none;
  display:block;
  border:1px solid #ddd;
}
.sig-actions {
  display:flex; gap:8px; margin-top:8px;
}
.sig-btn {
  flex:1; padding:8px; border-radius:8px;
  background:var(--bg); box-shadow:var(--neu-sm);
  font-size:12px; font-weight:600; color:var(--text2);
  border:none; cursor:pointer; font-family:'Inter',sans-serif;
}
.sig-btn:active { box-shadow:var(--neu-in) }

.sig-display {
  width:100%; 
  max-height:120px;
  border-radius:8px; 
  background:#fff;
  display:block; 
  object-fit:contain;
  border:1px solid #ddd;
  padding:8px;
}

.img-upload-box {
  background:var(--bg); border-radius:12px;
  box-shadow:var(--neu-in); padding:20px;
  text-align:center; cursor:pointer;
  border:2px dashed var(--text3);
  transition:all 0.2s;
}
.img-upload-box:hover { border-color:var(--red) }
.img-upload-box svg { width:32px; height:32px; color:var(--text3); margin-bottom:8px }
.img-upload-box p { font-size:12px; color:var(--text2) }

.img-preview {
  margin-top:12px; border-radius:12px; overflow:hidden;
  box-shadow:var(--neu-sm); position:relative;
}
.img-preview img { width:100%; display:block; max-height:200px; object-fit:contain }
.img-remove {
  position:absolute; top:8px; right:8px;
  width:28px; height:28px; border-radius:50%;
  background:var(--red); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; font-weight:700;
}

.btn {
  width:100%; padding:16px; border-radius:12px;
  font-size:15px; font-weight:700; text-align:center;
  cursor:pointer; border:none; font-family:'Inter',sans-serif;
  transition:all 0.15s;
}
.btn-primary {
  background:var(--red); color:#fff;
  box-shadow:0 4px 12px rgba(179,37,51,0.3);
}
.btn-primary:active { transform:scale(0.97) }

.btn-secondary {
  background:var(--bg); color:var(--text);
  box-shadow:var(--neu-sm);
}
.btn-secondary:active { box-shadow:var(--neu-in) }

.calendar {
  background:var(--bg); border-radius:16px;
  box-shadow:var(--neu-out); padding:20px;
  margin-bottom:16px;
}
.cal-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px;
}
.cal-month { font-size:18px; font-weight:700; color:var(--text) }
.cal-nav {
  display:flex; gap:8px;
}
.cal-nav-btn {
  width:36px; height:36px; border-radius:10px;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
  font-size:18px;
}
.cal-nav-btn:active { box-shadow:var(--neu-in) }

.cal-grid {
  display:grid; 
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}
.cal-day-label {
  text-align:center; font-size:11px; font-weight:700;
  color:var(--text3); text-transform:uppercase;
  padding:10px 0;
  letter-spacing:0.5px;
}
.cal-day {
  min-height: 90px;
  max-height: 90px;
  overflow: hidden;
  border-radius: 10px;
  background: var(--bg);
  box-shadow: var(--neu-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 4px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  position: relative;
}
.cal-day:active { box-shadow:var(--neu-in) }
.cal-day.today { 
  color:var(--red); 
  box-shadow:var(--neu-in);
  font-weight:700;
}

.cal-day-number {
  margin-bottom: 4px;  /* ⬇️ Bawasan from 6px */
  font-size: 14px;     /* ⬇️ Bawasan from 15px */
  flex-shrink: 0;      /* ✨ BAGO - prevent shrinking */
}

.cal-day-entries {
  display: flex; 
  flex-direction: column; 
  gap: 2px;  /* ⬇️ Bawasan from 3px */
  width: 100%;
  align-items: center;
  overflow: hidden;  /* ✨ Nandito na to */
  flex: 1;           /* ✨ KAILANGAN ITO - take remaining space */
  min-height: 0;     /* ✨ BAGO - critical for overflow to work */
}
.cal-entry {
  font-size:7px; font-weight:700;
  padding:2px 4px; border-radius:3px;
  text-align:center; 
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
  line-height: 1.2;  
}
.cal-entry.pod { background:rgba(52,152,219,0.3); color:var(--blue) }
.cal-entry.crates { background:rgba(39,174,96,0.3); color:var(--green) }
.cal-entry.others { background:rgba(155,89,182,0.3); color:var(--purple) }

.report-section {
  margin-bottom:24px;
}

.report-period-selector {
  display:flex; gap:12px; margin-bottom:24px;
  justify-content:center;
}

.period-btn {
  padding:12px 24px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  font-size:13px; font-weight:600; color:var(--text2);
  cursor:pointer; border:none;
  font-family:'Inter',sans-serif;
  transition:all 0.2s;
}
.period-btn.active {
  box-shadow:var(--neu-in); color:var(--red);
}

.report-stats-grid {
  display:grid; 
  grid-template-columns:repeat(3, 1fr);
  gap:16px; 
  margin-bottom:24px;
}

.stat-card {
  background:var(--bg); border-radius:16px;
  box-shadow:var(--neu-out); padding:20px;
  text-align:center;
}
.stat-label { 
  font-size:11px; font-weight:600; 
  text-transform:uppercase; letter-spacing:1px; 
  color:var(--text3); margin-bottom:12px 
}
.stat-value { 
  font-size:32px; font-weight:700; 
  color:var(--red); line-height:1;
  margin-bottom:8px;
}
.stat-sub { font-size:12px; color:var(--text2) }

.report-columns {
  display:flex;
  flex-direction:column;
  gap:24px;
  margin-bottom:24px;
}

.report-column {
  background:var(--bg); border-radius:16px;
  box-shadow:var(--neu-out); padding:20px;
}

.report-column-header {
  display:flex; align-items:center; gap:12px;
  margin-bottom:16px;
  padding-bottom:16px;
  border-bottom:2px solid var(--bg2);
}

.report-column-icon {
  width:48px; height:48px;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.report-column-icon.pod { background:rgba(52,152,219,0.2); color:var(--blue) }
.report-column-icon.crates { background:rgba(39,174,96,0.2); color:var(--green) }

.report-column-title {
  flex:1;
}
.report-column-name {
  font-size:18px; font-weight:700; color:var(--text);
}
.report-column-count {
  font-size:12px; color:var(--text2);
}

.report-list {
  display:flex; flex-direction:column; gap:12px;
}

.report-employee-card {
  background:var(--bg2); border-radius:12px;
  padding:14px;
}

.report-emp-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px;
}

.report-emp-name {
  font-size:14px; font-weight:700; color:var(--text);
}

.report-emp-badge {
  padding:4px 10px; border-radius:6px;
  font-size:11px; font-weight:700;
}
.report-emp-badge.good { background:rgba(46,204,113,0.2); color:var(--green) }
.report-emp-badge.warning { background:rgba(230,126,34,0.2); color:var(--orange) }
.report-emp-badge.bad { background:rgba(231,76,60,0.2); color:var(--red) }

.report-emp-details {
  font-size:12px; color:var(--text2);
  display:flex; flex-direction:column; gap:4px;
}

.performance-section {
  margin-top:24px;
  padding-top:24px;
  border-top:2px solid var(--bg2);
}

.performance-title {
  font-size:16px; font-weight:700; color:var(--text);
  margin-bottom:16px;
}

.performance-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
  gap:12px;
}

.performance-card {
  background:var(--bg2); border-radius:12px;
  padding:14px;
  cursor:pointer;
  transition:all 0.2s;
}
.performance-card:hover {
  box-shadow:var(--neu-sm);
}

.perf-emp-name {
  font-size:13px; font-weight:700; color:var(--text);
  margin-bottom:8px;
}

.perf-stats {
  display:flex; flex-direction:column; gap:6px;
  font-size:11px; color:var(--text2);
}

.perf-stat-row {
  display:flex; justify-content:space-between; align-items:center;
}

.perf-stat-label {
  display:flex; align-items:center; gap:6px;
}

.perf-stat-value {
  font-weight:700;
}
.perf-stat-value.good { color:var(--green) }
.perf-stat-value.warning { color:var(--orange) }
.perf-stat-value.bad { color:var(--red) }

.detail-section {
  margin-bottom:20px;
}
.detail-label {
  font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:1px;

.notif-modal {

.notif-content {

.notif-header {

  padding-bottom:16px;

}

.notif-icon {

.toast {
  position:fixed;

  box-shadow:var(--neu-out);
  border-left:3px solid var(--red);
  padding:13px 22px; font-size:13px; font-weight:500; color:var(--text);
  z-index:300; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.toast.show { opacity:1 }

.ptr-indicator {
  position:fixed;
  top:calc(env(safe-area-inset-top,0px) + 60px);

.bottom-nav {

</style>

<script>
const CLIENT_ID = '1028149041464-hpb4dhisjl1o4fgluiqthi4m89ri3o8m.apps.googleusercontent.com';
const SHEET_ID  = '174cZS7GPowtmwykUd3JccGqxdGSApUKwNLTDPeulb2U';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';

let token = null;
let records = [];
let employees = [];
let trucks = [];
let currentFilter = 'all';
let currentMonth = new Date();
let sigCanvas, sigCtx;
let uploadedImage = null;
let reportPeriod = 'weekly';
let calendarFilter = 'pod';
let currentSignature = null;
let isDrawing = false;
let currentEditId = null;

(function init() {
  const savedToken = localStorage.getItem('pedroex-token');
  const expiry = localStorage.getItem('pedroex-token-expiry');
  
  if (!savedToken || !expiry || Date.now() >= parseInt(expiry)) {
    location.href = 'index.html';
    return;
  }
  
  token = savedToken;
  applyTheme(localStorage.getItem('pedroex-theme') === 'dark');
  
  // ✅ Role-based access — mula sa localStorage na na-save ng index.html
  const role = (localStorage.getItem('pedroex-role') || '').toLowerCase();
  const isAdmin = role === 'admin';
  

  
  sigCanvas = document.getElementById('sig-canvas');
  sigCtx = sigCanvas.getContext('2d');
  
  loadEmployees();
  loadTrucks();
  loadRecords();
  
  initPullToRefresh(document.getElementById('page-wrap'), function(done) {
    loadRecords();
    setTimeout(done, 1000);
  });
  
  checkReminders();
  setInterval(checkReminders, 60000);
})();

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('pedroex-theme', isDark ? 'dark' : 'light');
}

function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  
  if (tab === 'calendar') {
    setTimeout(() => renderCalendar(), 100);
  }
}

function changeReportPeriod(period) {
  reportPeriod = period;
  document.querySelectorAll('.period-btn').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-period="${period}"]`).classList.add('active');
  loadReport();
}

function filterCalendar(type) {
  calendarFilter = type;
  document.querySelectorAll('[data-cal-filter]').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-cal-filter="${type}"]`).classList.add('active');
  renderCalendar();
}

function loadEmployees() {
  fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Employees!A2:C`, {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    employees = (res.values || []).map(r => ({
      email: r[0] || '',
      firstName: r[1] || '',
      lastName: r[2] || ''
    }));
    
    const sel = document.getElementById('emp-name');
    sel.innerHTML = '<option value="">Select employee...</option>' + 
      employees.map(e => {
        const fullName = `${e.firstName} ${e.lastName}`;
        return `<option value="${fullName}">${fullName}</option>`;
      }).join('');
  })
  .catch(() => showToast('❌ Error loading employees'));
}

function loadTrucks() {
  fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Truck%20Roster!B2:D`, {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    trucks = (res.values || []).map(r => ({
      plate: r[0] || '',
      lto: r[1] || '',
      nmis: r[2] || ''
    }));
    
    const sel = document.getElementById('rec-truck');
    sel.innerHTML = '<option value="">Select truck...</option>' + 
      trucks.map(t => `<option value="${t.plate}">${t.plate}</option>`).join('');
  })
  .catch(() => showToast('❌ Error loading trucks'));
}

// Line ~750 — TANGGALIN ang filtering logic
function loadRecords() {
  fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Records!A2:K`, {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    // ✅ SIMPLE LANG — no filtering
    records = (res.values || []).filter(r => r && r[1]).map((r, i) => ({
      id: r[0],
      empName: r[1] || '',
      date: r[2] || '',
      truck: r[3] || '',
      docType: r[4] || '',
      number: r[5] || '',
      liquidated: r[6] || 'No',
      ackBy: r[7] || '',
      signature: r[8] || '',
      picture: r[9] || '',
      comments: r[10] || ''
    }));
    
    console.log('Records loaded:', records.length);
    renderRecords();
    updateNotifications();
  })
  .catch(() => showToast('❌ Error loading records'));
}


function renderRecords() {
  const list = document.getElementById('records-list');
  let filtered = records;
  
  if (currentFilter === 'pod') filtered = records.filter(r => r.docType === 'Proof of Deliveries');
  else if (currentFilter === 'crates') filtered = records.filter(r => r.docType === 'Crates');
  else if (currentFilter === 'others') filtered = records.filter(r => r.docType === 'Others');
  else if (currentFilter === 'pending') filtered = records.filter(r => r.liquidated === 'No');
  else if (currentFilter === 'liquidated') filtered = records.filter(r => r.liquidated === 'Yes');
  
  if (filtered.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px 0">No records found</p>';
    return;
  }
  
  list.innerHTML = filtered.map(r => {
    const isPOD = r.docType === 'Proof of Deliveries';
    const isCrates = r.docType === 'Crates';
    const isOthers = r.docType === 'Others';
    const isLiq = r.liquidated === 'Yes';
    
    let cardClass = 'record-card';
    if (isPOD && isLiq) cardClass += ' pod-liquidated';
    else if (isPOD && !isLiq) cardClass += ' pod-pending';
    else if (isCrates && isLiq) cardClass += ' crates-liquidated';
    else if (isCrates && !isLiq) cardClass += ' crates-pending';
    else if (isOthers && isLiq) cardClass += ' others-liquidated';
    else if (isOthers && !isLiq) cardClass += ' others-pending';
    
    return `
      <div class="${cardClass}" onclick="viewRecordDetail(${r.id})">
        <div class="record-header">

function setupSignaturePad() {
  let drawing = false;
  let lastX = 0;
  let lastY = 0;
  
  const canvas = document.getElementById('sig-canvas');
  const ctx = canvas.getContext('2d');
  
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: (touch.clientX - rect.left) * (canvas.width / rect.width),
      y: (touch.clientY - rect.top) * (canvas.height / rect.height)
    };
  }
  
  canvas.addEventListener('mousedown', function(e) {
    drawing = true;
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    currentSignature = null;
  });
  
  canvas.addEventListener('mousemove', function(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    
    lastX = pos.x;
    lastY = pos.y;
  });
  
  canvas.addEventListener('mouseup', function() {
    drawing = false;
  });
  
  canvas.addEventListener('mouseleave', function() {
    drawing = false;
  });
  
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    drawing = true;
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    currentSignature = null;
  }, { passive: false });
  
  canvas.addEventListener('touchmove', function(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    
    lastX = pos.x;
    lastY = pos.y;
  }, { passive: false });
  
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    drawing = false;
  }, { passive: false });
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const compressed = compressImage(event.target.result, 100);
      
      uploadedImage = compressed;
      document.getElementById('preview-img').src = compressed;
      document.getElementById('img-preview').style.display = 'block';
      document.getElementById('upload-box').style.display = 'none';
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}

function compressImage(dataUrl, maxKB) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  
  img.src = dataUrl;
  
  let width = img.width;
  let height = img.height;
  const maxSize = 800;
  
  if (width > height && width > maxSize) {
    height *= maxSize / width;
    width = maxSize;
  } else if (height > maxSize) {
    width *= maxSize / height;
    height = maxSize;
  }
  
  canvas.width = width;
  canvas.height = height;
  ctx.drawImage(img, 0, 0, width, height);
  
  let quality = 0.7;
  let result = canvas.toDataURL('image/jpeg', quality);
  
  while (result.length / 1024 > maxKB && quality > 0.1) {
    quality -= 0.1;
    result = canvas.toDataURL('image/jpeg', quality);
  }
  
  return result;
}

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  document.getElementById('cal-month').textContent = 
    currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    .map(d => `<div class="cal-day-label">${d}</div>`).join('');
  
  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += '<div></div>';
  }
  
  const today = new Date();
  for (let day = 1; day <= daysInMonth; day++) {
    const date = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    
    const dayRecords = records.filter(r => {
      if (calendarFilter === 'pod') return r.date === date && r.docType === 'Proof of Deliveries';
      if (calendarFilter === 'crates') return r.date === date && r.docType === 'Crates';
      if (calendarFilter === 'others') return r.date === date && r.docType === 'Others';
      return false;
    });
    
    const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    
    const entriesHTML = dayRecords.slice(0, 2).map(r => {
      const firstName = r.empName.split(' ')[0];
      let entryClass = calendarFilter;
      return `<div class="cal-entry ${entryClass}">${firstName}</div>`;
    }).join('');
    
    const moreCount = dayRecords.length > 2 ? `<div class="cal-entry" style="background:var(--text3);color:#fff">+${dayRecords.length - 2}</div>` : '';
    
    grid.innerHTML += `
      <div class="cal-day ${isToday ? 'today' : ''}" onclick="showDayRecords('${date}')">
        <div class="cal-day-number">${day}</div>
        <div class="cal-day-entries">
          ${entriesHTML}
          ${moreCount}
        </div>
      </div>
    `;
  }
}

function loadReport() {

    startDate = new Date(now);
    startDate.setDate(now.getDate() - now.getDay());
    endDate = new Date(startDate);
    endDate.setDate(startDate.getDate() + 6);
    
    document.getElementById('report-period-text').textContent = 
      `Week of ${startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
    
  } else if (reportPeriod === 'fortnightly') {
    startDate = new Date(now);
    startDate.setDate(now.getDate() - 13);
    endDate = new Date(now);
    
    document.getElementById('report-period-text').textContent = 
      `${startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
    
  } else if (reportPeriod === 'monthly') {
    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
    endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    
    document.getElementById('report-period-text').textContent = 
      `${startDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;

    const d = new Date(r.date);

          else if (percentage < 80) badgeClass = 'warning';
          
          return `
            <div class="report-employee-card">
              <div class="report-emp-header">
                <div class="report-emp-name">${emp}</div>
                <div class="report-emp-badge ${badgeClass}">${empLiq}/${empRecords.length}</div>
              </div>
              <div class="report-emp-details">
                <div>Performance: ${percentage}%</div>
                <div>Liquidated: ${empLiq} | Pending: ${empRecords.length - empLiq}</div>
              </div>
            </div>
          `;
        }).join('') || '<p style="text-align:center;color:var(--text2);padding:20px 0">No Crates records</p>'}
      </div>
    </div>
  `;
  
  document.getElementById('report-columns').innerHTML = columnsHTML;
  
  const allEmployees = new Set([...Object.keys(podByEmployee), ...Object.keys(cratesByEmployee)]);
  
  const performanceHTML = Array.from(allEmployees).map(emp => {
    const podRecs = podByEmployee[emp] || [];
    const cratesRecs = cratesByEmployee[emp] || [];
    
    const podLiq = podRecs.filter(r => r.liquidated === 'Yes').length;
    const cratesLiq = cratesRecs.filter(r => r.liquidated === 'Yes').length;
    
    const podPerf = podRecs.length > 0 ? Math.round((podLiq / podRecs.length) * 100) : 0;
    const cratesPerf = cratesRecs.length > 0 ? Math.round((cratesLiq / cratesRecs.length) * 100) : 0;
    
    function getPerfClass(perf) {
      if (perf >= 80) return 'good';
      if (perf >= 50) return 'warning';
      return 'bad';
    }
    
    return `
      <div class="performance-card">
        <div class="perf-emp-name">${emp}</div>
        <div class="perf-stats">
          <div class="perf-stat-row">
            <div class="perf-stat-label">
              <span>📄 POD:</span>
            </div>
            <div class="perf-stat-value ${getPerfClass(podPerf)}">${podLiq}/${podRecs.length} (${podPerf}%)</div>
          </div>
          <div class="perf-stat-row">
            <div class="perf-stat-label">
              <span>📦 Crates:</span>
            </div>
            <div class="perf-stat-value ${getPerfClass(cratesPerf)}">${cratesLiq}/${cratesRecs.length} (${cratesPerf}%)</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  document.getElementById('performance-grid').innerHTML = performanceHTML || '<p style="text-align:center;color:var(--text2);padding:20px 0">No performance data</p>';
}

function updateNotifications() {
  checkReminders();
}

function checkReminders() {
  const now = new Date();
  const pending = records.filter(r => r.liquidated === 'No');
  
  let podCount = 0;
  let cratesCount = 0;
  
  pending.forEach(r => {
    const recDate = new Date(r.date);
    
    if (r.docType === 'Proof of Deliveries') {
      let dueDate = new Date(recDate);
      dueDate.setDate(recDate.getDate() + 1);
      
      if (dueDate.getDay() === 0) dueDate.setDate(dueDate.getDate() + 1);
      if (dueDate.getDay() === 6) dueDate.setDate(dueDate.getDate() + 2);
      
      if (dueDate <= now) {
        podCount++;
      }
    }
    
    if (r.docType === 'Crates') {
      const daysSince = Math.floor((now - recDate) / (1000 * 60 * 60 * 24));
      if (daysSince >= 7) {
        cratesCount++;
      }
    }
  });
  
  const totalNotif = podCount + cratesCount;
  const badge = document.getElementById('notif-count');
  
  if (totalNotif > 0) {
    badge.textContent = totalNotif;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function showNotifications() {
  const now = new Date();
  const pending = records.filter(r => r.liquidated === 'No');
  
  let messages = [];
  
  pending.forEach(r => {
    const recDate = new Date(r.date);
    
    if (r.docType === 'Proof of Deliveries') {
      let dueDate = new Date(recDate);
      dueDate.setDate(recDate.getDate() + 1);
      
      if (dueDate.getDay() === 0) dueDate.setDate(dueDate.getDate() + 1);
      if (dueDate.getDay() === 6) dueDate.setDate(dueDate.getDate() + 2);
      
      if (dueDate <= now) {
        const daysOverdue = Math.floor((now - dueDate) / (1000 * 60 * 60 * 24));
        messages.push({
          icon: '📄',
          text: `POD${r.number ? ' #' + r.number : ''} (${r.empName})`,
          meta: daysOverdue === 0 ? 'Due today' : `Overdue ${daysOverdue} days`
        });
      }
    }
    
    if (r.docType === 'Crates') {
      const daysSince = Math.floor((now - recDate) / (1000 * 60 * 60 * 24));
      if (daysSince >= 7) {
        messages.push({
          icon: '📦',
          text: `Crates${r.number ? ' #' + r.number : ''} (${r.empName})`,
          meta: `Overdue ${daysSince} days`
        });
      }
    }
  });
  
  if (messages.length === 0) {
    showToast('✓ No pending reminders');
    return;
  }
  
  const listHTML = messages.map(m => `
    <div class="notif-item">
      <div class="notif-item-icon">${m.icon}</div>
      <div class="notif-item-content">
        <div class="notif-item-text">${m.text}</div>
        <div class="notif-item-meta">${m.meta}</div>
      </div>
    </div>
  `).join('');
  
  document.getElementById('notif-list').innerHTML = listHTML;
  document.getElementById('notif-modal').classList.add('active');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function initPullToRefresh(el, onRefresh) {
  let startY = 0;
  let pulling = false;
  const threshold = 70;
  const indicator = document.querySelector('.ptr-indicator');
  const spinner = document.getElementById('ptr-spinner');
  
  el.addEventListener('touchstart', function(e) {
    if (el.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });
  
  el.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    const dist = e.touches[0].clientY - startY;
    if (dist < 0) { pulling = false; return; }
    
    const progress = Math.min(dist / threshold, 1);
    indicator.classList.add('visible');
    spinner.style.transform = `rotate(${progress * 360}deg)`;
  }, { passive: true });
  
  el.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    
    const dist = e.changedTouches[0].clientY - startY;
    if (dist >= threshold) {
      spinner.classList.add('spinning');
      onRefresh(function() {
        spinner.classList.remove('spinning');
        indicator.classList.remove('visible');
      });
    } else {
      indicator.classList.remove('visible');
    }
  });
}
