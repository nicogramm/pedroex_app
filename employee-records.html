<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e0e0e5">
<title>Employee Records - PedroEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ═══════════════════════════════════════
   NEUMORPHIC THEME VARIABLES
═══════════════════════════════════════ */
:root {
  --bg:       #e0e0e5;
  --bg2:      #e8e8ed;
  --shadow-d: #b8b9be;
  --shadow-l: #ffffff;
  --text:     #2a2a2e;
  --text2:    #777;
  --text3:    #aaa;
  --red:      #B32533;
  --red-d:    #8f1e29;
  --card:     #e0e0e5;
  --green:    #27ae60;
  --blue:     #3498db;
  --orange:   #e67e22;

  --neu-out:  6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
  --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs:   3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
}

body.dark {
  --bg:       #1e1e24;
  --bg2:      #252530;
  --shadow-d: #0a0a0e;
  --shadow-l: #2a2a32;
  --text:     #e8e8ec;
  --text2:    #888;
  --text3:    #555;
  --card:     #1e1e24;
  --green:    #2ecc71;
  --blue:     #5dade2;
  --orange:   #f39c12;

  --neu-out:  6px 6px 16px var(--shadow-d), -2px -2px 8px var(--shadow-l);
  --neu-in:   inset 5px 5px 12px var(--shadow-d), inset -2px -2px 8px var(--shadow-l);
  --neu-sm:   5px 5px 12px var(--shadow-d), -2px -2px 8px var(--shadow-l);
  --neu-xs:   4px 4px 10px var(--shadow-d), -2px -2px 6px var(--shadow-l);
}

body.dark .sig-canvas {
  background: #ffffff;
  border: 1px solid #3a3a42;
}

body.dark .img-upload-box {
  border-color: #3a3a42;
  background: #252530;
}

body.dark .img-upload-box:hover {
  border-color: var(--red);
}

body.dark .modal {
  background: rgba(0, 0, 0, 0.8);
}

body.dark .form-input,
body.dark .form-select,
body.dark .form-textarea {
  background: #252530;
  color: var(--text);
  border: 1px solid #3a3a42;
}

body.dark .form-input::placeholder,
body.dark .form-textarea::placeholder {
  color: var(--text3);
}

body.dark .form-input:focus,
body.dark .form-select:focus,
body.dark .form-textarea:focus {
  outline: 2px solid var(--red);
  outline-offset: 2px;
  border-color: var(--red);
}

body.dark .record-card {
  background: #252530;
}

body.dark .calendar,
body.dark .report-header,
body.dark .stat-card {
  background: #252530;
}

body.dark .cal-day {
  background: #1e1e24;
}

body.dark .cal-day.today {
  background: #252530;
}

body.dark .tabs {
  background: #252530;
}

body.dark .tab.active {
  background: #1e1e24;
}

body.dark .filter-chip {
  background: #252530;
}

body.dark .filter-chip.active {
  background: #1e1e24;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.4s,color 0.4s }

.topbar {
  background: var(--bg);
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
  padding-top: calc(env(safe-area-inset-top,0px) + 14px);
  flex-shrink:0;
  box-shadow: 0 3px 10px rgba(0,0,0,0.07);
  position:sticky; top:0; z-index:50;
}
body.dark .topbar { box-shadow: 0 3px 10px rgba(0,0,0,0.3) }

.tb-left { display:flex; align-items:center; gap:12px }
.tb-back {
  width:36px; height:36px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
}
.tb-back:active { box-shadow:var(--neu-in) }

.tb-title { font-size:16px; font-weight:700; color:var(--text) }

.tb-right { display:flex; align-items:center; gap:12px }
.tb-icon-btn {
  width:36px; height:36px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
  position:relative;
}
.tb-icon-btn:active { box-shadow:var(--neu-in) }
.tb-icon-btn svg { width:18px; height:18px }

.notif-badge {
  position:absolute; top:-4px; right:-4px;
  background:var(--red); color:#fff;
  font-size:9px; font-weight:700;
  width:16px; height:16px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}

.page-wrap {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:16px; padding-bottom:90px;
}

.tabs {
  display:flex; gap:8px; margin-bottom:16px;
  background:var(--bg); border-radius:16px;
  padding:6px; box-shadow:var(--neu-in);
}
.tab {
  flex:1; padding:10px 16px; border-radius:12px;
  font-size:13px; font-weight:600; text-align:center;
  cursor:pointer; border:none; background:transparent;
  color:var(--text2); font-family:'Inter',sans-serif;
  transition:all 0.2s;
}
.tab.active {
  background:var(--bg); color:var(--red);
  box-shadow:var(--neu-sm);
}

.filter-bar {
  display:flex; gap:8px; margin-bottom:16px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  padding-bottom:4px;
}
.filter-bar::-webkit-scrollbar { display:none }

.filter-chip {
  padding:8px 16px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  font-size:12px; font-weight:600; color:var(--text2);
  white-space:nowrap; cursor:pointer; border:none;
  font-family:'Inter',sans-serif;
}
.filter-chip.active {
  box-shadow:var(--neu-in); color:var(--red);
}

.records-list { display:flex; flex-direction:column; gap:12px }

.record-card {
  background:var(--bg); border-radius:16px;
  box-shadow:var(--neu-out); padding:14px;
  cursor:pointer; transition:all 0.15s;
  border-left:4px solid transparent;
}
.record-card:active { box-shadow:var(--neu-in); transform:scale(0.98) }

.record-card.pod-liquidated { border-left-color:var(--blue) }
.record-card.pod-pending { border-left-color:var(--orange) }
.record-card.crates-liquidated { border-left-color:var(--green) }
.record-card.crates-pending { border-left-color:var(--red) }

.record-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:10px;
}
.record-title { font-size:14px; font-weight:700; color:var(--text) }
.record-badge {
  padding:4px 10px; border-radius:8px;
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.5px;
}
.badge-liquidated { background:rgba(46,204,113,0.2); color:var(--green) }
.badge-pending { background:rgba(231,76,60,0.2); color:var(--red) }

.record-meta {
  display:flex; flex-direction:column; gap:6px;
  font-size:12px; color:var(--text2);
}
.record-meta-row {
  display:flex; align-items:center; gap:8px;
}
.record-meta-row svg { width:14px; height:14px; flex-shrink:0 }

.fab {
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom,0px));
  right:20px;
  width:56px; height:56px; border-radius:50%;
  background:var(--red); color:#fff;
  box-shadow:0 6px 20px rgba(179,37,51,0.4);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; z-index:45;
  transition:all 0.2s;
}
.fab:active { transform:scale(0.92) }
.fab svg { width:24px; height:24px }

.modal {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.5);
  display:none; align-items:flex-end;
  animation:fadeIn 0.2s;
}
.modal.active { display:flex }

@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

.modal-content {
  background:var(--bg); width:100%;
  border-radius:24px 24px 0 0;
  padding:24px; padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
  max-height:90vh; overflow-y:auto;
  animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }

.modal-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:20px;
}
.modal-title { font-size:18px; font-weight:700; color:var(--text) }
.modal-close {
  width:32px; height:32px; border-radius:50%;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
}
.modal-close:active { box-shadow:var(--neu-in) }

.form-group { margin-bottom:18px }
.form-label {
  display:block; font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:1px;
  color:var(--text3); margin-bottom:8px;
}
.form-input, .form-select, .form-textarea {
  width:100%; padding:14px 16px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-in);
  border:none; font-size:14px; color:var(--text);
  font-family:'Inter',sans-serif;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline:2px solid var(--red); outline-offset:2px;
}
.form-textarea { resize:vertical; min-height:80px }

.radio-group {
  display:flex; gap:12px;
}
.radio-btn {
  flex:1; padding:12px; border-radius:12px;
  background:var(--bg); box-shadow:var(--neu-sm);
  text-align:center; font-size:13px; font-weight:600;
  color:var(--text2); cursor:pointer; border:none;
  font-family:'Inter',sans-serif; transition:all 0.2s;
}
.radio-btn.active {
  box-shadow:var(--neu-in); color:var(--red);
}

.sig-container {
  background:var(--bg2); border-radius:12px;
  box-shadow:var(--neu-in); padding:12px;
  margin-bottom:18px;
}
.sig-canvas {
  width:100%; 
  height:150px; 
  border-radius:8px;
  background:#fff; 
  cursor:crosshair;
  touch-action:none;
  display:block;
  border:1px solid #ddd;
}
.sig-actions {
  display:flex; gap:8px; margin-top:8px;
}
.sig-btn {
  flex:1; padding:8px; border-radius:8px;
  background:var(--bg); box-shadow:var(--neu-sm);
  font-size:12px; font-weight:600; color:var(--text2);
  border:none; cursor:pointer; font-family:'Inter',sans-serif;
}
.sig-btn:active { box-shadow:var(--neu-in) }

.img-upload-box {
  background:var(--bg); border-radius:12px;
  box-shadow:var(--neu-in); padding:20px;
  text-align:center; cursor:pointer;
  border:2px dashed var(--text3);
  transition:all 0.2s;
}
.img-upload-box:hover { border-color:var(--red) }
.img-upload-box svg { width:32px; height:32px; color:var(--text3); margin-bottom:8px }
.img-upload-box p { font-size:12px; color:var(--text2) }

.img-preview {
  margin-top:12px; border-radius:12px; overflow:hidden;
  box-shadow:var(--neu-sm); position:relative;
}
.img-preview img { width:100%; display:block }
.img-remove {
  position:absolute; top:8px; right:8px;
  width:28px; height:28px; border-radius:50%;
  background:var(--red); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; font-weight:700;
}

.btn {
  width:100%; padding:16px; border-radius:12px;
  font-size:15px; font-weight:700; text-align:center;
  cursor:pointer; border:none; font-family:'Inter',sans-serif;
  transition:all 0.15s;
}
.btn-primary {
  background:var(--red); color:#fff;
  box-shadow:0 4px 12px rgba(179,37,51,0.3);
}
.btn-primary:active { transform:scale(0.97) }

.btn-secondary {
  background:var(--bg); color:var(--text);
  box-shadow:var(--neu-sm);
}
.btn-secondary:active { box-shadow:var(--neu-in) }

.calendar {
  background:var(--bg); border-radius:16px;
  box-shadow:var(--neu-out); padding:16px;
  margin-bottom:16px;
}
.cal-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:16px;
}
.cal-month { font-size:16px; font-weight:700; color:var(--text) }
.cal-nav {
  display:flex; gap:8px;
}
.cal-nav-btn {
  width:32px; height:32px; border-radius:8px;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; color:var(--text);
}
.cal-nav-btn:active { box-shadow:var(--neu-in) }

.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:8px;
}
.cal-day-label {
  text-align:center; font-size:10px; font-weight:600;
  color:var(--text3); text-transform:uppercase;
  padding:8px 0;
}
.cal-day {
  aspect-ratio:1; border-radius:8px;
  background:var(--bg); box-shadow:var(--neu-sm);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:600; color:var(--text2);
  cursor:pointer; position:relative;
}
.cal-day.today { color:var(--red); box-shadow:var(--neu-in) }
.cal-day.has-record::after {
  content:''; position:absolute; bottom:4px;
  width:4px; height:4px; border-radius:50%;
  background:var(--red);
}

.report-header {
  background:var(--bg); border-radius:16px;
  box-shadow:var(--neu-out); padding:16px;
  margin-bottom:16px;
}
.report-title { font-size:18px; font-weight:700; color:var(--text); margin-bottom:4px }
.report-subtitle { font-size:12px; color:var(--text2) }

.report-stats {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:12px; margin-bottom:16px;
}
.stat-card {
  background:var(--bg); border-radius:12px;
  box-shadow:var(--neu-out); padding:14px;
}
.stat-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:6px }
.stat-value { font-size:24px; font-weight:700; color:var(--red); line-height:1 }
.stat-sub { font-size:10px; color:var(--text2); margin-top:4px }

.toast {
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom,0px));
  left:50%; transform:translateX(-50%);
  background:var(--bg); border-radius:14px;
  box-shadow:var(--neu-out);
  border-left:3px solid var(--red);
  padding:13px 22px; font-size:13px; font-weight:500; color:var(--text);
  z-index:300; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.toast.show { opacity:1 }

.ptr-indicator {
  position:fixed;
  top:calc(env(safe-area-inset-top,0px) + 60px);
  left:50%; transform:translateX(-50%) translateY(-80px);
  background:var(--bg); border-radius:50%;
  width:40px; height:40px; box-shadow:var(--neu-out);
  display:flex; align-items:center; justify-content:center;
  z-index:200; transition:transform 0.2s; pointer-events:none;
}
.ptr-indicator.visible { transform:translateX(-50%) translateY(0) }
.ptr-spinner {
  width:18px; height:18px;
  border:2px solid var(--text3);
  border-top-color:var(--red);
  border-radius:50%;
}
.ptr-spinner.spinning { animation:spin 0.7s linear infinite }
@keyframes spin { to { transform:rotate(360deg) } }

.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg);
  padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));
  display:flex; align-items:center; justify-content:space-around;
  box-shadow:0 -3px 14px rgba(0,0,0,0.07);
  z-index:40;
}
body.dark .bottom-nav { box-shadow:0 -3px 14px rgba(0,0,0,0.4) }

.bnav {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  font-size:9px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
  color:var(--text3); cursor:pointer; border:none; background:none;
  font-family:'Inter',sans-serif;
}
.bnav.active { color:var(--red) }

.bnav-icon {
  width:42px; height:42px; border-radius:14px;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  transition:box-shadow 0.2s;
}
.bnav:not(.active) .bnav-icon { box-shadow:var(--neu-sm) }
.bnav.active .bnav-icon { box-shadow:var(--neu-in) }

</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <button class="tb-back" onclick="location.href='index.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="tb-title">Employee Records</span>
  </div>
  <div class="tb-right">
    <button class="tb-icon-btn" id="notif-btn" onclick="showNotifications()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="notif-badge" id="notif-count" style="display:none">0</span>
    </button>
    <button class="tb-icon-btn" onclick="toggleTheme()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" id="theme-icon">
        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<div class="page-wrap" id="page-wrap">
  
  <div class="tabs">
    <button class="tab active" data-tab="list" onclick="switchTab('list')">Records</button>
    <button class="tab" data-tab="calendar" onclick="switchTab('calendar')">Calendar</button>
    <button class="tab" data-tab="report" onclick="switchTab('report')">Report</button>
  </div>

  <div id="tab-list" class="tab-content">
    <div class="filter-bar">
      <button class="filter-chip active" data-filter="all" onclick="filterRecords('all')">All</button>
      <button class="filter-chip" data-filter="pod" onclick="filterRecords('pod')">POD</button>
      <button class="filter-chip" data-filter="crates" onclick="filterRecords('crates')">Crates</button>
      <button class="filter-chip" data-filter="others" onclick="filterRecords('others')">Others</button>
      <button class="filter-chip" data-filter="pending" onclick="filterRecords('pending')">Pending</button>
      <button class="filter-chip" data-filter="liquidated" onclick="filterRecords('liquidated')">Liquidated</button>
    </div>
    <div class="records-list" id="records-list"></div>
  </div>

  <div id="tab-calendar" class="tab-content" style="display:none">
    <div class="calendar">
      <div class="cal-header">
        <div class="cal-month" id="cal-month">January 2025</div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="records-list" id="cal-records-list"></div>
  </div>

  <!-- ✅ FIXED: Single report header with period selector -->
  <div id="tab-report" class="tab-content" style="display:none">
    <div class="report-header">
      <div class="report-title">Reports</div>
      <div class="report-subtitle" id="report-period">Week of Jan 13-19, 2025</div>
    </div>
    
    <div class="filter-bar" style="margin-bottom:16px">
      <button class="filter-chip active" data-period="weekly" onclick="changeReportPeriod('weekly')">Weekly</button>
      <button class="filter-chip" data-period="fortnightly" onclick="changeReportPeriod('fortnightly')">Fortnightly</button>
      <button class="filter-chip" data-period="monthly" onclick="changeReportPeriod('monthly')">Monthly</button>
    </div>

    <div class="report-stats">
      <div class="stat-card">
        <div class="stat-label">Total Records</div>
        <div class="stat-value" id="report-total">0</div>
        <div class="stat-sub" id="report-sub">This period</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Liquidated</div>
        <div class="stat-value" id="report-liquidated">0</div>
        <div class="stat-sub">Completed</div>
      </div>
    </div>
    <div class="records-list" id="report-list"></div>

  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('pedroex-theme', isDark ? 'dark' : 'light');
}

function applyTheme(dark) {

}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');

      role: r[3] || '',

    sel.innerHTML = '<option value="">Select employee...</option>' + 
      employees.map(e => {
        const fullName = `${e.firstName} ${e.lastName}`;

      }).join('');

}

    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    trucks = (res.values || []).map(r => ({
      rowId: r[0] || '',

function loadRecords() {
  fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Records!A2:K`, {
    headers: {'Authorization': 'Bearer ' + token}

  .then(r => r.json())
  .then(res => {
    records = (res.values || []).map((r, i) => ({
      id: i + 2,
      empName: r[1] || '',
      date: r[2] || '',
      truck: r[3] || '',
      docType: r[4] || '',
      number: r[5] || '',
      liquidated: r[6] || 'No',
      ackBy: r[7] || '',
      signature: r[8] || '',
      picture: r[9] || '',
      comments: r[10] || ''
    }));
    renderRecords();
  });
}

function renderRecords() {
  const list = document.getElementById('records-list');
  let filtered = records;
  
  if (currentFilter === 'pod') filtered = records.filter(r => r.docType === 'Proof of Deliveries');
  else if (currentFilter === 'crates') filtered = records.filter(r => r.docType === 'Crates');
  else if (currentFilter === 'others') filtered = records.filter(r => r.docType === 'Others');
  else if (currentFilter === 'pending') filtered = records.filter(r => r.liquidated === 'No');
  else if (currentFilter === 'liquidated') filtered = records.filter(r => r.liquidated === 'Yes');
  
  if (filtered.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px 0">No records found</p>';
    return;
  }
  
  list.innerHTML = filtered.map(r => {
    const isPOD = r.docType === 'Proof of Deliveries';
    const isCrates = r.docType === 'Crates';
    const isLiq = r.liquidated === 'Yes';
    
    let cardClass = 'record-card';
    if (isPOD && isLiq) cardClass += ' pod-liquidated';
    else if (isPOD && !isLiq) cardClass += ' pod-pending';
    else if (isCrates && isLiq) cardClass += ' crates-liquidated';
    else if (isCrates && !isLiq) cardClass += ' crates-pending';
    
    return `
      <div class="${cardClass}" onclick="viewRecord(${r.id})">
        <div class="record-header">
          <div class="record-title">${r.empName}</div>
          <div class="record-badge ${isLiq ? 'badge-liquidated' : 'badge-pending'}">
            ${isLiq ? 'Liquidated' : 'Pending'}

        </div>
        <div class="record-meta">
          <div class="record-meta-row">
            <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 2v4M16 2v4M3 10h18" stroke="currentColor" stroke-width="2"/></svg>
            ${r.date}
          </div>
          <div class="record-meta-row">
            <svg viewBox="0 0 24 24" fill="none"><rect x="1" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M15 11h4l3 4v3h-7" stroke="currentColor" stroke-width="2"/></svg>
            ${r.truck}
          </div>
          <div class="record-meta-row">
            <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 7h8M8 11h5" stroke="currentColor" stroke-width="2"/></svg>
            ${r.docType} #${r.number}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

  currentFilter = filter;

  document.querySelector(`[data-filter="${filter}"]`).classList.add('active');

}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Add Record';
  document.getElementById('record-form').reset();
  document.getElementById('edit-id').value = '';
  removeImage();
  document.getElementById('rec-date').valueAsDate = new Date();
  
  // ✅ Re-enable all form fields
  document.querySelectorAll('#record-form input, #record-form select, #record-form textarea, .radio-btn').forEach(el => {
    el.disabled = false;
  });
  document.getElementById('save-btn').style.display = 'block';
  
  document.getElementById('record-modal').classList.add('active');
  
  setTimeout(function() {
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    
    const ratio = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    ctx.scale(ratio, ratio);
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    setupSignaturePad();
  }, 150);
}

function closeModal() {
  document.getElementById('record-modal').classList.remove('active');
}

function getCurrentUserRole() {
  return 'admin'; // For testing — all users can edit
}

function viewRecord(id) {
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  
  const userRole = getCurrentUserRole();
  const canEdit = (userRole === 'admin' || userRole === 'Admin');
  
  document.getElementById('modal-title').textContent = canEdit ? 'Edit Record' : 'View Record';
  document.getElementById('edit-id').value = rec.id;
  document.getElementById('emp-name').value = rec.empName;
  document.getElementById('rec-date').value = rec.date;
  document.getElementById('rec-truck').value = rec.truck;
  document.getElementById('doc-type').value = rec.docType;
  document.getElementById('doc-number').value = rec.number;
  document.getElementById('liquidated').value = rec.liquidated;
  document.getElementById('ack-by').value = rec.ackBy;
  document.getElementById('comments').value = rec.comments;
  
  document.querySelectorAll('.radio-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.value === rec.liquidated);
    if (!canEdit) btn.disabled = true;
  });
  
  if (!canEdit) {
    document.querySelectorAll('#record-form input, #record-form select, #record-form textarea').forEach(el => {
      el.disabled = true;
    });
    document.getElementById('save-btn').style.display = 'none';
  } else {
    document.querySelectorAll('#record-form input, #record-form select, #record-form textarea').forEach(el => {
      el.disabled = false;
    });
    document.getElementById('save-btn').style.display = 'block';
  }
  
  if (rec.signature) {
    setTimeout(function() {
      const canvas = document.getElementById('sig-canvas');
      const ctx = canvas.getContext('2d');
      
      const ratio = window.devicePixelRatio || 1;
      canvas.width = canvas.offsetWidth * ratio;
      canvas.height = canvas.offsetHeight * ratio;
      ctx.scale(ratio, ratio);
      
      const img = new Image();
      img.onload = () => {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.offsetWidth, canvas.offsetHeight);
      };
      img.src = rec.signature;
      
      setupSignaturePad();
    }, 150);
  } else {
    setTimeout(function() {
      const canvas = document.getElementById('sig-canvas');
      const ctx = canvas.getContext('2d');
      
      const ratio = window.devicePixelRatio || 1;
      canvas.width = canvas.offsetWidth * ratio;
      canvas.height = canvas.offsetHeight * ratio;
      ctx.scale(ratio, ratio);
      
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      setupSignaturePad();
    }, 150);
  }
  
  if (rec.picture) {
    document.getElementById('preview-img').src = rec.picture;
    document.getElementById('img-preview').style.display = 'block';
    uploadedImage = rec.picture;
  }
  
  document.getElementById('record-modal').classList.add('active');
}

document.getElementById('record-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const id = document.getElementById('edit-id').value;
  const empName = document.getElementById('emp-name').value;
  const date = document.getElementById('rec-date').value;

  btn.parentElement.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(inputId).value = btn.dataset.value;

function setupSignaturePad() {
  let drawing = false;
  let lastX = 0;
  let lastY = 0;
  
  // ✅ Remove old listeners to prevent duplicates
  const newCanvas = sigCanvas.cloneNode(true);
  sigCanvas.parentNode.replaceChild(newCanvas, sigCanvas);
  sigCanvas = newCanvas;
  sigCtx = sigCanvas.getContext('2d');
  
  sigCanvas.addEventListener('mousedown', function(e) {
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
  });
  
  sigCanvas.addEventListener('mousemove', function(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    
    sigCtx.beginPath();
    sigCtx.moveTo(lastX, lastY);
    sigCtx.lineTo(pos.x, pos.y);
    sigCtx.strokeStyle = '#000000';
    sigCtx.lineWidth = 2;
    sigCtx.lineCap = 'round';
    sigCtx.lineJoin = 'round';
    sigCtx.stroke();
    
    lastX = pos.x;
    lastY = pos.y;
  });
  
  sigCanvas.addEventListener('mouseup', function() {
    drawing = false;
  });
  
  sigCanvas.addEventListener('mouseleave', function() {
    drawing = false;
  });
  
  sigCanvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
  }, { passive: false });
  
  sigCanvas.addEventListener('touchmove', function(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    
    sigCtx.beginPath();
    sigCtx.moveTo(lastX, lastY);
    sigCtx.lineTo(pos.x, pos.y);
    sigCtx.strokeStyle = '#000000';
    sigCtx.lineWidth = 2;
    sigCtx.lineCap = 'round';
    sigCtx.lineJoin = 'round';
    sigCtx.stroke();
    
    lastX = pos.x;
    lastY = pos.y;
  }, { passive: false });
  
  sigCanvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    drawing = false;
  }, { passive: false });
  
  function getPos(e) {
    const rect = sigCanvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return {
      x: touch.clientX - rect.left,
      y: touch.clientY - rect.top
    };
  }
}

// ✅ FIXED: Single clearSignature function with white background
function clearSignature() {
  const ratio = window.devicePixelRatio || 1;
  sigCtx.fillStyle = '#ffffff';
  sigCtx.fillRect(0, 0, sigCanvas.width, sigCanvas.height);
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(event) {
    uploadedImage = event.target.result;
    document.getElementById('preview-img').src = uploadedImage;
    document.getElementById('img-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  uploadedImage = null;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('pic-input').value = '';
}

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  document.getElementById('cal-month').textContent = 
    currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    .map(d => `<div class="cal-day-label">${d}</div>`).join('');
  
  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += '<div></div>';
  }
  
  const today = new Date();
  for (let day = 1; day <= daysInMonth; day++) {
    const date = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const hasRecord = records.some(r => r.date === date);
    const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    
    grid.innerHTML += `
      <div class="cal-day ${isToday ? 'today' : ''} ${hasRecord ? 'has-record' : ''}" 
           onclick="showDayRecords('${date}')">
        ${day}
      </div>
    `;
  }
}

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
}

function showDayRecords(date) {
  const dayRecords = records.filter(r => r.date === date);
  const list = document.getElementById('cal-records-list');
  
  if (dayRecords.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text2);padding:20px 0">No records for this date</p>';
    return;
  }
  
  list.innerHTML = dayRecords.map(r => {
    const isPOD = r.docType === 'Proof of Deliveries';
    const isCrates = r.docType === 'Crates';
    const isLiq = r.liquidated === 'Yes';
    
    let cardClass = 'record-card';
    if (isPOD && isLiq) cardClass += ' pod-liquidated';
    else if (isPOD && !isLiq) cardClass += ' pod-pending';
    else if (isCrates && isLiq) cardClass += ' crates-liquidated';
    else if (isCrates && !isLiq) cardClass += ' crates-pending';
    
    return `
      <div class="${cardClass}" onclick="viewRecord(${r.id})">
        <div class="record-header">
          <div class="record-title">${r.empName}</div>
          <div class="record-badge ${isLiq ? 'badge-liquidated' : 'badge-pending'}">
            ${isLiq ? 'Liquidated' : 'Pending'}
          </div>
        </div>
        <div class="record-meta">
          <div class="record-meta-row">
            <svg viewBox="0 0 24 24" fill="none"><rect x="1" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/></svg>
            ${r.truck}
          </div>
          <div class="record-meta-row">
            <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="2"/></svg>
            ${r.docType} #${r.number}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function loadReport() {
  const now = new Date();
  let startDate, endDate;
  
  if (reportPeriod === 'weekly') {
    startDate = new Date(now);
    startDate.setDate(now.getDate() - now.getDay());
    endDate = new Date(startDate);
    endDate.setDate(startDate.getDate() + 6);
    
    document.getElementById('report-period').textContent = 
      `Week of ${startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
    document.getElementById('report-sub').textContent = 'This week';
    
  } else if (reportPeriod === 'fortnightly') {
    startDate = new Date(now);
    startDate.setDate(now.getDate() - 13);
    endDate = new Date(now);
    
    document.getElementById('report-period').textContent = 
      `${startDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${endDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
    document.getElementById('report-sub').textContent = 'Last 14 days';
    
  } else if (reportPeriod === 'monthly') {
    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
    endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    
    document.getElementById('report-period').textContent = 
      `${startDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;
    document.getElementById('report-sub').textContent = 'This month';
  }
  
  const periodRecords = records.filter(r => {
    const d = new Date(r.date);
    return d >= startDate && d <= endDate;
  });
  
  const liquidated = periodRecords.filter(r => r.liquidated === 'Yes').length;
  
  document.getElementById('report-total').textContent = periodRecords.length;
  document.getElementById('report-liquidated').textContent = liquidated;
  
  const byEmployee = {};
  periodRecords.forEach(r => {
    if (!byEmployee[r.empName]) byEmployee[r.empName] = [];
    byEmployee[r.empName].push(r);
  });
  
  const list = document.getElementById('report-list');
  list.innerHTML = Object.keys(byEmployee).map(emp => {
    const empRecords = byEmployee[emp];
    const empLiq = empRecords.filter(r => r.liquidated === 'Yes').length;
    
    return `
      <div class="record-card">
        <div class="record-header">
          <div class="record-title">${emp}</div>
          <div class="record-badge ${empLiq === empRecords.length ? 'badge-liquidated' : 'badge-pending'}">
            ${empLiq}/${empRecords.length}
          </div>
        </div>
        <div class="record-meta">
          ${empRecords.map(r => `
            <div class="record-meta-row">
              <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/></svg>
              ${r.date} - ${r.truck} - ${r.docType} #${r.number} - ${r.liquidated === 'Yes' ? '✓' : '✗'}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function checkReminders() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(now.getDate() + 1);
  
  const pending = records.filter(r => r.liquidated === 'No');
  
  let podCount = 0;
  let cratesCount = 0;
  
  pending.forEach(r => {
    const recDate = new Date(r.date);
    
    if (r.docType === 'Proof of Deliveries') {
      let dueDate = new Date(recDate);
      dueDate.setDate(recDate.getDate() + 1);
      
      if (dueDate.getDay() === 0) dueDate.setDate(dueDate.getDate() + 1);
      if (dueDate.getDay() === 6) dueDate.setDate(dueDate.getDate() + 2);
      
      if (dueDate.toDateString() === tomorrow.toDateString()) {
        podCount++;
      }
    }
    
    if (r.docType === 'Crates') {
      const daysSince = Math.floor((now - recDate) / (1000 * 60 * 60 * 24));
      if (daysSince >= 7) {
        cratesCount++;
      }
    }
  });
  
  const totalNotif = podCount + cratesCount;
  const badge = document.getElementById('notif-count');
  
  if (totalNotif > 0) {
    badge.textContent = totalNotif;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function showNotifications() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(now.getDate() + 1);
  
  const pending = records.filter(r => r.liquidated === 'No');
  
  let messages = [];
  
  pending.forEach(r => {
    const recDate = new Date(r.date);
    
    if (r.docType === 'Proof of Deliveries') {
      let dueDate = new Date(recDate);
      dueDate.setDate(recDate.getDate() + 1);
      
      if (dueDate.getDay() === 0) dueDate.setDate(dueDate.getDate() + 1);
      if (dueDate.getDay() === 6) dueDate.setDate(dueDate.getDate() + 2);
      
      if (dueDate.toDateString() === tomorrow.toDateString()) {
        messages.push(`📄 POD #${r.number} (${r.empName}) - Due tomorrow`);
      }
    }
    
    if (r.docType === 'Crates') {
      const daysSince = Math.floor((now - recDate) / (1000 * 60 * 60 * 24));
      if (daysSince >= 7) {
        messages.push(`📦 Crates #${r.number} (${r.empName}) - Overdue ${daysSince} days`);
      }
    }
  });
  
  if (messages.length === 0) {
    showToast('✓ No pending reminders');
  } else {
    alert('🔔 Reminders:\n\n' + messages.join('\n'));
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function initPullToRefresh(el, onRefresh) {
  let startY = 0;
  let pulling = false;
  const threshold = 70;
  const indicator = document.querySelector('.ptr-indicator');
  const spinner = document.getElementById('ptr-spinner');
  
  el.addEventListener('touchstart', function(e) {
    if (el.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });
  
  el.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    const dist = e.touches[0].clientY - startY;
    if (dist < 0) { pulling = false; return; }
    
    const progress = Math.min(dist / threshold, 1);
    indicator.classList.add('visible');
    spinner.style.transform = `rotate(${progress * 360}deg)`;
  }, { passive: true });
  
  el.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    
    const dist = e.changedTouches[0].clientY - startY;
    if (dist >= threshold) {
      spinner.classList.add('spinning');
      onRefresh(function() {
        spinner.classList.remove('spinning');
        indicator.classList.remove('visible');
      });
    } else {
      indicator.classList.remove('visible');
    }
  });
}
