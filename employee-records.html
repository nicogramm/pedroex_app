<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e0e0e5">
<title>Employee Records — PedroEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#e0e0e5;--bg2:#e8e8ed;--shadow-d:#b8b9be;--shadow-l:#ffffff;
  --text:#2a2a2e;--text2:#777;--text3:#aaa;
  --red:#B32533;--green:#16a34a;--orange:#f59e0b;--blue:#2563eb;
  --neu-out:6px 6px 14px var(--shadow-d),-4px -4px 10px var(--shadow-l);
  --neu-in:inset 4px 4px 8px var(--shadow-d),inset -3px -3px 7px var(--shadow-l);
  --neu-sm:4px 4px 8px var(--shadow-d),-3px -3px 7px var(--shadow-l);
  --neu-xs:3px 3px 6px var(--shadow-d),-2px -2px 5px var(--shadow-l);
}
body.dark {
  --bg:#2a2a2f;--bg2:#313137;--shadow-d:#16161a;--shadow-l:#3e3e46;
  --text:#e8e8ec;--text2:#888;--text3:#555;
  --green:#22c55e;--orange:#f59e0b;--blue:#60a5fa;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}

/* TOPBAR */
.topbar{background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:14px 18px;padding-top:calc(env(safe-area-inset-top,0px) + 14px);flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,.07);position:sticky;top:0;z-index:50}
body.dark .topbar{box-shadow:0 3px 10px rgba(0,0,0,.3)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-back{width:36px;height:36px;border-radius:12px;background:var(--bg);box-shadow:var(--neu-sm);border:none;color:var(--text2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb-back:active{box-shadow:var(--neu-in)}
.tb-title{font-size:16px;font-weight:700;color:var(--text)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{width:36px;height:36px;border-radius:12px;background:var(--bg);box-shadow:var(--neu-sm);border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.tb-btn:active{box-shadow:var(--neu-in)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* PAGE */
.screen{display:flex;flex-direction:column;height:100dvh}
.page-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(90px + env(safe-area-inset-bottom,0px))}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--bg);border-radius:14px;box-shadow:var(--neu-in);padding:4px}
.tab{flex:1;padding:10px 6px;border:none;background:none;border-radius:10px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;color:var(--text2);cursor:pointer;transition:all .2s}
.tab.active{background:var(--bg);box-shadow:var(--neu-sm);color:var(--red)}

/* CARDS */
.neu-card{background:var(--bg);border-radius:18px;box-shadow:var(--neu-out);padding:18px;margin-bottom:14px}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}

/* TASK CARDS */
.task-card{background:var(--bg);border-radius:14px;box-shadow:var(--neu-xs);padding:14px;margin-bottom:10px;border-left:4px solid var(--text3);cursor:pointer;transition:box-shadow .15s}
.task-card:active{box-shadow:var(--neu-in)}
.task-card.status-pending{border-left-color:var(--orange)}
.task-card.status-submitted{border-left-color:var(--green)}
.task-card.status-overdue{border-left-color:var(--red)}
.task-card.status-late{border-left-color:var(--blue)}
.task-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.task-title{font-size:14px;font-weight:700;color:var(--text)}
.task-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.badge-pending{background:rgba(245,158,11,.15);color:var(--orange)}
.badge-submitted{background:rgba(22,163,74,.15);color:var(--green)}
.badge-overdue{background:rgba(179,37,51,.15);color:var(--red)}
.badge-late{background:rgba(37,99,235,.15);color:var(--blue)}
.task-meta{font-size:11px;color:var(--text2);display:flex;flex-direction:column;gap:4px}
.task-meta-row{display:flex;align-items:center;gap:6px}
.task-due{font-size:11px;font-weight:600;margin-top:6px}
.task-due.overdue{color:var(--red)}
.task-due.ok{color:var(--green)}
.task-due.warning{color:var(--orange)}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 14px;border-radius:20px;background:var(--bg);box-shadow:var(--neu-sm);font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s}
.filter-chip.active{box-shadow:var(--neu-in);color:var(--red)}

/* SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end}
.sheet-overlay.open{display:flex}
.sheet{background:var(--bg);border-radius:28px 28px 0 0;padding:8px 22px calc(28px + env(safe-area-inset-bottom,0px));width:100%;max-height:92dvh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:var(--text3);border-radius:2px;margin:0 auto 16px;opacity:.3}
.sheet-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.sheet-sub{font-size:12px;color:var(--text2);margin-bottom:18px}

/* FORM */
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.fi{width:100%;background:var(--bg);border:none;border-radius:12px;box-shadow:var(--neu-in);padding:12px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none}
.fi:focus{box-shadow:var(--neu-in),0 0 0 2px rgba(179,37,51,.2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* RADIO TOGGLE */
.toggle-group{display:flex;background:var(--bg);border-radius:12px;box-shadow:var(--neu-in);overflow:hidden}
.tg-btn{flex:1;padding:12px;border:none;background:none;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;color:var(--text2);cursor:pointer;transition:all .2s}
.tg-btn.active-yes{background:var(--green);color:#fff}
.tg-btn.active-no{background:var(--orange);color:#fff}

/* SIG CANVAS */
.sig-box{background:var(--bg);border-radius:12px;box-shadow:var(--neu-in);padding:10px}
.sig-canvas{width:100%;height:110px;border-radius:8px;background:#fff;cursor:crosshair;touch-action:none;display:block}
.sig-actions{display:flex;gap:8px;margin-top:8px}
.sig-btn{flex:1;padding:8px;border-radius:8px;background:var(--bg);box-shadow:var(--neu-sm);font-size:12px;font-weight:600;color:var(--text2);border:none;cursor:pointer;font-family:'Inter',sans-serif}
.sig-btn:active{box-shadow:var(--neu-in)}

/* IMAGE UPLOAD */
.img-upload-box{background:var(--bg);border-radius:12px;box-shadow:var(--neu-in);padding:18px;text-align:center;cursor:pointer;border:2px dashed var(--text3)}
.img-upload-box p{font-size:12px;color:var(--text2);margin-top:6px}
.img-preview{margin-top:10px;border-radius:10px;overflow:hidden;box-shadow:var(--neu-sm);position:relative}
.img-preview img{width:100%;display:block;max-height:180px;object-fit:contain}
.img-remove{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700}

/* BTN */
.btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--red);color:#fff;box-shadow:4px 4px 12px rgba(179,37,51,.35)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--text3);box-shadow:var(--neu-sm);cursor:not-allowed;transform:none}
.btn-danger{background:none;color:var(--red);font-size:13px;font-weight:600;font-family:'Inter',sans-serif;border:none;width:100%;padding:12px;cursor:pointer}
.btn-secondary{background:var(--bg);color:var(--text2);box-shadow:var(--neu-sm)}
.btn-secondary:active{box-shadow:var(--neu-in)}

/* DETAIL ROWS */
.dt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05)}
body.dark .dt-row{border-bottom-color:rgba(255,255,255,.04)}
.dt-row:last-child{border-bottom:none}
.dt-label{font-size:11px;color:var(--text3);font-weight:600}
.dt-val{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:65%}

/* REPORT */
.rpt-stat{background:var(--bg);border-radius:14px;box-shadow:var(--neu-out);padding:14px;text-align:center}
.rpt-stat-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px}
.rpt-stat-lbl{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.rpt-emp-card{background:var(--bg);border-radius:14px;box-shadow:var(--neu-xs);padding:14px;margin-bottom:10px}
.rpt-emp-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.rpt-clearance{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.cleared{background:rgba(22,163,74,.15);color:var(--green)}
.not-cleared{background:rgba(179,37,51,.15);color:var(--red)}
.rpt-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04)}
body.dark .rpt-row{border-bottom-color:rgba(255,255,255,.03)}
.rpt-row:last-child{border-bottom:none}
.rpt-row-val{font-weight:600}
.rpt-row-val.ok{color:var(--green)}
.rpt-row-val.warn{color:var(--orange)}
.rpt-row-val.bad{color:var(--red)}

/* PERIOD BTNS */
.period-row{display:flex;gap:8px;margin-bottom:14px}
.period-btn{flex:1;padding:10px 6px;border:none;background:var(--bg);border-radius:10px;box-shadow:var(--neu-sm);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;color:var(--text2);cursor:pointer}
.period-btn.active{box-shadow:var(--neu-in);color:var(--red)}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--bg);border-radius:22px;padding:24px;max-width:340px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.confirm-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.confirm-msg{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.cb{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none}
.cb-cancel{background:var(--bg);color:var(--text2);box-shadow:var(--neu-sm)}
.cb-confirm{background:var(--red);color:#fff}

/* SAVING / TOAST */
.saving-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.saving-overlay.show{display:flex}
.saving-box{background:var(--bg);border-radius:20px;padding:28px 32px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.saving-spinner{width:36px;height:36px;border:3px solid var(--text3);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
.saving-text{font-size:14px;color:var(--text2);font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--bg);border-radius:14px;box-shadow:var(--neu-out);border-left:3px solid var(--red);padding:13px 22px;font-size:13px;font-weight:500;color:var(--text);z-index:400;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}

/* EMPTY */
.empty-hint{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.loading-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--text3);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--text3);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;justify-content:space-around;box-shadow:0 -3px 14px rgba(0,0,0,.07);z-index:40}
body.dark .bottom-nav{box-shadow:0 -3px 14px rgba(0,0,0,.4)}
.bnav{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif}
.bnav.active{color:var(--red)}
.bnav-icon{width:42px;height:42px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center}
.bnav:not(.active) .bnav-icon{box-shadow:var(--neu-sm)}
.bnav.active .bnav-icon{box-shadow:var(--neu-in)}

/* NOTIF ITEMS */
.notif-item{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.notif-icon{font-size:20px;flex-shrink:0}
.notif-text{font-size:13px;color:var(--text);margin-bottom:2px}
.notif-meta{font-size:11px;color:var(--text3)}
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="tb-left">
      <button class="tb-back" onclick="location.href='index.html'">‹</button>
      <span class="tb-title">Employee Records</span>
    </div>
    <div class="tb-right">
      <button class="tb-btn" id="notif-btn" onclick="openNotifSheet()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="notif-badge" id="notif-badge" style="display:none">0</span>
      </button>
    </div>
  </div>

  <div class="page-wrap" id="page-wrap">
    <div class="tabs">
      <button class="tab active" id="tab-tasks" onclick="switchTab('tasks')">My Tasks</button>
      <button class="tab" id="tab-all" onclick="switchTab('all')" style="display:none">All Records</button>
      <button class="tab" id="tab-report" onclick="switchTab('report')" style="display:none">Report</button>
    </div>

    <div id="loading-main" class="loading-wrap"><div class="spinner"></div>&nbsp;Loading...</div>

    <!-- TASKS TAB -->
    <div id="content-tasks" style="display:none">
      <div class="filter-bar">
        <button class="filter-chip active" onclick="filterTasks('all',this)">All</button>
        <button class="filter-chip" onclick="filterTasks('pending',this)">Pending</button>
        <button class="filter-chip" onclick="filterTasks('overdue',this)">Overdue</button>
        <button class="filter-chip" onclick="filterTasks('submitted',this)">Submitted</button>
        <button class="filter-chip" onclick="filterTasks('pod',this)">POD</button>
        <button class="filter-chip" onclick="filterTasks('crates',this)">Crates</button>
      </div>
      <div id="tasks-list"></div>
    </div>

    <!-- ALL RECORDS TAB (ADMIN) -->
    <div id="content-all" style="display:none">
      <div class="filter-bar">
        <button class="filter-chip active" onclick="filterAll('all',this)">All</button>
        <button class="filter-chip" onclick="filterAll('pending',this)">Pending</button>
        <button class="filter-chip" onclick="filterAll('overdue',this)">Overdue</button>
        <button class="filter-chip" onclick="filterAll('submitted',this)">Submitted</button>
        <button class="filter-chip" onclick="filterAll('pod',this)">POD</button>
        <button class="filter-chip" onclick="filterAll('crates',this)">Crates</button>
      </div>
      <div id="all-list"></div>
    </div>

    <!-- REPORT TAB (ADMIN) -->
    <div id="content-report" style="display:none">
      <div class="neu-card" style="padding:14px;margin-bottom:14px">
        <div class="card-title" style="margin-bottom:10px">Payroll Period</div>
        <div class="period-row">
          <button class="period-btn active" id="rpt-btn-1st" onclick="setRptPeriod('1st')">1st – 15th</button>
          <button class="period-btn" id="rpt-btn-2nd" onclick="setRptPeriod('2nd')">16th – End</button>
          <button class="period-btn" id="rpt-btn-custom" onclick="setRptPeriod('custom')">Custom</button>
        </div>
        <div id="rpt-custom-wrap" style="display:none">
          <div class="row2" style="margin-bottom:10px">
            <div><label class="fl">From</label><input class="fi" type="date" id="rpt-from"></div>
            <div><label class="fl">To</label><input class="fi" type="date" id="rpt-to"></div>
          </div>
          <button class="btn btn-primary" onclick="generateReport()" style="padding:12px;font-size:13px">Generate</button>
        </div>
      </div>
      <div id="rpt-loading" class="loading-wrap" style="display:none"><div class="spinner"></div>&nbsp;Generating...</div>
      <div id="rpt-content" style="display:none"></div>
    </div>
  </div>
</div>

<!-- TASK DETAIL / EDIT SHEET -->
<div class="sheet-overlay" id="task-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="ts-title"></div>
    <div class="sheet-sub" id="ts-sub"></div>
    <div id="ts-body"></div>
  </div>
</div>

<!-- NOTIF SHEET -->
<div class="sheet-overlay" id="notif-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🔔 Reminders</div>
    <div class="sheet-sub" style="margin-bottom:14px">Pending and overdue tasks</div>
    <div id="notif-list"></div>
    <button class="btn btn-secondary" onclick="closeSheet('notif-sheet')" style="margin-top:10px">Close</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Confirm</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="cb cb-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="cb cb-confirm" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<div class="saving-overlay" id="saving-overlay">
  <div class="saving-box">
    <div class="saving-spinner"></div>
    <div class="saving-text" id="saving-text">Saving...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav" onclick="location.href='index.html'">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="currentColor" stroke-width="2"/><path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2"/></svg></div>Home
  </button>
  <button class="bnav" onclick="location.href='trucks.html'">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="1" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M15 11h4l3 4v3h-7" stroke="currentColor" stroke-width="2"/><circle cx="5" cy="19" r="2" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="19" r="2" stroke="currentColor" stroke-width="2"/></svg></div>Trucks
  </button>
  <button class="bnav" onclick="location.href='trips.html'">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/></svg></div>Trips
  </button>

// ═══ ROSTER HELPERS ═══════════════════════════════════
function getMondayOfWeek(date) {
  var d = new Date(date);
  d.setHours(0,0,0,0);
  var day = d.getDay(); // 0=Sun
  var diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function getScheduledHelper(truck, date) {
  var truckIdx = TRUCKS.indexOf(truck);
  if (truckIdx === -1) return null;

  var anchorMonday = getMondayOfWeek(ANCHOR_DATE);
  var targetMonday = getMondayOfWeek(date);
  var weekDiff = Math.round((targetMonday - anchorMonday) / (7 * 24 * 60 * 60 * 1000));

  // shift: each week, helpers rotate UP by 1
  // anchor week: CAH=0,CBQ=1,CAN=2,NHE=3,CBJ=4
  // next week: CAH=4(prev CBJ), CBQ=0(prev CAH), etc.
  // so for a given week offset, helper for truck[i] = HELPER_ORDER[(i - weekDiff + 500*5) % 5]
  var helperIdx = ((truckIdx - weekDiff) % 5 + 500) % 5;
  return HELPER_ORDER[helperIdx];
}

// ═══ VALIDITY RULES ═══════════════════════════════════
function getPODDueDate(tripDate, route) {
  var d = new Date(tripDate + 'T00:00:00');
  var isMaxbate = (route || '').toLowerCase().indexOf('masbate') > -1;

  if (isMaxbate) {
    d.setDate(d.getDate() + 4);
    return d;
  }

  // next business day; if Saturday (+2 to Monday), if Sunday (+1)
  var dow = d.getDay(); // 0=Sun,6=Sat
  if (dow === 6) { d.setDate(d.getDate() + 2); } // Saturday trip → Monday
  else { d.setDate(d.getDate() + 1); }
  // skip Sunday
  if (d.getDay() === 0) d.setDate(d.getDate() + 1);
  return d;
}

function getCratesDueDate(tripDate) {
  var d = new Date(tripDate + 'T00:00:00');
  d.setDate(d.getDate() + 7);
  return d;
}

function getTaskStatus(task, today) {
  if (task.submitted) {
    var subDate = new Date(task.submissionDate + 'T00:00:00');
    var dueDate = new Date(task.dueDate);
    dueDate.setHours(23,59,59);
    if (subDate > dueDate) return 'late';
    return 'submitted';
  }
  var due = new Date(task.dueDate);
  due.setHours(23,59,59);
  if (today > due) return 'overdue';
  return 'pending';
}

function dueDateLabel(dueDateStr, status) {
  var due = new Date(dueDateStr);
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.round((due - today) / 86400000);
  if (status === 'submitted') return '✓ Submitted';
  if (status === 'late') return '⚠ Submitted Late';
  if (status === 'overdue') return '⚠ Overdue by ' + Math.abs(diff) + ' day(s)';
  if (diff === 0) return '⏰ Due today!';
  if (diff === 1) return '⏰ Due tomorrow';
  return '📅 Due in ' + diff + ' day(s)';
}

// ═══ GENERATE TASKS ═══════════════════════════════════
// For each trip, determine Primary Helper via roster,
// then generate POD and Crates tasks for that helper.
function generateTasks() {
  var tasks = [];
  var today = new Date(); today.setHours(0,0,0,0);

  allTrips.forEach(function(trip) {
    var truck = (trip.truck || '').trim();
    var date  = trip.deliveryDate;
    if (!truck || !date) return;

    // Find scheduled helper from roster
    var scheduledHelper = getScheduledHelper(truck, new Date(date + 'T00:00:00'));

    // Also check who actually attended (for display/override)
    var attOnDay = allAtt.filter(function(a){
      return a.date === date && (a.truck||'').trim().toLowerCase() === truck.toLowerCase();
    });

    // Determine actual primary helper:
    // 1. If someone is marked helperType='Primary' in attendance → use that
    // 2. Else if scheduled helper actually attended → use scheduled helper
    // 3. Else use earliest-check-in helper from attendance
    var helpers = attOnDay.filter(function(a){
      var emp = allEmployees.find(function(e){ return e.fullName.toLowerCase() === a.name.toLowerCase(); });
      return emp && emp.position.toLowerCase() === 'helper';
    });

    var primaryHelper = null;

    // Check attendance column L
    var markedPrimary = helpers.find(function(h){ return h.helperType === 'Primary'; });
    if (markedPrimary) {
      primaryHelper = markedPrimary.name;
    } else if (scheduledHelper) {
      // Check if scheduled helper actually attended
      var scheduledAttended = helpers.find(function(h){
        return h.name.toLowerCase() === scheduledHelper.toLowerCase();
      });
      if (scheduledAttended) {
        primaryHelper = scheduledHelper;
      } else if (helpers.length > 0) {
        // Fall back: earliest timestamp among helpers
        primaryHelper = helpers[0].name;
      } else {
        // No helper attended; use scheduled helper as responsible
        primaryHelper = scheduledHelper;
      }
    } else if (helpers.length > 0) {
      primaryHelper = helpers[0].name;
    }

    if (!primaryHelper) return;

    // Get crates count from attendance
    var attRecord = allAtt.find(function(a){
      return a.date === date
        && (a.truck||'').trim().toLowerCase() === truck.toLowerCase()
        && a.name.toLowerCase() === primaryHelper.toLowerCase();
    });
    var cratesCount = attRecord ? (attRecord.crates || '0') : '0';

    var taskIdBase = trip.id + '_' + primaryHelper.replace(/\s+/g,'_');

    // === POD TASK ===
    var podDue     = getPODDueDate(date, trip.route);
    var podDueStr  = fmtDate(podDue);
    var podRecId   = taskIdBase + '_POD';
    var existingPOD = allRecords.find(function(r){
      return r.tripId === trip.id
        && r.helperName.toLowerCase() === primaryHelper.toLowerCase()
        && r.type === 'POD';
    });

    var podTask = {
      id:             podRecId,
      recordRowIndex: existingPOD ? existingPOD.rowIndex : null,
      tripId:         trip.id,
      helperName:     primaryHelper,
      truck:          truck,
      date:           date,
      type:           'POD',
      route:          trip.route,
      tripType:       trip.type,
      shipmentNum:    trip.shipmentNum,
      dueDate:        podDueStr,
      expectedCrates: '—',
      submitted:      existingPOD ? existingPOD.submitted : false,
      submissionDate: existingPOD ? existingPOD.submissionDate : '',
      late:           existingPOD ? existingPOD.late : false,
      signature:      existingPOD ? existingPOD.signature : '',
      picture:        existingPOD ? existingPOD.picture : '',
      comments:       existingPOD ? existingPOD.comments : '',
      scheduledHelper:scheduledHelper,
      isScheduled:    scheduledHelper && scheduledHelper.toLowerCase() === primaryHelper.toLowerCase()
    };
    podTask.status = getTaskStatus(podTask, today);
    tasks.push(podTask);

    // === CRATES TASK ===
    var cratesDue    = getCratesDueDate(date);
    var cratesDueStr = fmtDate(cratesDue);
    var cratesRecId  = taskIdBase + '_CRATES';
    var existingCrates = allRecords.find(function(r){
      return r.tripId === trip.id
        && r.helperName.toLowerCase() === primaryHelper.toLowerCase()
        && r.type === 'Crates';
    });

    var cratesTask = {
      id:             cratesRecId,
      recordRowIndex: existingCrates ? existingCrates.rowIndex : null,
      tripId:         trip.id,
      helperName:     primaryHelper,
      truck:          truck,
      date:           date,
      type:           'Crates',
      route:          trip.route,
      tripType:       trip.type,
      shipmentNum:    trip.shipmentNum,
      dueDate:        cratesDueStr,
      expectedCrates: cratesCount,
      submitted:      existingCrates ? existingCrates.submitted : false,
      submissionDate: existingCrates ? existingCrates.submissionDate : '',
      late:           existingCrates ? existingCrates.late : false,
      signature:      existingCrates ? existingCrates.signature : '',
      picture:        existingCrates ? existingCrates.picture : '',
      comments:       existingCrates ? existingCrates.comments : '',
      scheduledHelper:scheduledHelper,
      isScheduled:    scheduledHelper && scheduledHelper.toLowerCase() === primaryHelper.toLowerCase()
    };
    cratesTask.status = getTaskStatus(cratesTask, today);
    tasks.push(cratesTask);
  });

  // Sort: overdue first, then pending, then submitted
  var order = { overdue:0, pending:1, late:2, submitted:3 };
  tasks.sort(function(a,b){
    var oa = order[a.status]||99, ob = order[b.status]||99;
    if (oa !== ob) return oa - ob;
    return b.date.localeCompare(a.date);
  });

  return tasks;
}

// ═══ RENDER TASKS ═════════════════════════════════════
function renderTasks() {
  var myTasks = generatedTasks.filter(function(t){
    return t.helperName.toLowerCase() === currentUser.fullName.toLowerCase();
  });
  renderTaskList(myTasks, 'tasks-list', taskFilter);
}

function renderAllTasks() {
  renderTaskList(generatedTasks, 'all-list', allFilter);
}

function renderTaskList(tasks, containerId, filter) {
  var filtered = tasks;
  if (filter === 'pending')   filtered = tasks.filter(function(t){ return t.status === 'pending'; });
  if (filter === 'overdue')   filtered = tasks.filter(function(t){ return t.status === 'overdue'; });
  if (filter === 'submitted') filtered = tasks.filter(function(t){ return t.status === 'submitted' || t.status === 'late'; });
  if (filter === 'pod')       filtered = tasks.filter(function(t){ return t.type === 'POD'; });
  if (filter === 'crates')    filtered = tasks.filter(function(t){ return t.type === 'Crates'; });

  var container = document.getElementById(containerId);
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-hint">No tasks found.</div>';
    return;
  }

  var today = new Date(); today.setHours(0,0,0,0);

  container.innerHTML = filtered.map(function(t) {
    var statusClass = 'status-' + t.status;
    var badgeClass  = 'badge-' + t.status;
    var badgeLabel  = t.status === 'submitted' ? '✓ Done' :
                      t.status === 'late'      ? '⚠ Late' :
                      t.status === 'overdue'   ? '⚠ Overdue' : '⏳ Pending';
    var dueLabel    = dueDateLabel(t.dueDate, t.status);
    var dueClass    = t.status === 'overdue' ? 'overdue' : t.status === 'pending' && dueLabel.indexOf('today') > -1 ? 'warning' : t.status === 'submitted' || t.status === 'late' ? 'ok' : 'ok';

    var schedBadge = '';
    if (!t.isScheduled && t.scheduledHelper) {
      schedBadge = '<span style="font-size:10px;color:var(--orange);margin-top:4px;display:block">⚠ Scheduled: ' + t.scheduledHelper.split(' ')[0] + ' (sub: ' + t.helperName.split(' ')[0] + ')</span>';
    }

    var cratesInfo = t.type === 'Crates' ? '<div class="task-meta-row">📦 Expected: <strong>' + t.expectedCrates + ' crates</strong></div>' : '';

    return '<div class="task-card ' + statusClass + '" onclick="openTask(\'' + t.id + '\')">'
      + '<div class="task-header">'
      + '<div class="task-title">' + (t.type === 'POD' ? '📄 POD' : '📦 Crates') + ' — ' + t.truck + '</div>'
      + '<div class="task-badge ' + badgeClass + '">' + badgeLabel + '</div>'
      + '</div>'
      + '<div class="task-meta">'
      + '<div class="task-meta-row">📅 ' + t.date + (t.route ? ' · ' + t.route.split('/')[0] : '') + '</div>'
      + '<div class="task-meta-row">👤 ' + t.helperName + (containerId === 'all-list' ? '' : '') + '</div>'
      + cratesInfo
      + schedBadge
      + '</div>'
      + '<div class="task-due ' + dueClass + '">' + dueLabel + '</div>'
      + '</div>';
  }).join('');
}

// ═══ OPEN TASK SHEET ══════════════════════════════════
function openTask(taskId) {
  var t = generatedTasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  selectedTask = t;

  document.getElementById('ts-title').textContent = (t.type === 'POD' ? '📄 POD' : '📦 Crates') + ' — ' + t.truck;
  document.getElementById('ts-sub').textContent = t.date + (t.route ? ' · ' + t.route : '') + ' · ' + t.helperName;

  var canEdit = isAdmin || currentUser.fullName.toLowerCase() === t.helperName.toLowerCase();
  var canDelete = isAdmin;

  var detailRows = [
    ['Trip Type', t.tripType || '—'],
    ['Truck', t.truck],
    ['Date', t.date],
    ['Route', t.route || '—'],
    ['Shipment #', t.shipmentNum || '—'],
    ['Assigned To', t.helperName],
    ['Scheduled Helper', t.scheduledHelper || '—'],
    ['Due Date', t.dueDate],
    ['Status', t.status.toUpperCase()]
  ];
  if (t.type === 'Crates') detailRows.push(['Expected Crates', t.expectedCrates]);
  if (t.submitted) {
    detailRows.push(['Submission Date', t.submissionDate]);
    if (t.late) detailRows.push(['Late Submission', 'Yes ⚠']);
    if (t.comments) detailRows.push(['Comments', t.comments]);
  }

  var detailHtml = '<div style="background:var(--bg);border-radius:12px;box-shadow:var(--neu-in);padding:12px 14px;margin-bottom:16px">'
    + detailRows.map(function(r){
      return '<div class="dt-row"><span class="dt-label">' + r[0] + '</span><span class="dt-val">' + r[1] + '</span></div>';
    }).join('')
    + '</div>';

  // Show existing signature/picture if submitted
  var mediaHtml = '';
  if (t.submitted) {
    if (t.signature) {
      mediaHtml += '<div class="fg"><label class="fl">Signature</label>'
        + '<div style="background:#fff;padding:8px;border-radius:10px;border:1px solid #ddd">'
        + '<img src="' + t.signature + '" style="width:100%;max-height:100px;object-fit:contain">'
        + '</div></div>';
    }
    if (t.picture) {
      mediaHtml += '<div class="fg"><label class="fl">Photo</label>'
        + '<div class="img-preview"><img src="' + t.picture + '"></div></div>';
    }
  }

  var actionHtml = '';
  if (canEdit) {
    if (!t.submitted) {
      actionHtml = buildSubmitForm(t);
    } else {
      actionHtml = mediaHtml
        + '<button class="btn btn-primary" onclick="openEditForm()">✏️ Edit Submission</button>';
      if (canDelete) {
        actionHtml += '<button class="btn-danger" onclick="confirmDeleteTask()">Delete Record</button>';
      }
    }
  } else {
    actionHtml = mediaHtml;
  }

  document.getElementById('ts-body').innerHTML = detailHtml + actionHtml;
  document.getElementById('task-sheet').classList.add('open');

  // Init sig canvas if form shown
  if (!t.submitted && canEdit) {
    setTimeout(initSigCanvas, 200);
  }
}

function buildSubmitForm(t) {
  var cratesField = t.type === 'Crates'
    ? '<div class="fg"><label class="fl">Crates Returned Count</label>'
      + '<input class="fi" id="sf-crates" type="number" value="' + t.expectedCrates + '" min="0"></div>'
    : '<input type="hidden" id="sf-crates" value="' + t.expectedCrates + '">';

  return '<div class="fg"><label class="fl">Submission Date</label>'
    + '<input class="fi" type="date" id="sf-date" value="' + fmtDate(new Date()) + '"></div>'
    + cratesField
    + '<div class="fg"><label class="fl">Comments (Optional)</label>'
    + '<textarea class="fi" id="sf-comments" rows="3" style="resize:vertical;min-height:70px" placeholder="Any notes..."></textarea></div>'
    + '<div class="fg"><label class="fl">Signature (Optional)</label>'
    + '<div class="sig-box"><canvas class="sig-canvas" id="sf-sig-canvas"></canvas>'
    + '<div class="sig-actions"><button type="button" class="sig-btn" onclick="clearSig()">Clear</button></div>'
    + '</div></div>'
    + '<div class="fg"><label class="fl">Photo (Optional)</label>'
    + '<input type="file" id="sf-pic-input" accept="image/*" capture="environment" style="display:none" onchange="handlePicUpload(event)">'
    + '<div class="img-upload-box" id="sf-upload-box" onclick="document.getElementById(\'sf-pic-input\').click()">'
    + '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="margin:0 auto;display:block;color:var(--text3)"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2"/></svg>'
    + '<p>Tap to capture or upload</p></div>'
    + '<div class="img-preview" id="sf-img-preview" style="display:none">'
    + '<img id="sf-preview-img" src="" alt=""><div class="img-remove" onclick="removePic()">✕</div></div></div>'
    + '<button class="btn btn-primary" onclick="submitTask()">✅ Submit Record</button>';
}

function openEditForm() {
  var t = selectedTask;
  if (!t) return;

  var cratesField = t.type === 'Crates'
    ? '<div class="fg"><label class="fl">Crates Returned Count</label>'
      + '<input class="fi" id="sf-crates" type="number" value="' + t.expectedCrates + '" min="0"></div>'
    : '<input type="hidden" id="sf-crates" value="' + t.expectedCrates + '">';

  var formHtml = '<div class="fg"><label class="fl">Submission Date</label>'
    + '<input class="fi" type="date" id="sf-date" value="' + (t.submissionDate || fmtDate(new Date())) + '"></div>'
    + cratesField
    + '<div class="fg"><label class="fl">Comments (Optional)</label>'
    + '<textarea class="fi" id="sf-comments" rows="3" style="resize:vertical;min-height:70px">' + (t.comments||'') + '</textarea></div>'
    + '<div class="fg"><label class="fl">Signature (Optional)</label>'
    + '<div class="sig-box"><canvas class="sig-canvas" id="sf-sig-canvas"></canvas>'
    + '<div class="sig-actions"><button type="button" class="sig-btn" onclick="clearSig()">Clear</button></div>'
    + '</div></div>'
    + '<div class="fg"><label class="fl">Photo (Optional)</label>'
    + '<input type="file" id="sf-pic-input" accept="image/*" capture="environment" style="display:none" onchange="handlePicUpload(event)">'
    + '<div class="img-upload-box" id="sf-upload-box" onclick="document.getElementById(\'sf-pic-input\').click()">'
    + '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="margin:0 auto;display:block;color:var(--text3)"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2"/></svg>'
    + '<p>Tap to change photo</p></div>'
    + '<div class="img-preview" id="sf-img-preview" style="' + (t.picture ? '' : 'display:none') + '">'
    + '<img id="sf-preview-img" src="' + (t.picture||'') + '" alt=""><div class="img-remove" onclick="removePic()">✕</div></div></div>'
    + '<button class="btn btn-primary" onclick="submitTask()">💾 Save Changes</button>';

  uploadedImage = t.picture || null;
  currentExistingSignature = t.signature || null;

  document.getElementById('ts-body').innerHTML = formHtml;
  setTimeout(function(){
    initSigCanvas();
    if (t.signature) {
      var img = new Image();
      img.onload = function() {
        var c = document.getElementById('sf-sig-canvas');
        if (!c) return;
        var ctx = c.getContext('2d');
        ctx.clearRect(0,0,c.width,c.height);
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
        var scale = Math.min(c.width/img.width, c.height/img.height);
        ctx.drawImage(img, (c.width-img.width*scale)/2, (c.height-img.height*scale)/2, img.width*scale, img.height*scale);
      };
      img.src = t.signature;
    }
    if (t.picture) {
      document.getElementById('sf-img-preview').style.display = 'block';
      document.getElementById('sf-upload-box').style.display = 'none';
    }
  }, 200);
}

// ═══ SUBMIT TASK ══════════════════════════════════════
function submitTask() {
  var t = selectedTask;
  if (!t) return;

  var subDate  = document.getElementById('sf-date').value;
  var comments = document.getElementById('sf-comments').value.trim();
  if (!subDate) { showToast('Please enter a submission date.'); return; }

  var dueDate  = new Date(t.dueDate + 'T23:59:59');
  var subDateD = new Date(subDate + 'T00:00:00');
  var isLate   = subDateD > dueDate;

  // Signature
  var sig = '';
  if (sigDrawn) {
    var c = document.getElementById('sf-sig-canvas');
    if (c) sig = c.toDataURL('image/png');
  } else if (currentExistingSignature) {
    sig = currentExistingSignature;
  }

  var pic = uploadedImage || '';

  var cratesVal = document.getElementById('sf-crates') ? document.getElementById('sf-crates').value : t.expectedCrates;

  var now    = new Date();
  var recId  = t.recordRowIndex ? null : ('REC-' + now.getTime());
  var row = [
    recId || t.id,        // A - ID (use task id as stable key)
    t.tripId,             // B
    t.helperName,         // C
    t.truck,              // D
    t.date,               // E
    t.type,               // F
    cratesVal,            // G - Expected/Actual crates
    'Yes',                // H - Submitted
    subDate,              // I - Submission Date
    isLate ? 'Yes':'No',  // J - Late
    sig,                  // K
    pic,                  // L
    comments              // M
  ];

  // Use task id as record ID for stable upsert
  row[0] = t.id;

  showSaving('Saving record...');

  var savePromise;
  if (t.recordRowIndex) {
    // Update existing row
    savePromise = apiUpdate(TAB_RECORDS + '!A' + t.recordRowIndex + ':M' + t.recordRowIndex, [row]);
  } else {
    // Append new row
    savePromise = apiAppend(TAB_RECORDS + '!A:M', [row]);
  }

  savePromise.then(function(){
    hideSaving();
    showToast(isLate ? '⚠ Submitted (Late)' : '✅ Record submitted!');
    closeSheet('task-sheet');
    loadAll();
  }).catch(function(err){
    hideSaving();
    showToast('❌ Save failed. Try again.');
    console.error(err);
  });
}

// ═══ DELETE TASK ══════════════════════════════════════
function confirmDeleteTask() {
  if (!isAdmin || !selectedTask) return;
  document.getElementById('confirm-title').textContent = 'Delete Record?';
  document.getElementById('confirm-msg').textContent = 'Delete the ' + selectedTask.type + ' record for ' + selectedTask.helperName + ' on ' + selectedTask.date + '? This cannot be undone.';
  document.getElementById('confirm-ok').onclick = doDeleteTask;
  document.getElementById('confirm-overlay').classList.add('open');
}

function doDeleteTask() {
  if (!selectedTask || !selectedTask.recordRowIndex) {
    closeConfirm();
    showToast('No saved record to delete.');
    return;
  }
  closeConfirm();
  showSaving('Deleting...');
  apiUpdate(TAB_RECORDS + '!A' + selectedTask.recordRowIndex + ':M' + selectedTask.recordRowIndex,
    [['','','','','','','','No','','No','','','']])
    .then(function(){
      hideSaving();
      showToast('✅ Record deleted.');
      closeSheet('task-sheet');
      loadAll();
    }).catch(function(err){
      hideSaving();
      showToast('❌ Delete failed.');
      console.error(err);
    });
}

// ═══ FILTERS ══════════════════════════════════════════
function filterTasks(f, btn) {
  taskFilter = f;
  document.querySelectorAll('#content-tasks .filter-chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  renderTasks();
}
function filterAll(f, btn) {
  allFilter = f;
  document.querySelectorAll('#content-all .filter-chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  renderAllTasks();
}

// ═══ TABS ═════════════════════════════════════════════
function switchTab(name) {
  ['tasks','all','report'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    var el = document.getElementById('content-'+t);
    if (el) el.style.display = (t===name ? 'block' : 'none');
  });
  if (name === 'all') renderAllTasks();
  if (name === 'report') {
    if (document.getElementById('rpt-content').style.display === 'none'
      && document.getElementById('rpt-loading').style.display === 'none') {
      generateReport();
    }
  }
}

// ═══ REPORT ═══════════════════════════════════════════
function setRptPeriod(p) {
  rptPeriod = p;
  ['1st','2nd','custom'].forEach(function(x){
    document.getElementById('rpt-btn-'+x).classList.toggle('active', x===p);
  });
  document.getElementById('rpt-custom-wrap').style.display = p==='custom' ? 'block' : 'none';
  if (p !== 'custom') generateReport();
}

function generateReport() {
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth();
  var from, to;

  if (rptPeriod === '1st') {
    from = fmtDate(new Date(y, m, 1));
    to   = fmtDate(new Date(y, m, 15));
  } else if (rptPeriod === '2nd') {
    var lastDay = new Date(y, m+1, 0).getDate();
    from = fmtDate(new Date(y, m, 16));
    to   = fmtDate(new Date(y, m, lastDay));
  } else {
    from = document.getElementById('rpt-from').value;
    to   = document.getElementById('rpt-to').value;
    if (!from || !to) { showToast('Select date range.'); return; }
  }

  document.getElementById('rpt-loading').style.display = 'flex';
  document.getElementById('rpt-content').style.display = 'none';

  // Filter tasks in period
  var periodTasks = generatedTasks.filter(function(t){
    return t.date >= from && t.date <= to;
  });

  // Group by helper
  var helperMap = {};
  periodTasks.forEach(function(t){
    if (!helperMap[t.helperName]) helperMap[t.helperName] = { pod:[], crates:[] };
    if (t.type === 'POD') helperMap[t.helperName].pod.push(t);
    else helperMap[t.helperName].crates.push(t);
  });

  var totalTasks = periodTasks.length;
  var totalDone  = periodTasks.filter(function(t){ return t.submitted; }).length;
  var totalPend  = periodTasks.filter(function(t){ return t.status === 'pending' || t.status === 'overdue'; }).length;

  var statsHtml = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">'
    + statCard(totalTasks, 'Total Tasks', 'var(--text)')
    + statCard(totalDone,  'Submitted',   'var(--green)')
    + statCard(totalPend,  'Pending',     totalPend > 0 ? 'var(--red)' : 'var(--text3)')
    + '</div>';

  var helperCards = Object.keys(helperMap).sort().map(function(name){
    var d = helperMap[name];
    var allTasks   = d.pod.concat(d.crates);
    var submitted  = allTasks.filter(function(t){ return t.submitted; }).length;
    var overdue    = allTasks.filter(function(t){ return t.status === 'overdue'; }).length;
    var late       = allTasks.filter(function(t){ return t.status === 'late'; }).length;
    var pending    = allTasks.filter(function(t){ return t.status === 'pending'; }).length;
    var cleared    = overdue === 0 && pending === 0;

    var podSubmitted   = d.pod.filter(function(t){ return t.submitted; }).length;
    var podTotal       = d.pod.length;
    var podOverdue     = d.pod.filter(function(t){ return t.status === 'overdue'; }).length;
    var podLate        = d.pod.filter(function(t){ return t.status === 'late'; }).length;

    var cratesSubmitted= d.crates.filter(function(t){ return t.submitted; }).length;
    var cratesTotal    = d.crates.length;
    var cratesOverdue  = d.crates.filter(function(t){ return t.status === 'overdue'; }).length;
    var cratesLate     = d.crates.filter(function(t){ return t.status === 'late'; }).length;

    var clearanceClass = cleared ? 'cleared' : 'not-cleared';
    var clearanceLabel = cleared ? '✓ CLEARED' : '✗ NOT CLEARED';

    return '<div class="rpt-emp-card">'
      + '<div class="rpt-emp-name">' + name
      + '<span class="rpt-clearance ' + clearanceClass + '">' + clearanceLabel + '</span></div>'
      + '<div class="rpt-row"><span>📄 POD</span><span class="rpt-row-val ' + (podOverdue > 0 ? 'bad' : podLate > 0 ? 'warn' : 'ok') + '">'
      + podSubmitted + '/' + podTotal + (podOverdue > 0 ? ' (' + podOverdue + ' overdue)' : podLate > 0 ? ' (' + podLate + ' late)' : ' ✓') + '</span></div>'
      + '<div class="rpt-row"><span>📦 Crates</span><span class="rpt-row-val ' + (cratesOverdue > 0 ? 'bad' : cratesLate > 0 ? 'warn' : 'ok') + '">'
      + cratesSubmitted + '/' + cratesTotal + (cratesOverdue > 0 ? ' (' + cratesOverdue + ' overdue)' : cratesLate > 0 ? ' (' + cratesLate + ' late)' : ' ✓') + '</span></div>'
      + (late > 0 ? '<div class="rpt-row"><span>⚠ Late Submissions</span><span class="rpt-row-val warn">' + late + '</span></div>' : '')
      + (pending > 0 ? '<div class="rpt-row"><span>⏳ Still Pending</span><span class="rpt-row-val bad">' + pending + '</span></div>' : '')
      + '</div>';
  }).join('');

  document.getElementById('rpt-loading').style.display = 'none';
  document.getElementById('rpt-content').style.display = 'block';
  document.getElementById('rpt-content').innerHTML =
    '<div style="font-size:11px;color:var(--text3);margin-bottom:12px;font-weight:600">'
    + 'Period: ' + from + ' to ' + to + '</div>'
    + statsHtml
    + (helperCards || '<div class="empty-hint">No tasks in this period.</div>');
}

function statCard(val, lbl, color) {
  return '<div class="rpt-stat"><div class="rpt-stat-val" style="color:' + color + '">' + val + '</div><div class="rpt-stat-lbl">' + lbl + '</div></div>';
}

// ═══ NOTIFICATIONS ════════════════════════════════════
function updateNotifBadge() {
  var myTasks = generatedTasks.filter(function(t){
    return t.helperName.toLowerCase() === currentUser.fullName.toLowerCase();
  });
  var urgent = myTasks.filter(function(t){ return t.status === 'overdue' || t.status === 'pending'; });
  var badge = document.getElementById('notif-badge');
  if (urgent.length > 0) {
    badge.textContent = urgent.length;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function openNotifSheet() {
  var myTasks = generatedTasks.filter(function(t){
    return t.helperName.toLowerCase() === currentUser.fullName.toLowerCase()
      && (t.status === 'overdue' || t.status === 'pending');
  });

  if (!myTasks.length) {
    showToast('✓ No pending tasks!');
    return;
  }

  document.getElementById('notif-list').innerHTML = myTasks.map(function(t){
    var icon = t.status === 'overdue' ? '🔴' : '🟡';
    return '<div class="notif-item">'
      + '<div class="notif-icon">' + icon + '</div>'
      + '<div><div class="notif-text">' + (t.type==='POD'?'📄 POD':'📦 Crates') + ' — ' + t.truck + '</div>'
      + '<div class="notif-meta">' + t.date + ' · Due: ' + t.dueDate + '</div></div>'
      + '</div>';
  }).join('');

  document.getElementById('notif-sheet').classList.add('open');
}

// ═══ SIGNATURE CANVAS ═════════════════════════════════
function initSigCanvas() {
  sigCanvas = document.getElementById('sf-sig-canvas');
  if (!sigCanvas) return;
  sigCtx = sigCanvas.getContext('2d');
  var rect = sigCanvas.getBoundingClientRect();
  sigCanvas.width  = rect.width;
  sigCanvas.height = rect.height || 110;
  sigCtx.fillStyle = '#fff';
  sigCtx.fillRect(0,0,sigCanvas.width,sigCanvas.height);
  sigDrawn = false;
  uploadedImage = null;
  currentExistingSignature = null;
  setupSigEvents();
}

function setupSigEvents() {
  if (!sigCanvas) return;
  var drawing = false, lx = 0, ly = 0;
  function pos(e) {
    var r = sigCanvas.getBoundingClientRect();
    var t = e.touches ? e.touches[0] : e;
    return { x:(t.clientX-r.left)*(sigCanvas.width/r.width), y:(t.clientY-r.top)*(sigCanvas.height/r.height) };
  }
  function start(e){ drawing=true; sigDrawn=true; currentExistingSignature=null; var p=pos(e); lx=p.x; ly=p.y; }
  function move(e){ if(!drawing)return; e.preventDefault(); var p=pos(e); sigCtx.beginPath(); sigCtx.moveTo(lx,ly); sigCtx.lineTo(p.x,p.y); sigCtx.strokeStyle='#000'; sigCtx.lineWidth=2; sigCtx.lineCap='round'; sigCtx.stroke(); lx=p.x; ly=p.y; }
  function end(){ drawing=false; }
  sigCanvas.addEventListener('mousedown',start);
  sigCanvas.addEventListener('mousemove',move);
  sigCanvas.addEventListener('mouseup',end);
  sigCanvas.addEventListener('mouseleave',end);
  sigCanvas.addEventListener('touchstart',start,{passive:false});
  sigCanvas.addEventListener('touchmove',move,{passive:false});
  sigCanvas.addEventListener('touchend',end,{passive:false});
}

function clearSig() {
  if (!sigCanvas) return;
  sigCtx.fillStyle='#fff'; sigCtx.fillRect(0,0,sigCanvas.width,sigCanvas.height);
  sigDrawn=false; currentExistingSignature=null;
}

// ═══ IMAGE UPLOAD ═════════════════════════════════════
function handlePicUpload(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var max = 800, w = img.width, h = img.height;
      if (w > h && w > max) { h *= max/w; w = max; }
      else if (h > max) { w *= max/h; h = max; }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var q=0.7, result=canvas.toDataURL('image/jpeg',q);
      while (result.length/1024>150 && q>0.1) { q-=0.1; result=canvas.toDataURL('image/jpeg',q); }
      uploadedImage = result;
      document.getElementById('sf-preview-img').src = result;
      document.getElementById('sf-img-preview').style.display = 'block';
      document.getElementById('sf-upload-box').style.display = 'none';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function removePic() {
  uploadedImage = null;
  document.getElementById('sf-img-preview').style.display = 'none';
  document.getElementById('sf-upload-box').style.display = 'block';
  document.getElementById('sf-pic-input').value = '';
}

// ═══ API ══════════════════════════════════════════════
function apiGet(range) {
  return fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(range),
    {headers:{Authorization:'Bearer '+token}})
    .then(function(r){ if(r.status===401){location.href='index.html';throw new Error('Auth');} return r.json(); });
}
function apiAppend(range, values) {
  return fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(range)+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS',
    {method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({values:values})})
    .then(function(r){ if(!r.ok) throw new Error('Append failed'); return r.json(); });
}
function apiUpdate(range, values) {
  return fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent(range)+'?valueInputOption=USER_ENTERED',
    {method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({values:values})})
    .then(function(r){ if(!r.ok) throw new Error('Update failed'); return r.json(); });
}

// ═══ HELPERS ══════════════════════════════════════════
function fmtDate(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n) { return n<10?'0'+n:String(n); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
function showSaving(m) { document.getElementById('saving-text').textContent=m||'Saving...'; document.getElementById('saving-overlay').classList.add('show'); }
function hideSaving() { document.getElementById('saving-overlay').classList.remove('show'); }
var _tt;
function showToast(m) { var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(function(){ t.classList.remove('show'); },3000); }

// Close sheets on backdrop tap
['task-sheet','notif-sheet'].forEach(function(id){
  var el=document.getElementById(id);
  if(el) el.addEventListener('click',function(e){ if(e.target===el) el.classList.remove('open'); });
});
</script>
