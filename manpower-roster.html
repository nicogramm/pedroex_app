<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e0e0e5">
<title>Manpower Roster | PedroEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #e0e0e5; --bg2: #e8e8ed; --shadow-d: #b8b9be; --shadow-l: #ffffff;
  --text: #2a2a2e; --text2: #777; --text3: #aaa; --red: #B32533; --red-d: #8f1e29;
  --green: #2d7a3e; --blue: #2563eb; --orange: #ea580c;
  --neu-out: 6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
  --neu-in: inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm: 4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs: 3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
}
body.dark {
  --bg: #2a2a2f; --bg2: #313137; --shadow-d: #16161a; --shadow-l: #3e3e46;
  --text: #e8e8ec; --text2: #888; --text3: #555;
  --green: #34d399; --blue: #60a5fa; --orange: #fb923c;
  --neu-out: 5px 5px 12px var(--shadow-d), -3px -3px 9px var(--shadow-l);
  --neu-in: inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm: 4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs: 3px 3px 7px var(--shadow-d), -2px -2px 6px var(--shadow-l);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; transition:background 0.4s,color 0.4s }

/* TOPBAR - FIXED DESIGN */
.topbar {
  background:var(--bg); display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; padding-top:calc(env(safe-area-inset-top,0px) + 14px);
  box-shadow:0 3px 10px rgba(0,0,0,0.07); flex-shrink:0; position:relative; z-index:50;
}
body.dark .topbar { box-shadow:0 3px 10px rgba(0,0,0,0.3) }

/* ✅ CLOSE BUTTON - X ICON */
.tb-back { 
  background:var(--bg); border:none; border-radius:12px; box-shadow:var(--neu-sm);
  width:40px; height:40px; color:var(--red); font-size:22px; font-weight:400;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; line-height:1;
}
.tb-back:active { box-shadow:var(--neu-in); transform:scale(0.95) }

.tb-title { 
  font-size:17px; font-weight:700; letter-spacing:-0.4px; color:var(--text);
  position:absolute; left:50%; transform:translateX(-50%);
}

/* ✅ WEEK NAV BUTTONS - NEUMORPHIC STYLE */
.tb-action { display:flex; gap:8px }
.tb-btn { 
  background:var(--bg); border:none; border-radius:12px; box-shadow:var(--neu-sm);
  width:40px; height:40px; color:var(--red); font-size:20px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.tb-btn:active { box-shadow:var(--neu-in); transform:scale(0.95) }

/* PAGE */
.page-wrap { 
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; 
  padding:16px; padding-bottom:calc(90px + env(safe-area-inset-bottom,0px));
  height:calc(100vh - 68px);
}

/* HEADER CARD */
.header-card {
  background:var(--bg); border-radius:18px; box-shadow:var(--neu-out);
  padding:20px; margin-bottom:20px;
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px }
.current-week { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3) }
.week-nav-mini { display:flex; gap:8px }
.week-nav-mini button {
  background:var(--bg); border:none; border-radius:10px; box-shadow:var(--neu-xs);
  padding:8px 16px; color:var(--red); font-size:12px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:box-shadow 0.15s;
  font-family:'Inter',sans-serif;
}
.week-nav-mini button:active { box-shadow:var(--neu-in); transform:scale(0.95) }

.week-display { font-size:20px; font-weight:700; color:var(--text); letter-spacing:-0.5px; margin-bottom:6px }
.week-meta { font-size:12px; color:var(--text2) }

/* VIEW TOGGLE */
.view-toggle {
  display:flex; gap:8px; background:var(--bg); border-radius:14px; box-shadow:var(--neu-in);
  padding:4px; margin-bottom:20px;
}
.view-btn {
  flex:1; padding:10px; background:transparent; border:none; border-radius:10px;
  font-size:13px; font-weight:600; font-family:'Inter',sans-serif; color:var(--text3);
  cursor:pointer; transition:all 0.2s;
}
.view-btn.active {
  background:var(--bg); box-shadow:var(--neu-sm); color:var(--red);
}

/* ✅ CALENDAR VIEW - HORIZONTAL SCROLL */
.calendar-view { display:none }
.calendar-view.active { display:block }

.calendar-scroll-container {
  overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch;
  margin:0 -16px; padding:0 16px;
}

.calendar-header {
  display:grid; grid-template-columns:repeat(7, minmax(110px, 1fr)); gap:8px; margin-bottom:12px;
  min-width:max-content;
}
.cal-day-label {
  text-align:center; font-size:10px; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; color:var(--text3); padding:8px 0;
}

.calendar-grid {
  display:grid; grid-template-columns:repeat(7, minmax(110px, 1fr)); gap:8px;
  min-width:max-content;
}
.cal-day {
  background:var(--bg); border-radius:12px; box-shadow:var(--neu-sm);
  padding:12px 8px; text-align:center; cursor:pointer; transition:box-shadow 0.15s;
  min-height:140px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
}
.cal-day:active { box-shadow:var(--neu-in); transform:scale(0.98) }
.cal-day.today { 
  box-shadow:var(--neu-in);
  border:2px solid var(--red);
}
.cal-day.other-month { opacity:0.3; pointer-events:none }

.cal-date { 
  font-size:18px; font-weight:700; color:var(--text); 
  margin-bottom:10px; padding-bottom:8px;
  border-bottom:1px solid var(--shadow-d);
  width:100%;
}

/* ✅ CALENDAR - RED FONT FOR TRUCKS AND NAMES */
.cal-helper-list {
  width:100%; display:flex; flex-direction:column; gap:4px; align-items:flex-start;
}
.cal-helper-row {
  font-size:9px; color:var(--text2); 
  display:flex; width:100%; justify-content:space-between;
  padding:0 4px;
}
.cal-truck { 
  font-weight:700; color:var(--red); 
  min-width:30px; text-align:left;
}
.cal-name { 
  font-weight:600; color:var(--red); 
  text-align:right; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

/* ✅ TRUCK VIEW - RED ICONS ONLY */
.truck-view { display:none }
.truck-view.active { display:block }

.truck-card {
  background:var(--bg); border-radius:16px; box-shadow:var(--neu-out);
  padding:18px; margin-bottom:14px; transition:box-shadow 0.2s;
}
.truck-card:active { box-shadow:var(--neu-in); transform:scale(0.99) }

.truck-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
  padding-bottom:12px; border-bottom:2px solid var(--shadow-d);
}
.truck-name { 
  font-size:18px; font-weight:700; color:var(--text); 
  letter-spacing:-0.3px; display:flex; align-items:center; gap:10px;
}
.truck-icon {
  width:36px; height:36px; border-radius:10px; background:var(--red);
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--neu-xs);
}
.truck-icon svg { width:20px; height:20px; stroke:#fff; stroke-width:2 }

.truck-status {
  font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  padding:6px 12px; border-radius:8px; background:var(--bg); box-shadow:var(--neu-xs);
}
.truck-status.active { color:var(--red) }

.crew-info { display:flex; flex-direction:column; gap:12px }
.crew-row { 
  display:flex; align-items:center; gap:14px;
  padding:12px; border-radius:12px; background:var(--bg2);
  box-shadow:var(--neu-xs);
}
.crew-icon {
  width:40px; height:40px; border-radius:10px; background:var(--bg);
  box-shadow:var(--neu-sm); display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.crew-icon svg { width:20px; height:20px }
.crew-details { flex:1 }
.crew-label { 
  font-size:10px; font-weight:600; letter-spacing:1px; 
  text-transform:uppercase; color:var(--text3); margin-bottom:4px;
}
.crew-name { font-size:15px; font-weight:600; color:var(--text) }

/* ✅ LIST VIEW - ORIGINAL DESIGN WITH COLORS */
.list-view { display:none }
.list-view.active { display:block }

.roster-table {
  background:var(--bg); border-radius:16px; box-shadow:var(--neu-out);
  padding:16px; overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.roster-table table {
  width:100%; border-collapse:collapse; font-size:12px;
  min-width:600px;
}
.roster-table th {
  font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  color:var(--text3); text-align:left; padding:12px 10px; 
  border-bottom:2px solid var(--shadow-d);
  position:sticky; top:0; background:var(--bg); z-index:10;
}
.roster-table td {
  padding:14px 10px; border-bottom:1px solid var(--shadow-d); 
  color:var(--text2); font-weight:500;
}
.roster-table tr:last-child td { border-bottom:none }
.roster-table tr:hover { background:var(--bg2) }
.roster-table .date-col { 
  font-weight:600; color:var(--text); 
  min-width:100px; position:sticky; left:0; background:var(--bg); z-index:5;
}
.roster-table .name-col { color:var(--text); font-weight:500 }

/* ✅ LIST VIEW - KEEP ORIGINAL TRUCK COLORS */
.roster-table .truck-CAH { color:var(--red) !important; font-weight:600 }
.roster-table .truck-CBQ { color:var(--blue) !important; font-weight:600 }
.roster-table .truck-CAN { color:var(--green) !important; font-weight:600 }
.roster-table .truck-NHE { color:var(--orange) !important; font-weight:600 }
.roster-table .truck-CBJ { color:var(--text) !important; font-weight:600 }

/* TOAST */
.toast {
  position:fixed; bottom:calc(80px + env(safe-area-inset-bottom,0px)); 
  left:50%; transform:translateX(-50%);
  background:var(--bg); border-radius:14px; box-shadow:var(--neu-out); 
  border-left:4px solid var(--red);
  padding:16px 24px; font-size:13px; font-weight:500; color:var(--text); 
  z-index:300; max-width:90%; text-align:left;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.toast.show { opacity:1 }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background:var(--bg);
  padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));
  display:flex; align-items:center; justify-content:space-around;
  box-shadow:0 -3px 14px rgba(0,0,0,0.07); z-index:40;
}
body.dark .bottom-nav { box-shadow:0 -3px 14px rgba(0,0,0,0.4) }
.bnav {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  font-size:9px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
  color:var(--text3); cursor:pointer; border:none; background:none; font-family:'Inter',sans-serif;
}
.bnav.active { color:var(--red) }
.bnav-icon {
  width:42px; height:42px; border-radius:14px; background:var(--bg);
  display:flex; align-items:center; justify-content:center; transition:box-shadow 0.2s;
}
.bnav:not(.active) .bnav-icon { box-shadow:var(--neu-sm) }
.bnav.active .bnav-icon { box-shadow:var(--neu-in) }

/* LOADING */
.loading {
  text-align:center; padding:40px; color:var(--text3);
}
.loading svg {
  width:40px; height:40px; animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg) } }

.scroll-hint {
  text-align:center; padding:12px; font-size:11px; color:var(--text3);
  font-weight:600; letter-spacing:1px; text-transform:uppercase;
}
</style>
</head>
<body>

<div class="topbar">
  <button class="tb-back" onclick="location.href='index.html'">✕</button>
  <span class="tb-title">Manpower Roster</span>
  <div class="tb-action">
    <button class="tb-btn" onclick="changeWeek(-1)">‹</button>
    <button class="tb-btn" onclick="changeWeek(1)">›</button>
  </div>
</div>

<div class="page-wrap">
  <!-- HEADER CARD -->
  <div class="header-card">
    <div class="header-top">
      <span class="current-week" id="week-label">WEEK 1</span>
      <div class="week-nav-mini">
        <button onclick="goToToday()">Today</button>
      </div>
    </div>
    <div class="week-display" id="week-range">May 5 – May 11, 2025</div>
    <div class="week-meta" id="week-meta">5 helpers on rotation</div>
  </div>

  <!-- VIEW TOGGLE -->
  <div class="view-toggle">
    <button class="view-btn active" onclick="switchView('calendar')">📅 Calendar</button>
    <button class="view-btn" onclick="switchView('truck')">🚛 By Truck</button>
    <button class="view-btn" onclick="switchView('list')">📋 List</button>
  </div>

  <!-- CALENDAR VIEW -->
  <div class="calendar-view active" id="calendar-view">
    <div class="calendar-scroll-container">
      <div class="calendar-header">
        <div class="cal-day-label">Mon</div>
        <div class="cal-day-label">Tue</div>
        <div class="cal-day-label">Wed</div>
        <div class="cal-day-label">Thu</div>
        <div class="cal-day-label">Fri</div>
        <div class="cal-day-label">Sat</div>
        <div class="cal-day-label">Sun</div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
    <div class="scroll-hint">← Swipe to see all days →</div>
  </div>

  <!-- TRUCK VIEW -->
  <div class="truck-view" id="truck-view"></div>

  <!-- LIST VIEW -->
  <div class="list-view" id="list-view">
    <div class="roster-table">
      <table id="roster-table"></table>
    </div>
    <div class="scroll-hint">← Swipe to see all trucks →</div>
  </div>

  <div class="loading" id="loading" style="display:none">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
    <p style="margin-top:12px">Loading roster...</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav" onclick="location.href='index.html'">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="currentColor" stroke-width="2"/><path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2"/></svg></div>
    Home
  </button>
  <button class="bnav" onclick="location.href='trucks.html'">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="1" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M15 11h4l3 4v3h-7" stroke="currentColor" stroke-width="2"/><circle cx="5" cy="19" r="2" stroke="currentColor" stroke-width="2"/><circle cx="18" cy="19" r="2" stroke="currentColor" stroke-width="2"/></svg></div>
    Trucks
  </button>
  <button class="bnav" onclick="location.href='trips.html'">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/></svg></div>
    Trips
  </button>
  <button class="bnav" onclick="location.href='billing.html'">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 7h8M8 11h8M8 15h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
    Billing
  </button>
  <button class="bnav active">
    <div class="bnav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="8" y="2" width="8" height="4" rx="1" stroke="currentColor" stroke-width="2"/><path d="M6 4h12a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="currentColor" stroke-width="2"/><path d="M9 12l2 2 4-4M9 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    Roster
  </button>
</div>

<script>
const SHEET_ID = '174cZS7GPowtmwykUd3JccGqxdGSApUKwNLTDPeulb2U';
let token = localStorage.getItem('pedroex-token');

const REFERENCE_WEEK = {
  number: 1,
  startDate: new Date('2025-05-05')
};

const TRUCK_MAPPING = {
  'CAH': 0,
  'CBQ': 1,
  'CAN': 2,
  'NHE': 3,
  'CBJ': 4
};

const ROTATION_PHASES = [
  {
    startWeek: 1,
    endWeek: 23,
    helpers: ['Mike', 'Richard', 'Ronald', 'Anewlesis', 'Michael']
  },
  {
    startWeek: 24,
    endWeek: 24,
    helpers: ['Anewlesis', 'Joey', 'Richard', 'Mike', 'Jessie']
  },
  {
    startWeek: 25,
    endWeek: 999,
    helpers: ['Joey', 'Richard', 'Mike', 'Jessie', 'Anewlesis']
  }
];

let currentHelpers = [];
let currentWeekOffset = 0;
let currentView = 'calendar';
let employeeHelpers = [];

(function() {
  const dark = localStorage.getItem('pedroex-theme') === 'dark';
  document.body.classList.toggle('dark', dark);
})();

(function init() {
  if (!token) { location.href = 'index.html'; return; }
  
  // ✅ FIX: Calculate correct week offset from reference week
  const today = new Date();
  today.setHours(0, 0, 0, 0); // Reset time to midnight
  
  const refDate = new Date(REFERENCE_WEEK.startDate);
  refDate.setHours(0, 0, 0, 0);
  
  // Calculate days difference (can be negative if today is before reference)
  const daysDiff = Math.floor((today - refDate) / (1000 * 60 * 60 * 24));
  
  // Calculate week offset (can be negative)
  currentWeekOffset = Math.floor(daysDiff / 7);
  
  console.log('📅 Today:', today.toDateString());
  console.log('📅 Reference Week Start:', refDate.toDateString());
  console.log('📊 Days Difference:', daysDiff);
  console.log('📊 Week Offset:', currentWeekOffset);
  
  loadHelpers();
})();

function loadHelpers() {
  document.getElementById('loading').style.display = 'block';
  
  fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Employees!A2:C`, {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const rows = res.values || [];
    
    employeeHelpers = rows
      .filter(r => (r[2] || '').toLowerCase() === 'helper')
      .map(r => r[1])
      .filter(Boolean);
    
    document.getElementById('loading').style.display = 'none';
    renderCurrentView();
  })
  .catch(() => {
    showToast('⚠️ Using default helper list');
    employeeHelpers = [];
    document.getElementById('loading').style.display = 'none';
    renderCurrentView();
  });
}

function getHelpersForWeek(weekNumber) {
  const phase = ROTATION_PHASES.find(p => weekNumber >= p.startWeek && weekNumber <= p.endWeek);
  
  if (!phase) {
    return ROTATION_PHASES[ROTATION_PHASES.length - 1].helpers;
  }
  
  if (employeeHelpers.length > 0) {
    return phase.helpers.map(name => {
      const match = employeeHelpers.find(h => h.toLowerCase() === name.toLowerCase());
      return match || name;
    });
  }
  
  return phase.helpers;
}

function getWeekData(offset = 0) {
  const weekNumber = REFERENCE_WEEK.number + offset;
  const startDate = new Date(REFERENCE_WEEK.startDate);
  startDate.setDate(startDate.getDate() + (offset * 7));
  
  const endDate = new Date(startDate);
  endDate.setDate(endDate.getDate() + 6);
  
  const helpers = getHelpersForWeek(weekNumber);
  
  const phase = ROTATION_PHASES.find(p => weekNumber >= p.startWeek && weekNumber <= p.endWeek);
  const weeksIntoPhase = weekNumber - (phase ? phase.startWeek : 1);
  const rotationOffset = weeksIntoPhase % helpers.length;
  
  return {
    weekNumber,
    startDate,
    endDate,
    helpers,
    rotationOffset
  };
}

function getHelperForTruck(truck, date, helpers, rotationOffset) {
  const truckIndex = TRUCK_MAPPING[truck];
  if (truckIndex === undefined) return '—';
  
  const helperIndex = (truckIndex + rotationOffset + helpers.length) % helpers.length;
  return helpers[helperIndex] || '—';
}

function changeWeek(direction) {
  currentWeekOffset += direction;
  renderCurrentView();
}

function goToToday() {
  const today = new Date();
  const daysDiff = Math.floor((today - REFERENCE_WEEK.startDate) / (1000 * 60 * 60 * 24));
  currentWeekOffset = Math.floor(daysDiff / 7);
  renderCurrentView();
}

function switchView(view) {
  currentView = view;
  
  document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  document.querySelectorAll('.calendar-view, .truck-view, .list-view').forEach(v => v.classList.remove('active'));
  document.getElementById(view + '-view').classList.add('active');
  
  renderCurrentView();
}

function renderCurrentView() {
  const week = getWeekData(currentWeekOffset);
  
  document.getElementById('week-label').textContent = `WEEK ${week.weekNumber}`;
  document.getElementById('week-range').textContent = 
    `${week.startDate.toLocaleDateString('en-US', {month:'short', day:'numeric'})} – ${week.endDate.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}`;
  document.getElementById('week-meta').textContent = `${week.helpers.length} helpers on rotation`;
  
  if (currentView === 'calendar') renderCalendar(week);
  else if (currentView === 'truck') renderTruckView(week);
  else if (currentView === 'list') renderListView(week);
}

function renderCalendar(week) {
  const grid = document.getElementById('calendar-grid');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  let html = '';
  
  for (let i = 0; i < 7; i++) {
    const d = new Date(week.startDate);
    d.setDate(d.getDate() + i);
    
    const isToday = d.getTime() === today.getTime();
    
    const helpersHtml = Object.keys(TRUCK_MAPPING).map(truck => {
      const helper = getHelperForTruck(truck, d, week.helpers, week.rotationOffset);
      return `<div class="cal-helper-row">
        <span class="cal-truck">${truck}</span>
        <span class="cal-name">${helper}</span>
      </div>`;
    }).join('');
    
    html += `<div class="cal-day ${isToday ? 'today' : ''}" onclick="showDayDetails('${d.toISOString()}', '${JSON.stringify(week.helpers)}', ${week.rotationOffset})">
      <div class="cal-date">${d.getDate()}</div>
      <div class="cal-helper-list">${helpersHtml}</div>
    </div>`;
  }
  
  grid.innerHTML = html;
}

function renderTruckView(week) {
  const view = document.getElementById('truck-view');
  
  const html = Object.keys(TRUCK_MAPPING).map(truck => {
    const helper = getHelperForTruck(truck, week.startDate, week.helpers, week.rotationOffset);
    
    return `<div class="truck-card">
      <div class="truck-header">
        <div class="truck-name">
          <div class="truck-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="1" y="8" width="14" height="10" rx="2" stroke="currentColor"/>
              <path d="M15 11h4l3 4v3h-7" stroke="currentColor"/>
              <circle cx="5" cy="19" r="2" stroke="currentColor"/>
              <circle cx="18" cy="19" r="2" stroke="currentColor"/>
            </svg>
          </div>
          Truck ${truck}
        </div>
        <div class="truck-status active">Active</div>
      </div>
      <div class="crew-info">
        <div class="crew-row">
          <div class="crew-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="var(--red)" stroke-width="2"/>
              <path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2" stroke="var(--red)" stroke-width="2"/>
            </svg>
          </div>
          <div class="crew-details">
            <div class="crew-label">Helper (This Week)</div>
            <div class="crew-name">${helper}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  
  view.innerHTML = html + '<div class="scroll-hint">Scroll for more trucks ↓</div>';
}

function renderListView(week) {
  const table = document.getElementById('roster-table');
  
  let html = `<thead><tr>
    <th class="date-col">Date</th>
    ${Object.keys(TRUCK_MAPPING).map(t => `<th>${t}</th>`).join('')}
  </tr></thead><tbody>`;
  
  for (let i = 0; i < 7; i++) {
    const d = new Date(week.startDate);
    d.setDate(d.getDate() + i);
    
    html += `<tr>
      <td class="date-col">${d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})}</td>
      ${Object.keys(TRUCK_MAPPING).map(truck => {
        const helper = getHelperForTruck(truck, d, week.helpers, week.rotationOffset);
        return `<td class="name-col truck-${truck}">${helper}</td>`;
      }).join('')}
    </tr>`;
  }
  
  html += '</tbody>';
  table.innerHTML = html;
}

function showDayDetails(dateStr, helpersJson, rotationOffset) {
  const d = new Date(dateStr);
  const helpers = JSON.parse(helpersJson);
  const dayName = d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  
  const assignments = Object.keys(TRUCK_MAPPING).map(truck => {
    const helper = getHelperForTruck(truck, d, helpers, rotationOffset);
    return `${truck}: ${helper}`;
  }).join('\n');
  
  showToast(`${dayName}\n\n${assignments}`);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.style.whiteSpace = 'pre-line';
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}
</script>
