<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PedroEX">
<meta name="theme-color" content="#e0e0e5">
<link rel="manifest" href="manifest.json">
<title>Trips — PedroEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#e0e0e5;--bg2:#e8e8ed;--shadow-d:#b8b9be;--shadow-l:#ffffff;
  --text:#2a2a2e;--text2:#777;--text3:#aaa;
  --red:#B32533;--green:#16a34a;--orange:#f59e0b;--blue:#2563eb;
  --neu-out:6px 6px 14px var(--shadow-d),-4px -4px 10px var(--shadow-l);
  --neu-in:inset 4px 4px 8px var(--shadow-d),inset -3px -3px 7px var(--shadow-l);
  --neu-sm:4px 4px 8px var(--shadow-d),-3px -3px 7px var(--shadow-l);
  --neu-xs:3px 3px 6px var(--shadow-d),-2px -2px 5px var(--shadow-l);
}
body.dark {
  --bg:#2a2a2f;--bg2:#313137;--shadow-d:#16161a;--shadow-l:#3e3e46;
  --text:#e8e8ec;--text2:#888;--text3:#555;
  --neu-out:5px 5px 12px var(--shadow-d),-3px -3px 9px var(--shadow-l);
  --neu-in:inset 4px 4px 8px var(--shadow-d),inset -3px -3px 7px var(--shadow-l);
  --neu-sm:4px 4px 8px var(--shadow-d),-3px -3px 7px var(--shadow-l);
  --neu-xs:3px 3px 7px var(--shadow-d),-2px -2px 6px var(--shadow-l);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background 0.4s,color 0.4s}
.screen{display:flex;flex-direction:column;height:100dvh;width:100%}
.topbar{background:var(--bg);display:flex;align-items:center;justify-content:space-between;padding:14px 18px;padding-top:calc(env(safe-area-inset-top,0px) + 14px);flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,0.07)}
body.dark .topbar{box-shadow:0 3px 10px rgba(0,0,0,0.3)}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.tb-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--red);object-fit:cover;box-shadow:var(--neu-xs)}
.page-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:100px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ph-left{display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;background:var(--bg);border:none;border-radius:12px;box-shadow:var(--neu-sm);color:var(--text2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.back-btn:active{box-shadow:var(--neu-in)}
.page-title{font-size:20px;font-weight:700;color:var(--text)}

/* FAB */
.fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));right:18px;width:54px;height:54px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:28px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:5px 5px 14px rgba(179,37,51,0.5),-2px -2px 8px rgba(179,37,51,0.2);z-index:50}
.fab:active{transform:scale(0.93)}

/* CARDS */
.neu-card{background:var(--bg);border-radius:20px;box-shadow:var(--neu-out);padding:20px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}

/* FORM */
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.fi{width:100%;background:var(--bg);border:none;border-radius:12px;box-shadow:var(--neu-in);padding:12px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none}
.fi:focus{box-shadow:var(--neu-in),0 0 0 2px rgba(179,37,51,0.2)}
select.fi{cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* TOGGLE */
.toggle-group{display:flex;background:var(--bg);border-radius:12px;box-shadow:var(--neu-in);overflow:hidden}
.tg-btn{flex:1;padding:12px;border:none;background:none;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;color:var(--text2);cursor:pointer;transition:all 0.2s}
.tg-btn.active-yes{background:var(--green);color:#fff;box-shadow:none}
.tg-btn.active-no{background:var(--red);color:#fff;box-shadow:none}

/* BUTTONS */
.btn{padding:14px;border-radius:14px;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;background:var(--bg);transition:box-shadow 0.15s}
.btn:active{transform:scale(0.98)}
.btn-red{background:var(--red);color:#fff;box-shadow:4px 4px 12px rgba(179,37,51,0.4),-2px -2px 8px rgba(179,37,51,0.1)}
.btn-ghost{color:var(--text2);box-shadow:var(--neu-sm)}
.btn-ghost:active{box-shadow:var(--neu-in)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:15px;font-weight:700;color:var(--text)}
.cal-nav{width:32px;height:32px;background:var(--bg);border:none;border-radius:10px;box-shadow:var(--neu-sm);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-nav:active{box-shadow:var(--neu-in)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dn{font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);text-align:center;padding:4px 0}
.cal-day {
  border-radius: 10px;
  padding: 4px 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  min-height: 44px;
  max-height: 70px; /* ✅ DAGDAG: I-limit ang height */
  overflow: hidden; /* ✅ DAGDAG: I-hide ang labis */
  position: relative;
  transition: box-shadow 0.15s;
}
.cal-day-num{font-size:13px;font-weight:500;color:var(--text2);line-height:1.4}
.cal-day.today .cal-day-num{color:var(--red);font-weight:700}
.cal-day.has-trip{box-shadow:var(--neu-xs)}
.cal-day.has-trip .cal-day-num{color:var(--text);font-weight:600}
.cal-day.selected{box-shadow:var(--neu-in)}
.cal-day.other-month{opacity:0.3}
/* ✅ FIXED NAMES CONTAINER */
.cal-names {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
  width: 100%;
  max-height: 40px; /* ✅ DAGDAG: I-limit ang height ng pills */
  overflow: hidden; /* ✅ DAGDAG: I-hide ang sobra */
}

/* ✅ SMALLER PILLS PARA FIT MORE */
.cal-name-pill {
  font-size: 7px; /* ✅ BINAGO: Mas maliit from 8px */
  font-weight: 700;
  padding: 1px 4px; /* ✅ BINAGO: Mas compact from 1px 5px */
  border-radius: 5px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  margin-bottom: 1px;
  line-height: 1.3;
}
/* DAY PANEL */
.day-panel{background:var(--bg);border-radius:16px;box-shadow:var(--neu-out);padding:16px;margin-top:12px;display:none}
.day-panel.show{display:block;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.day-panel-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}
.trip-item{background:var(--bg);border-radius:12px;box-shadow:var(--neu-xs);padding:12px 14px;margin-bottom:8px;cursor:pointer}
.trip-item:active{box-shadow:var(--neu-in)}
.trip-truck{font-size:14px;font-weight:600;color:var(--text)}
.trip-meta{font-size:11px;color:var(--text2);margin-top:3px}
.trip-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--bg);box-shadow:var(--neu-xs);color:var(--text2)}
.badge.green{background:var(--green);color:#fff;box-shadow:none}
.badge.red{background:var(--red);color:#fff;box-shadow:none}
.badge.blue{background:var(--blue);color:#fff;box-shadow:none}
.badge.orange{background:var(--orange);color:#fff;box-shadow:none}

/* FILTER TAGS */
.filter-tag{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border-radius:20px;box-shadow:var(--neu-xs);padding:4px 10px;font-size:11px;font-weight:600;color:var(--red)}
.filter-tag button{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0;line-height:1;font-family:Inter,sans-serif}

/* LEGEND */
.legend-item{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:20px;box-shadow:var(--neu-xs);padding:4px 10px;font-size:11px;font-weight:600;color:var(--text)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* DETAIL SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:flex-end}
.sheet-overlay.open{display:flex}
.sheet{background:var(--bg);border-radius:28px 28px 0 0;padding:8px 22px calc(28px + env(safe-area-inset-bottom,0px));width:100%;max-height:85dvh;overflow-y:auto;animation:slideUp 0.28s cubic-bezier(0.16,1,0.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:var(--text3);border-radius:2px;margin:0 auto 16px;opacity:0.3}
.sheet-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.sheet-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.dt-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
body.dark .dt-row{border-bottom-color:rgba(255,255,255,0.04)}
.dt-row:last-child{border-bottom:none}
.dt-label{font-size:11px;color:var(--text3);font-weight:600}
.dt-val{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:65%}

/* RATE CALCULATOR */
.rate-calc-box{background:var(--bg2);border-radius:14px;padding:14px;margin-top:10px;border-left:3px solid var(--blue)}
.rate-calc-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.rate-calc-info{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.rate-display{font-size:18px;font-weight:700;color:var(--text);margin-top:8px}
.rate-base{font-size:11px;color:var(--text3);margin-top:4px}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--bg);border-radius:22px;padding:24px;max-width:340px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.confirm-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.confirm-msg{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.cb{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none}
.cb-cancel{background:var(--bg);color:var(--text2);box-shadow:var(--neu-sm)}
.cb-cancel:active{box-shadow:var(--neu-in)}
.cb-confirm{background:var(--red);color:#fff;box-shadow:4px 4px 12px rgba(179,37,51,0.4)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;justify-content:space-around;box-shadow:0 -3px 14px rgba(0,0,0,0.07);z-index:40}
body.dark .bottom-nav{box-shadow:0 -3px 14px rgba(0,0,0,0.4)}
.bnav{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif}
.bnav.active{color:var(--red)}
.bnav-icon{width:42px;height:42px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center}
.bnav:not(.active) .bnav-icon{box-shadow:var(--neu-sm)}
.bnav.active .bnav-icon{box-shadow:var(--neu-in)}

/* LOADING / TOAST / SAVING */
.loading-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:56px;color:var(--text3);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--text3);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--bg);border-radius:14px;box-shadow:var(--neu-out);border-left:3px solid var(--red);padding:13px 22px;font-size:13px;font-weight:500;color:var(--text);z-index:400;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.25s}
.toast.show{opacity:1}
.saving-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center}
.saving-overlay.show{display:flex}
.saving-box{background:var(--bg);border-radius:20px;padding:28px 32px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.saving-spinner{width:36px;height:36px;border:3px solid var(--text3);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
.saving-text{font-size:14px;color:var(--text2);font-weight:500}

.empty-hint{text-align:center;padding:32px 20px;color:var(--text3);font-size:13px}
.icon-btn{background:var(--bg);border:none;border-radius:10px;box-shadow:var(--neu-xs);color:var(--text2);padding:8px 14px;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer}
.icon-btn:active{box-shadow:var(--neu-in)}

/* USER EDITABLE FIELDS */
.user-edit-label{font-size:9px;color:var(--orange);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* COMPLIANCE VIEW */
.view-toggle-btn{
  flex:1;padding:10px;background:transparent;border:none;border-radius:10px;
  font-size:13px;font-weight:600;font-family:'Inter',sans-serif;
  color:var(--text3);cursor:pointer;transition:all 0.2s;
}
.view-toggle-btn.active{
  background:var(--bg);box-shadow:var(--neu-sm);color:var(--red);
}
.compliance-rank-item{
  display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);
  border-radius:12px;margin-bottom:10px;position:relative;overflow:hidden;
}
.rank-number{
  font-size:24px;font-weight:800;color:var(--text3);min-width:40px;text-align:center;
}
.rank-number.top{color:var(--red)}
.rank-info{flex:1}
.rank-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.rank-stats{font-size:11px;color:var(--text2)}
.rank-score{text-align:right}
.rank-percentage{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.rank-label{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-top:2px}
.compliance-bar{
  position:absolute;bottom:0;left:0;height:4px;
  background:linear-gradient(90deg, var(--red), var(--green));transition:width 0.3s ease;
}
.missing-trips-section{background:var(--bg2);border-radius:12px;padding:14px;margin-top:12px}
.missing-trips-title{
  font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.missing-trip-item{
  background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:center;border-left:3px solid var(--red);
}
.missing-trip-date{font-size:13px;font-weight:600;color:var(--text)}
.missing-trip-details{font-size:11px;color:var(--text2)}
.missing-trip-truck{font-size:12px;font-weight:600;color:var(--text2)}
.compliance-badge{
  display:inline-block;padding:4px 10px;border-radius:12px;font-size:10px;
  font-weight:700;text-transform:uppercase;letter-spacing:0.5px;
}
.compliance-badge.excellent{background:#10b981;color:#fff}
.compliance-badge.good{background:#3b82f6;color:#fff}
.compliance-badge.fair{background:#f59e0b;color:#fff}
.compliance-badge.poor{background:#ef4444;color:#fff}
.trend-indicator{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;
  font-weight:600;padding:4px 8px;border-radius:8px;
}
.trend-indicator.up{background:rgba(16,185,129,0.15);color:#10b981}
.trend-indicator.down{background:rgba(239,68,68,0.15);color:#ef4444}
.trend-indicator.stable{background:rgba(59,130,246,0.15);color:#3b82f6}

/* PULL TO REFRESH */
.ptr-indicator {
  position: fixed;
  top: calc(env(safe-area-inset-top,0px) + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--bg);
  border-radius: 50%;
  width: 40px; height: 40px;
  box-shadow: var(--neu-out);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  transition: transform 0.2s ease;
  pointer-events: none;
}
.ptr-indicator.visible {
  transform: translateX(-50%) translateY(0px);
}
.ptr-spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--text3);
  border-top-color: var(--red);
  border-radius: 50%;
}
.ptr-spinner.spinning {
  animation: spin 0.7s linear infinite;
}
.ptr-arrow {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  color: var(--red);
  font-size: 18px;
  transition: transform 0.2s ease;
}

/* RATE SETTINGS PANEL */
.rate-settings-btn{
  background:var(--blue);color:#fff;
  padding:10px 16px;border-radius:12px;
  font-size:13px;font-weight:600;
  border:none;cursor:pointer;
  box-shadow:4px 4px 12px rgba(37,99,235,0.4);
  font-family:'Inter',sans-serif;
  margin-bottom:14px;width:100%;
}
.rate-settings-btn:active{transform:scale(0.98)}

.rate-adj-input{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border-radius:12px;
  box-shadow:var(--neu-in);padding:12px 14px;
}
.rate-adj-input input{
  flex:1;background:none;border:none;
  color:var(--text);font-size:16px;font-weight:700;
  font-family:'Inter',sans-serif;outline:none;
  text-align:center;
}
.rate-adj-input span{
  font-size:14px;color:var(--text2);font-weight:600;
}

</style>
</head>
<body>

<div class="screen">
  <div class="topbar">
    <img src="logo2.png" alt="PedroEX" style="height:22px;object-fit:contain">
    <div class="tb-right">
      <span class="tb-title">Trips</span>
      <img class="tb-avatar" id="user-avatar" src="" alt="">
    </div>
  </div>

  <div class="page-wrap" id="page-wrap">
    <div class="page-header">
      <div class="ph-left">
        <button class="back-btn" onclick="location.href='index.html'">‹</button>
        <div class="page-title">Trip Schedule</div>
      </div>
      <button class="icon-btn" onclick="loadAll()">↻</button>
    </div>

    <!-- LOADING -->
    <div id="wrap-loading" class="loading-wrap"><div class="spinner"></div>&nbsp;Loading trips...</div>

    <!-- RATE SETTINGS (Admin Only) -->
    <div id="rate-settings-panel" style="display:none">
      <button class="rate-settings-btn" onclick="toggleRateSettings()">
        ⚙️ Rate Settings
      </button>
      <div class="neu-card" id="rate-settings-card" style="display:none;padding:16px">
        <div class="card-title">Adjust All Rates</div>
        <div class="fg">
          <label class="fl">Percentage Change</label>
          <div class="rate-adj-input">
            <button onclick="adjustRatePercent(-1)" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;font-weight:700">−</button>
            <input type="number" id="rate-adjustment" value="0" step="0.1" oninput="updateRatePreview()">

// ✅ NEW FUNCTION: Convert Excel serial number to YYYY-MM-DD
function convertExcelDate(value) {
  // If already in YYYY-MM-DD format, return as is
  if (typeof value === 'string' && value.match(/^\d{4}-\d{2}-\d{2}$/)) {
    return value;
  }
  
  // If it's an Excel serial number
  var num = parseFloat(value);
  if (!isNaN(num) && num > 1000) {
    // Excel epoch: January 1, 1900 (but Excel incorrectly treats 1900 as leap year)
    var excelEpoch = new Date(1899, 11, 30); // Dec 30, 1899
    var date = new Date(excelEpoch.getTime() + num * 86400000);
    
    var year = date.getFullYear();
    var month = pad(date.getMonth() + 1);
    var day = pad(date.getDate());
    
    return year + '-' + month + '-' + day;
  }
  
  // If it's already a date string in other format, try to parse
  if (typeof value === 'string') {
    var d = new Date(value);
    if (!isNaN(d.getTime())) {
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }
  }
  
  return ''; // Return empty if can't parse
}

// ═══ SHIPMENT COMPLIANCE TRACKING ═════════════════════

function calculateComplianceData(selectedMonth) {
  var monthTrips = allTrips.filter(function(t) {
    return t.deliveryDate.startsWith(selectedMonth);
  });
  
  var truckData = {};
  
  monthTrips.forEach(function(t) {
    if (!t.truck) return;
    
    if (!truckData[t.truck]) {
      truckData[t.truck] = {
        name: t.truck,
        totalTrips: 0,
        compliantTrips: 0,
        missingTrips: []
      };
    }
    
    var data = truckData[t.truck];
    data.totalTrips++;
    
    if (t.shipmentNumber && t.shipmentNumber.trim()) {
      data.compliantTrips++;
    } else {
      // ✅ DAGDAG: Find helpers who attended on this date
      var helpersOnDate = allAttendance.filter(function(att) {
        return att.date === t.deliveryDate && 
               att.assignedTruck === t.truck;
      });
      
      data.missingTrips.push({
        date: t.deliveryDate,
        truck: t.truck,
        route: t.route || 'No route',
        type: t.type || '',
        helpers: helpersOnDate.map(function(h) { return h.employeeName; }) // ✅ DAGDAG
      });
    }
  });
  
  Object.keys(truckData).forEach(function(truck) {
    var data = truckData[truck];
    data.complianceRate = data.totalTrips > 0 
      ? (data.compliantTrips / data.totalTrips * 100) 
      : 0;
  });
  
  return truckData;
}


function getComplianceBadge(rate) {
  if (rate >= 95) return '<span class="compliance-badge excellent">Excellent</span>';
  if (rate >= 80) return '<span class="compliance-badge good">Good</span>';
  if (rate >= 60) return '<span class="compliance-badge fair">Fair</span>';
  return '<span class="compliance-badge poor">Needs Improvement</span>';
}

function populateComplianceMonthSelector() {
  var select = document.getElementById('compliance-month');
  if (!select) return;
  
  var months = {};
  allTrips.forEach(function(t) {
    if (t.deliveryDate) {
      var month = t.deliveryDate.slice(0, 7);
      months[month] = true;
    }
  });
  
  var monthList = Object.keys(months).sort().reverse();
  
  select.innerHTML = monthList.map(function(m) {
    var parts = m.split('-');
    var date = new Date(parts[0], parts[1] - 1);
    var label = MONTHS[date.getMonth()] + ' ' + date.getFullYear();
    return '<option value="' + m + '">' + label + '</option>';
  }).join('');
  
  if (monthList.length > 0) select.value = monthList[0];
}

function renderComplianceReport() {
  var selectedMonth = document.getElementById('compliance-month');
  if (!selectedMonth || !selectedMonth.value) return;
  
  var month = selectedMonth.value;
  var currentData = calculateComplianceData(month);
  var trucks = Object.keys(currentData).map(function(k) { return currentData[k]; });
  
  var totalTrips = trucks.reduce(function(sum, t) { return sum + t.totalTrips; }, 0);
  var compliantTrips = trucks.reduce(function(sum, t) { return sum + t.compliantTrips; }, 0);
  var missingTrips = totalTrips - compliantTrips;
  var overallRate = totalTrips > 0 ? (compliantTrips / totalTrips * 100) : 0;
  
  // Update stats
  document.getElementById('comp-total').textContent = totalTrips;
  document.getElementById('comp-compliant').textContent = compliantTrips;
  document.getElementById('comp-missing').textContent = missingTrips;
  document.getElementById('comp-rate').textContent = overallRate.toFixed(1) + '%';
  
  // Previous month comparison
  var parts = month.split('-');
  var prevDate = new Date(parts[0], parts[1] - 2, 1);
  var prevMonth = prevDate.getFullYear() + '-' + pad(prevDate.getMonth() + 1);
  var previousData = calculateComplianceData(prevMonth);
  
  // Render ranking
  var sortedTrucks = trucks.sort(function(a, b) { return b.complianceRate - a.complianceRate; });
  
  var rankingHTML = sortedTrucks.map(function(truck, index) {
    var rank = index + 1;
    var isTop = rank <= 3;
    
    var prevTruck = previousData[truck.name];
    var prevRate = prevTruck ? prevTruck.complianceRate : 0;
    var rateDiff = truck.complianceRate - prevRate;
    
    var trendHTML = '';
    if (prevTruck) {
      if (rateDiff > 2) {
        trendHTML = '<span class="trend-indicator up">↑ ' + rateDiff.toFixed(1) + '%</span>';
      } else if (rateDiff < -2) {
        trendHTML = '<span class="trend-indicator down">↓ ' + Math.abs(rateDiff).toFixed(1) + '%</span>';
      } else {
        trendHTML = '<span class="trend-indicator stable">→ Stable</span>';
      }
    }
    
    return '<div class="compliance-rank-item">'
      + '<div class="rank-number ' + (isTop ? 'top' : '') + '">' + rank + '</div>'
      + '<div class="rank-info">'
      + '<div class="rank-name">🚛 ' + truck.name + '</div>'
      + '<div class="rank-stats">'
      + truck.compliantTrips + '/' + truck.totalTrips + ' trips • '
      + truck.missingTrips.length + ' missing ' + trendHTML
      + '</div></div>'
      + '<div class="rank-score">'
      + '<div class="rank-percentage">' + truck.complianceRate.toFixed(1) + '%</div>'
      + '<div class="rank-label">Compliance</div>'
      + '</div>'
      + '<div class="compliance-bar" style="width:' + truck.complianceRate + '%"></div>'
      + '</div>';
  }).join('');
  
  document.getElementById('compliance-ranking').innerHTML = rankingHTML || 
    '<div class="empty-hint">No data for this month</div>';
  
  // Render details
  var detailsHTML = sortedTrucks.map(function(truck) {
    var badge = getComplianceBadge(truck.complianceRate);
    var color = getTruckColor(truck.name);
    
    return '<div class="neu-card" style="padding:16px;margin-bottom:14px;border-left:4px solid ' + color.bg + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
      + '<div style="font-size:16px;font-weight:700;color:' + color.bg + '">🚛 ' + truck.name + '</div>'
      + badge
      + '</div>'
      + '<div class="row3" style="margin-bottom:10px">'
      + '<div style="text-align:center">'
      + '<div style="font-size:10px;color:var(--text3);font-weight:600">TOTAL</div>'
      + '<div style="font-size:20px;font-weight:700;color:var(--text)">' + truck.totalTrips + '</div>'
      + '</div>'
      + '<div style="text-align:center">'
      + '<div style="font-size:10px;color:var(--text3);font-weight:600">COMPLIANT</div>'
      + '<div style="font-size:20px;font-weight:700;color:var(--green)">' + truck.compliantTrips + '</div>'
      + '</div>'
      + '<div style="text-align:center">'
      + '<div style="font-size:10px;color:var(--text3);font-weight:600">MISSING</div>'
      + '<div style="font-size:20px;font-weight:700;color:var(--red)">' + truck.missingTrips.length + '</div>'
      + '</div></div>'
  // Sa loob ng renderComplianceReport() function, palitan ang missing trips section:

+ (truck.missingTrips.length > 0 ? 
  '<div class="missing-trips-section">'
  + '<div class="missing-trips-title"><span>⚠️</span>Missing Shipment Numbers (' + truck.missingTrips.length + ')</div>'
  + truck.missingTrips.slice(0, 10).map(function(trip) {
      var parts = trip.date.split('-');
      var d = new Date(parts[0], parts[1] - 1, parts[2]);
      var dateStr = d.toLocaleDateString('en-PH', { 
        weekday: 'short', month: 'short', day: 'numeric' 
      });
      
      // ✅ DAGDAG: Display helpers
      var helpersHTML = trip.helpers.length > 0 
        ? '<div style="margin-top:4px;font-size:10px;color:var(--orange)">'
          + '👷 Helpers: ' + trip.helpers.join(', ')
          + '</div>'
        : '<div style="margin-top:4px;font-size:10px;color:var(--text3)">'
          + '⚠️ No helpers recorded'
          + '</div>';
      
      return '<div class="missing-trip-item">'
        + '<div>'
        + '<div class="missing-trip-date">' + dateStr + '</div>'
        + '<div class="missing-trip-details">' + trip.route + (trip.type ? ' • ' + trip.type : '') + '</div>'
        + helpersHTML // ✅ DAGDAG
        + '</div>'
        + '<div class="missing-trip-truck">' + trip.truck + '</div>'
        + '</div>';
    }).join('')
  + (truck.missingTrips.length > 10 ? 
    '<div style="text-align:center;padding:8px;font-size:11px;color:var(--text3)">'
    + '+ ' + (truck.missingTrips.length - 10) + ' more missing entries'
    + '</div>' : '')
  + '</div>' 
  : '<div style="text-align:center;padding:20px;color:var(--green);font-size:13px">'
  + '✅ Perfect! All trips have shipment numbers.'
  + '</div>')
  }).join('');
  
  document.getElementById('compliance-details').innerHTML = detailsHTML;
}

      csv += '"' + truck.name + '","' + trip.date + '","' + trip.route + '","' + (trip.type || '')  + '","' + helpersText + '"\n';
    });

  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

  link.setAttribute('download', 'Shipment_Compliance_Report_' + month + '.csv');

// ═══ CALENDAR ═════════════════════════════════════════
var MONTHS = ['January','February','March','April','May','June',
              'July','August','September','October','November','December'];
var DAYS   = ['S','M','T','W','T','F','S'];

function changeMonth(d) {
  calMonth += d;
  if (calMonth < 0)  { calMonth=11; calYear--; }
  if (calMonth > 11) { calMonth=0;  calYear++; }
  renderCalendar();
  document.getElementById('day-panel').classList.remove('show');
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = MONTHS[calMonth] + ' ' + calYear;
  var grid  = document.getElementById('cal-grid');
  var days  = new Date(calYear, calMonth+1, 0).getDate();
  var first = new Date(calYear, calMonth, 1).getDay();

  var source = hasActiveFilter() ? filteredTrips : allTrips;

  var dayMap = {};
  source.forEach(function(r) {
    if (!r.deliveryDate || !r.truck) return;
    var parts = r.deliveryDate.split('-');
    if (parseInt(parts[0]) !== calYear || parseInt(parts[1])-1 !== calMonth) return;
    var day = parseInt(parts[2]);
    if (!dayMap[day]) dayMap[day] = [];
    dayMap[day].push({ truck: r.truck, color: getTruckColor(r.truck) });
  });

  var html = DAYS.map(function(d){ return '<div class="cal-dn">'+d+'</div>'; }).join('');
  for (var i=0; i<first; i++) html += '<div class="cal-day other-month"></div>';

  for (var d=1; d<=days; d++) {
    var dateStr  = calYear + '-' + pad(calMonth+1) + '-' + pad(d);
    var entries  = dayMap[d] || [];
    var cls      = 'cal-day';
    if (dateStr === todayStr)    cls += ' today';
    if (entries.length)          cls += ' has-trip';
    if (dateStr === selectedDay) cls += ' selected';

    var pillsHtml = '';
    if (entries.length) {
      var shown = entries.slice(0, 3);
      pillsHtml = '<div class="cal-names">'
        + shown.map(function(e) {
            return '<div class="cal-name-pill" style="background:' + e.color.bg + ';color:' + e.color.text + '">'
              + e.truck + '</div>';
          }).join('')
        + (entries.length > 3
            ? '<div class="cal-name-pill" style="background:var(--text3);color:#fff">+' + (entries.length-3) + '</div>'
            : '')
        + '</div>';
    }

    html += '<div class="' + cls + '" onclick="selectDay(\'' + dateStr + '\')">'
      + '<div class="cal-day-num">' + d + '</div>'
      + pillsHtml + '</div>';
  }
  grid.innerHTML = html;
}

function hasActiveFilter() {
  return activeFilters.truck || activeFilters.type || activeFilters.billed || activeFilters.route;
}

function selectDay(dateStr) {
  selectedDay = dateStr;
  renderCalendar();

  var source = hasActiveFilter() ? filteredTrips : allTrips;
  var trips  = source.filter(function(r){ return r.deliveryDate === dateStr; });
  var panel  = document.getElementById('day-panel');
  var d      = new Date(dateStr + 'T00:00:00');
  var label  = d.toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  document.getElementById('day-panel-title').textContent = label + ' — ' + trips.length + ' trip(s)';

  if (!trips.length) {
    document.getElementById('day-panel-list').innerHTML =
      '<div class="empty-hint">No trips' + (hasActiveFilter() ? ' matching filters' : '') + ' for this day.</div>';
  } else {
    document.getElementById('day-panel-list').innerHTML = trips.map(function(r) {
      var c = getTruckColor(r.truck);
      var typeBadge   = r.type==='Fresh'  ? '<span class="badge green">Fresh</span>'
                      : r.type==='Frozen' ? '<span class="badge blue">Frozen</span>'
                      : '';
      var billedBadge = r.billed==='Yes' ? '<span class="badge green">Billed</span>'
                      : r.billed==='No'  ? '<span class="badge orange">Not Billed</span>'
                      : '';

      return '<div class="trip-item" onclick="openTripDetail(' + r.rowIndex + ')" '
        + 'style="border-left:4px solid ' + c.bg + '">'
        + '<div class="trip-truck" style="color:' + c.bg + '">🚛 ' + r.truck + '</div>'
        + '<div class="trip-meta">'
        + (r.shipmentNumber ? 'Shipment #' + r.shipmentNumber : 'No shipment #')
        + (r.route ? ' · 📍 ' + r.route : '')
        + '</div>'
        + '<div class="trip-badges">'
        + typeBadge + billedBadge
        + (r.shipmentDate ? '<span class="badge">Ship: ' + r.shipmentDate + '</span>' : '')
        + '</div></div>';
    }).join('');
  }

  panel.classList.add('show');
  setTimeout(function(){ panel.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 100);
}

function saveEditTrip() {
  if (!selectedTrip || !isAdmin) return;

  var delivery = document.getElementById('edit-delivery').value.trim();
  var truck    = document.getElementById('edit-truck').value;
  var shipDate = document.getElementById('edit-shipment-date').value.trim();
  var type     = document.getElementById('edit-type').value;
  var shipNum  = document.getElementById('edit-shipment-num').value.trim();
  var route    = document.getElementById('edit-route').value;
  var rate     = document.getElementById('edit-rate').value.trim();

  if (!delivery || !truck) { showToast('❌ Delivery Date and Truck required!'); return; }

  var row = [selectedTrip.id, delivery, truck, shipDate, type, shipNum, editBilledVal, route, rate];

  showSaving('Updating trip...');
  apiUpdate(TAB_TRIPS+'!A'+selectedTrip.rowIndex+':I'+selectedTrip.rowIndex, [row])

function saveUserEdit() {

function doDeleteTrip() {

    [['','','','','','','','','']])
    .then(function() {
      hideSaving();
      allTrips = allTrips.filter(function(r){ return r.rowIndex!==selectedTrip.rowIndex; });
      filteredTrips = filteredTrips.filter(function(r){ return r.rowIndex!==selectedTrip.rowIndex; });

// ═══ API ══════════════════════════════════════════════
function apiGet(range) {
  return fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+
    '/values/'+encodeURIComponent(range),
    { headers:{ Authorization:'Bearer '+token } })
    .then(function(r){ if(r.status===401){location.href='index.html';throw new Error('Auth');}return r.json(); });
}
function apiAppend(range, values) {
  return fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+
    '/values/'+encodeURIComponent(range)+':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS',
    { method:'POST', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({values:values}) })
    .then(function(r){ 
      if(!r.ok) {
        return r.json().then(function(err){
          console.error('API Append Error:', err);
          throw new Error(err.error?.message || 'Append failed');
        });
      }
      return r.json(); 
    });
}
function apiUpdate(range, values) {
  return fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+
    '/values/'+encodeURIComponent(range)+'?valueInputOption=USER_ENTERED',
    { method:'PUT', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({values:values}) })
    .then(function(r){ 
      if(!r.ok) {
        return r.json().then(function(err){
          console.error('API Update Error:', err);
          throw new Error(err.error?.message || 'Update failed');
        });
      }
      return r.json(); 
    });
}

// ═══ PULL TO REFRESH ══════════════════════════════════
function initPullToRefresh(scrollEl, onRefresh) {
  var startY      = 0;
  var pulling     = false;
  var threshold   = 70;
  var indicator   = document.createElement('div');
  indicator.className = 'ptr-indicator';
  indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>';
  document.body.appendChild(indicator);

  scrollEl.addEventListener('touchstart', function(e) {
    if (scrollEl.scrollTop === 0) {
      startY  = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  scrollEl.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dist = e.touches[0].clientY - startY;
    if (dist < 0) { pulling = false; return; }

    var progress = Math.min(dist / threshold, 1);
    indicator.classList.add('visible');

    var arrow = document.getElementById('ptr-arrow');
    if (arrow) {
      arrow.style.transform = 'rotate(' + (progress * 180) + 'deg)';
      arrow.style.color = progress >= 1 ? 'var(--red)' : 'var(--text3)';
    }
  }, { passive: true });

  scrollEl.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;

    var dist = e.changedTouches[0].clientY - startY;
    if (dist >= threshold) {
      indicator.innerHTML = '<div class="ptr-spinner spinning"></div>';
      onRefresh(function() {
        indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>';
        indicator.classList.remove('visible');
      });
    } else {
      indicator.classList.remove('visible');
    }
  });
}

function initAutoRefresh(onRefresh) {
  setInterval(function() {
    var expiry = parseInt(localStorage.getItem('pedroex-token-expiry') || '0');
    if (!token || Date.now() >= expiry) return;
    console.log('🔄 Auto-refresh triggered');
    onRefresh(function() {});
  }, 5 * 60 * 1000);
}
