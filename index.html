<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PedroEX">
<meta name="theme-color" content="#e0e0e5">
<link rel="manifest" href="manifest.json">
<title>PedroEX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ═══════════════════════════════════════
   NEUMORPHIC THEME VARIABLES
═══════════════════════════════════════ */
:root {
  --bg:       #e0e0e5;
  --bg2:      #e8e8ed;
  --shadow-d: #b8b9be;
  --shadow-l: #ffffff;
  --text:     #2a2a2e;
  --text2:    #777;
  --text3:    #aaa;
  --red:      #B32533;
  --red-d:    #8f1e29;
  --card:     #e0e0e5;

  --neu-out:  6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
  --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs:   3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
}

body.dark {
  --bg:       #2a2a2f;
  --bg2:      #313137;
  --shadow-d: #16161a;
  --shadow-l: #3e3e46;
  --text:     #e8e8ec;
  --text2:    #888;
  --text3:    #555;
  --card:     #2a2a2f;

  --neu-out:  5px 5px 12px var(--shadow-d), -3px -3px 9px var(--shadow-l);
  --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs:   3px 3px 7px var(--shadow-d), -2px -2px 6px var(--shadow-l);
}

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.4s,color 0.4s }

.screen { display:none; flex-direction:column; height:100dvh; width:100%; position:absolute; top:0; left:0 }
.screen.active { display:flex }

/* ═══════════════════════════════════════
   LOGIN / WELCOME
═══════════════════════════════════════ */
#s-login {
  background: #B32533;
  overflow: hidden;
  justify-content: flex-end;
}
#s-login::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(-55deg,transparent 0,transparent 38px,rgba(0,0,0,0.05) 38px,rgba(0,0,0,0.05) 40px);
  z-index:0; pointer-events:none;
}

.truck-stage { position:absolute; top:0; left:0; right:0; height:48%; overflow:hidden; z-index:1 }
.road-base { position:absolute; bottom:0; left:0; right:0; height:6px; background:rgba(0,0,0,0.2) }
.road-marks { position:absolute; bottom:6px; left:0; right:0; height:3px; background:repeating-linear-gradient(90deg,rgba(255,255,255,0.3) 0,rgba(255,255,255,0.3) 30px,transparent 30px,transparent 60px); animation:roadScroll 0.35s linear infinite }
@keyframes roadScroll { to { background-position:-60px 0 } }

.truck-wrap { position:absolute; bottom:9px; left:-350px; animation:truckIn 2.2s cubic-bezier(0.16,1,0.3,1) forwards; animation-delay:0.3s; width:210px }
@keyframes truckIn { 0%{left:-350px} 70%{left:calc(50% - 105px)} 80%{left:calc(50% - 100px)} 90%{left:calc(50% - 103px)} 100%{left:calc(50% - 102px)} }
.truck-wrap img { width:100%; height:auto; display:block }

.login-card {
  position:relative; z-index:3; width:100%;
  background: #e0e0e5;
  border-radius: 28px 28px 0 0;
  padding: 32px 28px calc(44px + env(safe-area-inset-bottom,0px));
  opacity:0; transform:translateY(50px);
  animation:cardUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:2.5s;
  margin-bottom: 60px;
}
@keyframes cardUp { to { opacity:1; transform:translateY(0) } }

.login-card h2 { font-size:24px; font-weight:700; color:#2a2a2e; letter-spacing:-0.5px; margin-bottom:6px }
.login-card p  { font-size:14px; color:#777; line-height:1.65; margin-bottom:28px }

.google-btn {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:15px 20px;
  background: #e0e0e5;
  color: #2a2a2e;
  border: none; border-radius:16px;
  font-size:15px; font-weight:600; font-family:'Inter',sans-serif;
  cursor:pointer;
  box-shadow: var(--neu-out);
  transition: box-shadow 0.15s;
}
.google-btn:active { box-shadow: var(--neu-in) }
.google-btn svg { width:20px; height:20px; flex-shrink:0 }
.google-btn:disabled { opacity:0.6; cursor:default }

/* Silent-check status line under the button */
.login-status {
  text-align:center; font-size:11px; color:#999; margin-top:14px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  opacity:0; transition:opacity 0.2s;
}
.login-status.show { opacity:1 }
.login-status .mini-spin {
  width:12px; height:12px; border:2px solid #ccc; border-top-color:#B32533;
  border-radius:50%; animation:spin 0.7s linear infinite;
}

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#s-app { background:var(--bg); flex-direction:column }

/* TOPBAR */
.topbar {
  background: var(--bg);
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
  padding-top: calc(env(safe-area-inset-top,0px) + 14px);
  flex-shrink:0;
  box-shadow: 0 3px 10px rgba(0,0,0,0.07);
}
body.dark .topbar { box-shadow: 0 3px 10px rgba(0,0,0,0.3) }

.tb-brand { display:flex; align-items:center; gap:2px }
.tb-brand-text { font-size:16px; font-weight:700; letter-spacing:0.5px; color:var(--text) }
.tb-brand-red { color:var(--red) }

.tb-right { display:flex; align-items:center; gap:12px }
.tb-title { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text3) }
.tb-avatar {
  width:32px; height:32px; border-radius:50%;
  border:2px solid var(--red); object-fit:cover;
  box-shadow: var(--neu-xs);
}

/* PAGE WRAP */
.page-wrap { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; padding-bottom:90px }

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
.dash-header { margin-bottom:22px; padding: 0 2px }
.dash-eyebrow { font-size:10px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--text3); margin-bottom:5px }
.dash-name { font-size:24px; font-weight:700; color:var(--text); letter-spacing:-0.5px; line-height:1.2 }
.dash-date { font-size:12px; color:var(--text2); margin-top:4px }

/* MODULE GRID */
.mod-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px }

.mod-card {
  background: var(--bg);
  border-radius: 18px;
  box-shadow: var(--neu-out);
  padding: 18px 14px;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.1s;
}
.mod-card:active {
  box-shadow: var(--neu-in);
  transform: scale(0.98);
}
.mod-card.wide { grid-column:span 2; display:flex; align-items:center; gap:16px; padding:16px 18px }
.mod-card.wide .mod-icon-box { margin-bottom:0; flex-shrink:0 }
.mod-card.wide .mod-value { font-size:22px }

.mod-icon-box {
  width:38px; height:38px;
  border-radius:12px;
  background: var(--bg);
  box-shadow: var(--neu-xs);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:12px;
}
.mod-icon-box svg { width:18px; height:18px }

.mod-label { font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:5px }
.mod-value { font-size:28px; font-weight:700; color:var(--red); line-height:1; letter-spacing:-1px }
.mod-card.wide .mod-value.currency { font-size:20px }
.mod-sub { font-size:10px; color:var(--text3); margin-top:2px }

/* ═══════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════ */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg);
  padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));
  display:flex; align-items:center; justify-content:space-around;
  box-shadow: 0 -3px 14px rgba(0,0,0,0.07);
  z-index:40;
}
body.dark .bottom-nav { box-shadow: 0 -3px 14px rgba(0,0,0,0.4) }

.bnav {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  font-size:9px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
  color:var(--text3); cursor:pointer; border:none; background:none;
  font-family:'Inter',sans-serif;
}
.bnav.active { color:var(--red) }

.bnav-icon {
  width:42px; height:42px;
  border-radius:14px;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  transition: box-shadow 0.2s;
}
.bnav:not(.active) .bnav-icon { box-shadow: var(--neu-sm) }
.bnav.active .bnav-icon { box-shadow: var(--neu-in) }

/* ═══════════════════════════════════════
   STATES
═══════════════════════════════════════ */
.toast {
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom,0px));
  left:50%; transform:translateX(-50%);
  background:var(--bg); border-radius:14px;
  box-shadow: var(--neu-out);
  border-left:3px solid var(--red);
  padding:13px 22px; font-size:13px; font-weight:500; color:var(--text);
  z-index:300; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.toast.show { opacity:1 }

/* PULL TO REFRESH */
.ptr-indicator {
  position: fixed;
  top: calc(env(safe-area-inset-top,0px) + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--bg);
  border-radius: 50%;
  width: 40px; height: 40px;
  box-shadow: var(--neu-out);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  transition: transform 0.2s ease;
  pointer-events: none;
}
.ptr-indicator.visible {
  transform: translateX(-50%) translateY(0px);
}
.ptr-spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--text3);
  border-top-color: var(--red);
  border-radius: 50%;
}
.ptr-spinner.spinning {
  animation: spin 0.7s linear infinite;
}
.ptr-arrow {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  color: var(--red);
  font-size: 18px;
  transition: transform 0.2s ease;
}
@keyframes spin { to { transform: rotate(360deg) } }
</style>
</head>

 // settings: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="var(--red)" stroke-width="2"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="var(--red)" stroke-width="2" stroke-linecap="round"/></svg>',
};

let token = null;

// ═══ THEME ═══
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  localStorage.setItem('pedroex-theme', dark ? 'dark' : 'light');
}
applyTheme(localStorage.getItem('pedroex-theme') === 'dark');

// ═══ INIT ═══
// Login persistence strategy:
// Google's GIS access tokens are only valid for ~1 hour — that lifetime is set
// by Google and cannot be extended from client-side code. What we CAN do is
// avoid showing the full "Continue with Google" screen every time that token
// expires: if the user previously granted access (pedroex-scope-granted) we
// attempt a SILENT re-auth (prompt:'') on cold start before ever showing the
// login screen. A silent re-auth shows no popup/account-picker and succeeds
// automatically as long as the user is still signed into Google in this
// browser and hasn't revoked access. The user will only see the login screen
// again if: they explicitly log out, they clear browser data/cookies, they
// revoke PedroEX's access from their Google account, or silent re-auth is
// blocked (e.g. some in-app browsers / strict privacy settings).
(function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  const savedToken = localStorage.getItem('pedroex-token');
  const expiry     = localStorage.getItem('pedroex-token-expiry');
  const bufferMs   = 5 * 60 * 1000;

  if (savedToken && expiry && Date.now() < (parseInt(expiry) - bufferMs)) {
    token = savedToken;
    sessionStorage.removeItem('pedroex-login-retry');
    loadUser();
  } else if (localStorage.getItem('pedroex-scope-granted') === 'true') {
    // Token missing/expired, but user has signed in before — try to renew
    // silently in the background instead of forcing them through the full
    // Google sign-in screen again.
    trySilentSignIn();
  } else {
    // Never granted access before — real first-time login needed.
    localStorage.removeItem('pedroex-token');
    localStorage.removeItem('pedroex-token-expiry');
    sessionStorage.removeItem('pedroex-login-retry');
    showLogin();
  }
})();

// ═══ SILENT RE-AUTH (no popup) ═══
function trySilentSignIn(attempt) {
  attempt = attempt || 0;
  setLoginStatus(true, 'Checking your session…');

  if (typeof google === 'undefined' || !google.accounts) {
    if (attempt < 10) {
      setTimeout(function() { trySilentSignIn(attempt + 1); }, 300);
    } else {
      setLoginStatus(false);
      showLogin();
    }
    return;
  }

  try {
    google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: function(res) {
        if (res.error) {
          console.warn('🔒 Silent re-auth failed:', res.error);
          localStorage.removeItem('pedroex-token');
          localStorage.removeItem('pedroex-token-expiry');
          setLoginStatus(false);
          showLogin();
          return;
        }
        token = res.access_token;
        const expiresAt = Date.now() + (res.expires_in * 1000);
        localStorage.setItem('pedroex-token', token);
        localStorage.setItem('pedroex-token-expiry', expiresAt);
        sessionStorage.removeItem('pedroex-login-retry');
        setLoginStatus(false);
        loadUser();
      },
      error_callback: function(err) {
        console.warn('🔒 Silent re-auth error_callback:', err);
        setLoginStatus(false);
        showLogin();
      }
    }).requestAccessToken({ prompt: '' });
  } catch (e) {
    console.warn('🔒 Silent re-auth threw:', e);
    setLoginStatus(false);
    showLogin();
  }
}

function setLoginStatus(show, text) {
  const el = document.getElementById('login-status');
  const btn = document.getElementById('google-btn');
  if (!el) return;
  if (text) document.getElementById('login-status-text').textContent = text;
  el.classList.toggle('show', !!show);
  if (btn) btn.disabled = !!show;
}

// ═══ SHOW / HIDE SCREENS ═══
function showLogin() {
  document.getElementById('s-login').classList.add('active');
  document.getElementById('s-app').classList.remove('active');
}
function showApp() {
  document.getElementById('s-login').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
}

// ═══ SIGN IN (explicit / manual button tap) ═══
function signIn() {
  if (typeof google === 'undefined' || !google.accounts) {
    showToast('Loading Google Sign-In...');
    setTimeout(signIn, 800);
    return;
  }

  const hasGranted = localStorage.getItem('pedroex-scope-granted');

  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(res) {
      if (res.error) {
        showToast('❌ Login error: ' + res.error);
        return;
      }

      token = res.access_token;
      const expiresAt = Date.now() + (res.expires_in * 1000);
      localStorage.setItem('pedroex-token', token);
      localStorage.setItem('pedroex-token-expiry', expiresAt);
      localStorage.setItem('pedroex-scope-granted', 'true');

      // ✅ Clear retry counter on fresh successful sign-in
      sessionStorage.removeItem('pedroex-login-retry');

      loadUser();
    }
  }).requestAccessToken({
    prompt: hasGranted ? '' : 'consent'
  });
}

// ═══ EXPLICIT LOGOUT (only way the session should truly end) ═══
function signOut() {
  if (token && typeof google !== 'undefined' && google.accounts) {
    try { google.accounts.oauth2.revoke(token, function(){}); } catch(e) {}
  }
  localStorage.removeItem('pedroex-token');
  localStorage.removeItem('pedroex-token-expiry');
  localStorage.removeItem('pedroex-scope-granted');
  sessionStorage.removeItem('pedroex-login-retry');
  token = null;
  showLogin();
}

// ═══ LOAD USER ═══
function loadUser() {
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(r) {
    if (r.status === 401) throw new Error('UNAUTHORIZED');
    if (!r.ok) throw new Error('HTTP_' + r.status);
    return r.json();
  })
  .then(function(u) {
    // Save basic info
    localStorage.setItem('pedroex-name',    u.name    || '');
    localStorage.setItem('pedroex-email',   u.email   || '');
    localStorage.setItem('pedroex-picture', u.picture || '');
    localStorage.setItem('pedroex-scope-granted', 'true');
    document.getElementById('user-avatar').src = u.picture || '';

    const email = (u.email || '').toLowerCase();
    console.log('🔍 Looking for email:', email);

    // Fetch employee row
    return fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Employees!A2:D', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(r) {
      if (r.status === 401) throw new Error('UNAUTHORIZED');
      if (!r.ok) throw new Error('SHEETS_HTTP_' + r.status);
      return r.json();
    })
    .then(function(res) {
      const rows   = res.values || [];
      const empRow = rows.find(function(r) {
        return (r[0] || '').toLowerCase() === email;
      });

      const firstName = empRow ? (empRow[1] || u.given_name || 'team') : (u.given_name || 'team');
      const role      = empRow ? (empRow[3] || 'Employee') : 'Employee';

      console.log('🎭 Role:', role, '| Name:', firstName);

      localStorage.setItem('pedroex-role',      role);
      localStorage.setItem('pedroex-firstname', firstName);

      // ✅ Clear retry counter — we made it through successfully
      sessionStorage.removeItem('pedroex-login-retry');

      showApp();
      updateGreeting(firstName);
      buildDashboard();
      loadDashboardStats();

      initPullToRefresh(
        document.querySelector('.page-wrap'),
        function(done) { loadDashboardStats(); setTimeout(done, 1000); }
      );

      initAutoRefresh();
    });
  })
  .catch(function(err) {
    console.error('❌ loadUser error:', err);

    const isUnauthorized = err.message === 'UNAUTHORIZED';

    if (isUnauthorized) {
      // Token is dead — try one silent re-auth before giving up. This covers
      // cases where the access token was revoked server-side mid-session but
      // the browser's Google session is still perfectly valid.
      console.warn('🔒 Token expired/invalid — attempting silent re-auth');
      localStorage.removeItem('pedroex-token');
      localStorage.removeItem('pedroex-token-expiry');
      const alreadyTriedSilent = sessionStorage.getItem('pedroex-silent-tried');
      if (!alreadyTriedSilent && localStorage.getItem('pedroex-scope-granted') === 'true') {
        sessionStorage.setItem('pedroex-silent-tried', '1');
        trySilentSignIn();
      } else {
        sessionStorage.removeItem('pedroex-silent-tried');
        showLogin();
        showToast('Session expired. Please sign in again.');
      }
      return;
    }

    // ✅ For network/transient errors: retry up to 2x before giving up
    const retryCount = parseInt(sessionStorage.getItem('pedroex-login-retry') || '0');
    console.log('🔄 Retry attempt:', retryCount + 1);

    if (retryCount < 2) {
      sessionStorage.setItem('pedroex-login-retry', retryCount + 1);
      setTimeout(loadUser, 1200 + retryCount * 800); // 1.2s, then 2.0s
    } else {
      // Exhausted retries — fallback: use cached data if available
      const cachedName = localStorage.getItem('pedroex-firstname');
      const cachedRole = localStorage.getItem('pedroex-role');

      sessionStorage.removeItem('pedroex-login-retry');

      if (cachedName && cachedRole) {
        console.warn('⚠️ Using cached user data after failed retries');
        showApp();
        updateGreeting(cachedName);
        buildDashboard();
        // Don't load stats if network is down — would just show errors
        showToast('⚠️ Using cached data. Check connection.');
      } else {
        // No cached data at all — force login
        localStorage.removeItem('pedroex-token');
        localStorage.removeItem('pedroex-token-expiry');
        showLogin();
        showToast('❌ Could not connect. Please sign in again.');
      }
    }
  });
}

// ═══ UPDATE GREETING ═══
function updateGreeting(firstName) {
  const now = new Date();
  const h   = now.getHours();
  const gr  = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';

  document.getElementById('dash-name').textContent = gr + ', ' + firstName + '!';
  document.getElementById('dash-date').textContent = now.toLocaleDateString('en-PH', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });
}

// ═══ BUILD DASHBOARD ═══
function buildDashboard() {
  const userRole = (localStorage.getItem('pedroex-role') || 'Employee').toLowerCase();
  const isAdmin  = userRole === 'admin';

  console.log('🏗️ Building dashboard — role:', userRole);

  const visibleModules = ALL_MODULES.filter(function(m) {
    if (m.adminOnly && !isAdmin) return false;
    return true;
  });

  document.getElementById('mod-grid').innerHTML = visibleModules.map(function(m) {
    const icon    = ICONS[m.icon] || '';
    const onclick = m.link ? "location.href='" + m.link + "'" : '';
    const valCls  = 'mod-value' + (m.currency ? ' currency' : '');

    if (m.wide) {
      return '<div class="mod-card wide" onclick="' + onclick + '">' +
        '<div class="mod-icon-box">' + icon + '</div>' +
        '<div>' +
          '<div class="mod-label">' + m.label + '</div>' +
          '<div class="' + valCls + '" id="' + m.stat + '">—</div>' +
          '<div class="mod-sub">' + m.sub + '</div>' +
        '</div>' +
      '</div>';
    }

    return '<div class="mod-card" onclick="' + onclick + '">' +
      '<div class="mod-icon-box">' + icon + '</div>' +
      '<div class="mod-label">' + m.label + '</div>' +
      '<div class="' + valCls + '" id="' + m.stat + '">—</div>' +
      '<div class="mod-sub">' + m.sub + '</div>' +
    '</div>';
  }).join('');
}

// ═══ CURRENCY FORMAT (short form for dashboard tiles) ═══
function formatPesoShort(n) {
  const v = parseFloat(n) || 0;
  if (v >= 1000000) return '₱' + (v/1000000).toFixed(2) + 'M';
  if (v >= 1000)    return '₱' + (v/1000).toFixed(1) + 'K';
  return '₱' + v.toFixed(0);
}

// ═══ LOAD DASHBOARD STATS ═══
function loadDashboardStats() {
  if (!token) return;

  const userRole = (localStorage.getItem('pedroex-role') || 'Employee').toLowerCase();
  const isAdmin  = userRole === 'admin';

  function setStat(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = (value !== null && value !== undefined && value !== 0) ? value : '—';
  }
  function clearStat(id) {
    const el = document.getElementById(id);
    if (el) el.textContent = '—';
  }

  // 1️⃣ Trucks
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Truck%20Roster!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => setStat('sv-trucks', (res.values || []).filter(r => r[0]).length))
  .catch(() => clearStat('sv-trucks'));

  // 2️⃣ Trips (today)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Trips!A2:B', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const today = new Date().toISOString().split('T')[0];
    setStat('sv-trips', (res.values || []).filter(r => r[1] === today).length);
  })
  .catch(() => clearStat('sv-trips'));

  // 3️⃣ Manpower (today)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Manpower%20Roster!A2:D', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const today = new Date().toISOString().split('T')[0];
    setStat('sv-manpower', (res.values || []).filter(r => r[0] === today).length);
  })
  .catch(() => clearStat('sv-manpower'));

  // 4️⃣ Employees
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Employees!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => setStat('sv-emp', (res.values || []).filter(r => r[0]).length))
  .catch(() => clearStat('sv-emp'));

  // 5️⃣ Attendance (today)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Attendance!A2:K', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const today = new Date().toISOString().split('T')[0];
    const count = (res.values || []).filter(function(row) {
      if (!row[1]) return false;
      let d = row[1];
      if (!isNaN(d) && d > 1000) {
        const epoch = new Date(1899, 11, 30);
        const dt    = new Date(epoch.getTime() + parseFloat(d) * 86400000);
        d = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
      }
      return d === today;
    }).length;
    setStat('sv-attend', count);
  })
  .catch(() => clearStat('sv-attend'));

  // 6️⃣ Emp Records
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Records!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => setStat('sv-records', (res.values || []).filter(r => r[0]).length))
  .catch(() => clearStat('sv-records'));

  // 7️⃣ Matrix
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Matrix!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => setStat('sv-matrix', (res.values || []).filter(r => r[0]).length))
  .catch(() => clearStat('sv-matrix'));

  // 8️⃣ Expenses
  if (isAdmin) {
    fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Expenses!A2:E', {
      headers: {'Authorization': 'Bearer ' + token}
    })
    .then(r => r.json())
    .then(res => {
      const pending = (res.values || []).filter(r => (r[4] || '').toLowerCase() === 'pending').length;
      setStat('sv-exp-admin', pending);
    })
    .catch(() => clearStat('sv-exp-admin'));
  } else {
    const userEmail = (localStorage.getItem('pedroex-email') || '').toLowerCase();
    fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Expenses!A2:E', {
      headers: {'Authorization': 'Bearer ' + token}
    })
    .then(r => r.json())
    .then(res => {
      const mine = (res.values || []).filter(r => (r[1] || '').toLowerCase() === userEmail).length;
      setStat('sv-exp-emp', mine);
    })
    .catch(() => clearStat('sv-exp-emp'));
  }

  // 9️⃣ Billing — ACTUAL amount collected so far this year.
  // Pulled from SOA Masters: col H (index 7) = Amount Received,
  // col I (index 8) = Date Received. Only SOAs actually received/paid
  // within the current calendar year are summed — this reflects real
  // cash collected, not just billed or unpaid trip counts.
  (function loadBillingCollected() {
    const soaRange = encodeURIComponent("'SOA Masters'!A2:M");
    fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + soaRange, {
      headers: {'Authorization': 'Bearer ' + token}
    })
    .then(r => r.json())
    .then(res => {
      const rows = res.values || [];
      const currentYear = new Date().getFullYear();
      let totalCollected = 0;

      rows.forEach(function(r) {
        const amtReceived  = parseFloat(r[7]) || 0;  // col H
        const dateReceived = (r[8] || '').trim();     // col I
        if (!amtReceived || !dateReceived) return;
        const yr = parseInt(dateReceived.substring(0, 4));
        if (yr === currentYear) totalCollected += amtReceived;
      });

      setStat('sv-billing', formatPesoShort(totalCollected));
    })
    .catch(() => clearStat('sv-billing'));
  })();

  // 🔟 Settings
  setStat('sv-set', '⚙️');
}

// ═══ AUTO REFRESH WITH TOKEN RENEWAL ═══
function initAutoRefresh() {
  setInterval(function() {
    const expiry    = parseInt(localStorage.getItem('pedroex-token-expiry') || '0');
    const bufferMs  = 10 * 60 * 1000;

    // Renew if expiring soon
    if (token && Date.now() >= (expiry - bufferMs)) {
      if (typeof google !== 'undefined' && google.accounts) {
        google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: function(res) {
            if (!res.error) {
              token = res.access_token;
              const newExpiry = Date.now() + (res.expires_in * 1000);
              localStorage.setItem('pedroex-token', token);
              localStorage.setItem('pedroex-token-expiry', newExpiry);
              console.log('🔄 Token renewed silently');
            } else {
              console.warn('🔄 Background silent renew failed:', res.error);
            }
          },
          error_callback: function(err) {
            console.warn('🔄 Background silent renew error_callback:', err);
          }
        }).requestAccessToken({ prompt: '' });
      }
      return;
    }

    // Refresh stats if token is still valid
    if (token && Date.now() < expiry) {
      console.log('🔄 Auto-refresh stats');
      loadDashboardStats();
    }
  }, 5 * 60 * 1000);
}

// ═══ PULL TO REFRESH ═══
function initPullToRefresh(scrollEl, onRefresh) {
  let startY   = 0;
  let pulling  = false;
  const threshold = 70;

  const indicator = document.createElement('div');
  indicator.className = 'ptr-indicator';
  indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>';
  document.body.appendChild(indicator);

  scrollEl.addEventListener('touchstart', function(e) {
    if (scrollEl.scrollTop === 0) {
      startY  = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  scrollEl.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    const dist = e.touches[0].clientY - startY;
    if (dist < 0) { pulling = false; return; }

    const progress = Math.min(dist / threshold, 1);
    indicator.classList.add('visible');

    const arrow = document.getElementById('ptr-arrow');
    if (arrow) {
      arrow.style.transform = 'rotate(' + (progress * 180) + 'deg)';
      arrow.style.color = progress >= 1 ? 'var(--red)' : 'var(--text3)';
    }
  }, { passive: true });

  scrollEl.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;

    const dist = e.changedTouches[0].clientY - startY;
    if (dist >= threshold) {
      indicator.innerHTML = '<div class="ptr-spinner spinning"></div>';
      onRefresh(function() {
        indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>';
        indicator.classList.remove('visible');
      });
    } else {
      indicator.classList.remove('visible');
    }
  });
}

// ═══ TOAST ═══
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}
