<style>
/* ═══════════════════════════════════════
   NEUMORPHIC THEME VARIABLES
═══════════════════════════════════════ */
:root {
  /* LIGHT NEUMORPHIC */
  --bg:       #e0e0e5;
  --bg2:      #e8e8ed;
  --shadow-d: #b8b9be;
  --shadow-l: #ffffff;
  --text:     #2a2a2e;
  --text2:    #777;
  --text3:    #aaa;
  --red:      #B32533;
  --red-d:    #8f1e29;
  --card:     #e0e0e5;

  --neu-out:  6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
  --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs:   3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
}

body.dark {
  --bg:       #2a2a2f;
  --bg2:      #313137;
  --shadow-d: #16161a;
  --shadow-l: #3e3e46;
  --text:     #e8e8ec;
  --text2:    #888;
  --text3:    #555;
  --card:     #2a2a2f;

  --neu-out:  5px 5px 12px var(--shadow-d), -3px -3px 9px var(--shadow-l);
  --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
  --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
  --neu-xs:   3px 3px 7px var(--shadow-d), -2px -2px 6px var(--shadow-l);
}

/* ═══════════════════════════════════════
   BASE
═══════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.4s,color 0.4s }

.screen { display:none; flex-direction:column; height:100dvh; width:100%; position:absolute; top:0; left:0 }
.screen.active { display:flex }

/* ═══════════════════════════════════════
   LOGIN / WELCOME
═══════════════════════════════════════ */
#s-login {
  background: #B32533;
  overflow: hidden;
  justify-content: flex-end;
}
#s-login::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(-55deg,transparent 0,transparent 38px,rgba(0,0,0,0.05) 38px,rgba(0,0,0,0.05) 40px);
  z-index:0; pointer-events:none;
}

.truck-stage { position:absolute; top:0; left:0; right:0; height:48%; overflow:hidden; z-index:1 }
.road-base { position:absolute; bottom:0; left:0; right:0; height:6px; background:rgba(0,0,0,0.2) }
.road-marks { position:absolute; bottom:6px; left:0; right:0; height:3px; background:repeating-linear-gradient(90deg,rgba(255,255,255,0.3) 0,rgba(255,255,255,0.3) 30px,transparent 30px,transparent 60px); animation:roadScroll 0.35s linear infinite }
@keyframes roadScroll { to { background-position:-60px 0 } }

.truck-wrap { position:absolute; bottom:9px; left:-350px; animation:truckIn 2.2s cubic-bezier(0.16,1,0.3,1) forwards; animation-delay:0.3s; width:210px }
@keyframes truckIn { 0%{left:-350px} 70%{left:calc(50% - 105px)} 80%{left:calc(50% - 100px)} 90%{left:calc(50% - 103px)} 100%{left:calc(50% - 102px)} }
.truck-wrap img { width:100%; height:auto; display:block }
.login-card {
  position:relative; z-index:3; width:100%;
  background: #e0e0e5;
  border-radius: 28px 28px 0 0;
  padding: 32px 28px calc(44px + env(safe-area-inset-bottom,0px));
  opacity:0; transform:translateY(50px);
  animation:cardUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  animation-delay:2.5s;
  margin-bottom: 60px; /* ✅ DAGDAG ITO — i-adjust ang value */
}
@keyframes cardUp { to { opacity:1; transform:translateY(0) } }

.login-card h2 { font-size:24px; font-weight:700; color:#2a2a2e; letter-spacing:-0.5px; margin-bottom:6px }
.login-card p  { font-size:14px; color:#777; line-height:1.65; margin-bottom:28px }

.google-btn {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:15px 20px;
  background: #e0e0e5;
  color: #2a2a2e;
  border: none; border-radius:16px;
  font-size:15px; font-weight:600; font-family:'Inter',sans-serif;
  cursor:pointer;
  box-shadow: var(--neu-out);
  transition: box-shadow 0.15s;
}
.google-btn:active { box-shadow: var(--neu-in) }
.google-btn svg { width:20px; height:20px; flex-shrink:0 }

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#s-app { background:var(--bg); flex-direction:column }

/* TOPBAR */
.topbar {
  background: var(--bg);
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px;
  padding-top: calc(env(safe-area-inset-top,0px) + 14px);
  flex-shrink:0;
  box-shadow: 0 3px 10px rgba(0,0,0,0.07);
}
body.dark .topbar { box-shadow: 0 3px 10px rgba(0,0,0,0.3) }

.tb-brand { display:flex; align-items:center; gap:2px }
.tb-brand-text { font-size:16px; font-weight:700; letter-spacing:0.5px; color:var(--text) }
.tb-brand-red { color:var(--red) }

.tb-right { display:flex; align-items:center; gap:12px }
.tb-title { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--text3) }
.tb-avatar {
  width:32px; height:32px; border-radius:50%;
  border:2px solid var(--red); object-fit:cover;
  box-shadow: var(--neu-xs);
}

/* PAGE WRAP */
.page-wrap { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; padding-bottom:90px }

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
.dash-header { margin-bottom:22px; padding: 0 2px }
.dash-eyebrow { font-size:10px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--text3); margin-bottom:5px }
.dash-name { font-size:24px; font-weight:700; color:var(--text); letter-spacing:-0.5px; line-height:1.2 }
.dash-date { font-size:12px; color:var(--text2); margin-top:4px }

/* MODULE GRID */
.mod-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px }

.mod-card {
  background: var(--bg);
  border-radius: 18px;
  box-shadow: var(--neu-out);
  padding: 18px 14px;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.1s;
}
.mod-card:active {
  box-shadow: var(--neu-in);
  transform: scale(0.98);
}
.mod-card.wide { grid-column:span 2; display:flex; align-items:center; gap:16px; padding:16px 18px }
.mod-card.wide .mod-icon-box { margin-bottom:0; flex-shrink:0 }
.mod-card.wide .mod-value { font-size:22px }

.mod-icon-box {
  width:38px; height:38px;
  border-radius:12px;
  background: var(--bg);
  box-shadow: var(--neu-xs);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:12px;
}
.mod-icon-box svg { width:18px; height:18px }

.mod-label { font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:5px }
.mod-value { font-size:28px; font-weight:700; color:var(--red); line-height:1; letter-spacing:-1px }
.mod-sub { font-size:10px; color:var(--text3); margin-top:2px }

/* ═══════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════ */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg);
  padding:10px 20px calc(10px + env(safe-area-inset-bottom,0px));
  display:flex; align-items:center; justify-content:space-around;
  box-shadow: 0 -3px 14px rgba(0,0,0,0.07);
  z-index:40;
}
body.dark .bottom-nav { box-shadow: 0 -3px 14px rgba(0,0,0,0.4) }

.bnav {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  font-size:9px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
  color:var(--text3); cursor:pointer; border:none; background:none;
  font-family:'Inter',sans-serif;
}
.bnav.active { color:var(--red) }

.bnav-icon {
  width:42px; height:42px;
  border-radius:14px;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  transition: box-shadow 0.2s;
}
.bnav:not(.active) .bnav-icon { box-shadow: var(--neu-sm) }
.bnav.active .bnav-icon { box-shadow: var(--neu-in) }

/* ═══════════════════════════════════════
   STATES
═══════════════════════════════════════ */
.toast {
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom,0px));
  left:50%; transform:translateX(-50%);
  background:var(--bg); border-radius:14px;
  box-shadow: var(--neu-out);
  border-left:3px solid var(--red);
  padding:13px 22px; font-size:13px; font-weight:500; color:var(--text);
  z-index:300; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.toast.show { opacity:1 }

/* PULL TO REFRESH */
.ptr-indicator {
  position: fixed;
  top: calc(env(safe-area-inset-top,0px) + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--bg);
  border-radius: 50%;
  width: 40px; height: 40px;
  box-shadow: var(--neu-out);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  transition: transform 0.2s ease;
  pointer-events: none;
}
.ptr-indicator.visible {
  transform: translateX(-50%) translateY(0px);
}
.ptr-spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--text3);
  border-top-color: var(--red);
  border-radius: 50%;
}
.ptr-spinner.spinning {
  animation: spin 0.7s linear infinite;
}
.ptr-arrow {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  color: var(--red);
  font-size: 18px;
  transition: transform 0.2s ease;
}

</style>
</head>

let token = null;
let isDark = false;

// THEME
function applyTheme(dark) {
  isDark = dark;
  document.body.classList.toggle('dark', dark);
  localStorage.setItem('pedroex-theme', dark ? 'dark' : 'light');
}
applyTheme(localStorage.getItem('pedroex-theme') === 'dark');

(function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  const savedToken = localStorage.getItem('pedroex-token');
  const expiry = localStorage.getItem('pedroex-token-expiry');
  
  // ✅ Add 5-minute buffer para ma-refresh bago mag-expire
  const bufferMs = 5 * 60 * 1000;
  
  if (savedToken && expiry && Date.now() < (parseInt(expiry) - bufferMs)) {
    token = savedToken;
    loadUser();
  } else {
    // ✅ Clear expired token
    localStorage.removeItem('pedroex-token');
    localStorage.removeItem('pedroex-token-expiry');
    document.getElementById('s-login').classList.add('active');
    document.getElementById('s-app').classList.remove('active');
  }
})();

// AUTH
function signIn() {
  if (typeof google === 'undefined' || !google.accounts) {
    showToast('Loading Google Sign-In...');
    setTimeout(signIn, 800);
    return;
  }

  // Check if this is a first-time login
  var hasGranted = localStorage.getItem('pedroex-scope-granted');
  
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(res) {
      if (res.error) { 
        showToast('❌ Login error: ' + res.error); 
        return; 
      }
      
      token = res.access_token;
      const expiresAt = Date.now() + (res.expires_in * 1000);
      localStorage.setItem('pedroex-token', token);
      localStorage.setItem('pedroex-token-expiry', expiresAt);
      localStorage.setItem('pedroex-scope-granted', 'true'); // ✅ Mark as granted
      
      loadUser();
    }
  }).requestAccessToken({ 
    prompt: hasGranted ? '' : 'consent' // ✅ Consent only on first login
  });
}

function initAutoRefresh(onRefresh) {
  setInterval(function() {
    var expiry = parseInt(localStorage.getItem('pedroex-token-expiry') || '0');
    var bufferMs = 10 * 60 * 1000; // 10 min before expiry
    
    // If token expires in less than 10 minutes, re-authenticate silently
    if (token && Date.now() >= (expiry - bufferMs)) {
      if (typeof google !== 'undefined' && google.accounts) {
        google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: function(res) {
            if (!res.error) {
              token = res.access_token;
              const expiresAt = Date.now() + (res.expires_in * 1000);
              localStorage.setItem('pedroex-token', token);
              localStorage.setItem('pedroex-token-expiry', expiresAt);
            }
          }
        }).requestAccessToken({ prompt: '' });
      }
      return;
    }
    
    if (!token || Date.now() >= expiry) return;
    onRefresh(function() {});
  }, 5 * 60 * 1000);
}

function loadUser() {
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(r => {
    if (!r.ok) throw new Error('Auth failed');
    return r.json();
  })
  .then(u => {
    localStorage.setItem('pedroex-name', u.name || '');
    localStorage.setItem('pedroex-email', u.email || '');
    localStorage.setItem('pedroex-picture', u.picture || '');

    document.getElementById('user-avatar').src = u.picture || '';

    // ✅ Switch screens
    document.getElementById('s-login').classList.remove('active');
    document.getElementById('s-app').classList.add('active');
    
    buildDashboard();
    loadDashboardStats();

    // Init pull to refresh
    initPullToRefresh(
      document.querySelector('.page-wrap'),
      function(done) {
        loadDashboardStats();
        setTimeout(done, 1000);
      }
    );

    // Auto refresh
    initAutoRefresh(function(done) {
      loadDashboardStats();
      done();
    });

    // Get firstName from Employees sheet
    var email = (u.email || '').toLowerCase();
    fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Employees!A2:D', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      var rows   = res.values || [];
      var empRow = rows.find(function(r) { return (r[0]||'').toLowerCase() === email; });
      
      var firstName = empRow ? (empRow[1] || u.given_name || 'team') : (u.given_name || 'team');
      
      // ✅ I-save ang role sa localStorage
      var role = empRow ? (empRow[3] || 'Employee') : 'Employee';
      localStorage.setItem('pedroex-role', role);

      updateGreeting(firstName);
    })
    .catch(function() {
      updateGreeting(u.given_name || 'team');
    });
  })
  .catch(function(err) { 
    console.error('Load user error:', err);
    
    // ✅ Clear invalid token and show login
    localStorage.removeItem('pedroex-token');
    localStorage.removeItem('pedroex-token-expiry');
    
    document.getElementById('s-login').classList.add('active');
    document.getElementById('s-app').classList.remove('active');
    
    showToast('❌ Session expired. Please sign in again.');
  });
}

function updateGreeting(firstName) {
  var now = new Date();
  var h   = now.getHours();
  var gr  = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  
  document.getElementById('dash-name').textContent = gr + ', ' + firstName + '!';
  document.getElementById('dash-date').textContent = now.toLocaleDateString('en-PH', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  });
}

// DASHBOARD
function buildDashboard() {
  const userRole = (localStorage.getItem('pedroex-role') || 'Employee').toLowerCase();
  const isAdmin = userRole === 'admin';
  
  // ✅ Filter modules based on role
  const visibleModules = ALL_MODULES.filter(m => {
    if (m.adminOnly && !isAdmin) return false;
    return true;
  });
  
  document.getElementById('mod-grid').innerHTML = visibleModules.map(m => {
    const icon = ICONS[m.icon] || '';
    const onclick = m.link ? `location.href='${m.link}'` : '';
    
    if (m.wide) {
      return `<div class="mod-card wide" onclick="${onclick}">
        <div class="mod-icon-box">${icon}</div>
        <div>
          <div class="mod-label">${m.label}</div>
          <div class="mod-value" id="${m.stat}">—</div>
          <div class="mod-sub">${m.sub}</div>
        </div>
      </div>`;
    }
    
    return `<div class="mod-card" onclick="${onclick}">
      <div class="mod-icon-box">${icon}</div>
      <div class="mod-label">${m.label}</div>
      <div class="mod-value" id="${m.stat}">—</div>
      <div class="mod-sub">${m.sub}</div>
    </div>`;
  }).join('');
}

function loadDashboardStats() {
  if (!token) return;
  
  const userRole = (localStorage.getItem('pedroex-role') || 'Employee').toLowerCase();
  const isAdmin = userRole === 'admin';
  
  // Helper function
  function updateStat(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value > 0 ? value : '—';
  }
  
  function updateStatError(id) {
    const el = document.getElementById(id);
    if (el) el.textContent = '—';
  }

  // 1️⃣ TRUCKS
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Truck%20Roster!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const count = (res.values || []).filter(row => row[0]).length;
    updateStat('sv-trucks', count);
  })
  .catch(err => {
    console.error('❌ Trucks load error:', err);
    updateStatError('sv-trucks');
  });

  // 2️⃣ TRIPS (today's trips)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Trips!A2:B', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const today = new Date().toISOString().split('T')[0];
    const rows = res.values || [];
    const todayTrips = rows.filter(row => row[1] === today).length;
    updateStat('sv-trips', todayTrips);
  })
  .catch(err => {
    console.error('❌ Trips load error:', err);
    updateStatError('sv-trips');
  });

  // 3️⃣ MANPOWER ROSTER (today's assignments)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Manpower%20Roster!A2:D', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const today = new Date().toISOString().split('T')[0];
    const rows = res.values || [];
    const activeToday = rows.filter(row => row[0] === today).length;
    updateStat('sv-manpower', activeToday);
  })
  .catch(err => {
    console.error('❌ Manpower load error:', err);
    updateStatError('sv-manpower');
  });

  // 4️⃣ EMPLOYEES (total count)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Employees!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const count = (res.values || []).filter(row => row[0]).length;
    updateStat('sv-emp', count);
  })
  .catch(err => {
    console.error('❌ Employees load error:', err);
    updateStatError('sv-emp');
  });

  // 5️⃣ ATTENDANCE (today's logs)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Attendance!A2:B', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const today = new Date().toISOString().split('T')[0];
    const rows = res.values || [];
    const todayLogs = rows.filter(row => row[0] === today).length;
    updateStat('sv-attend', todayLogs);
  })
  .catch(err => {
    console.error('❌ Attendance load error:', err);
    updateStatError('sv-attend');
  });

  // 6️⃣ EMPLOYEE RECORDS (total 201 files)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Employee%20Records!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const count = (res.values || []).filter(row => row[0]).length;
    updateStat('sv-records', count);
  })
  .catch(err => {
    console.error('❌ Employee Records load error:', err);
    updateStatError('sv-records');
  });

  // 7️⃣ MATRIX (total entries)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Matrix!A2:A', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(r => r.json())
  .then(res => {
    const count = (res.values || []).filter(row => row[0]).length;
    updateStat('sv-matrix', count);
  })
  .catch(err => {
    console.error('❌ Matrix load error:', err);
    updateStatError('sv-matrix');
  });

  // 8️⃣ EXPENSES (Admin: pending count | Employee: user's total)
  if (isAdmin) {
    // Admin: Count pending expenses
    fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Expenses!A2:E', {
      headers: {'Authorization': 'Bearer ' + token}
    })
    .then(r => r.json())
    .then(res => {
      const rows = res.values || [];
      const pending = rows.filter(row => (row[4] || '').toLowerCase() === 'pending').length;
      updateStat('sv-exp-admin', pending);
    })
    .catch(err => {
      console.error('❌ Expenses (admin) load error:', err);
      updateStatError('sv-exp-admin');
    });
  } else {
    // Employee: Count own expenses
    const userEmail = (localStorage.getItem('pedroex-email') || '').toLowerCase();
    fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Expenses!A2:E', {
      headers: {'Authorization': 'Bearer ' + token}
    })
    .then(r => r.json())
    .then(res => {
      const rows = res.values || [];
      const myExpenses = rows.filter(row => (row[1] || '').toLowerCase() === userEmail).length;
      updateStat('sv-exp-emp', myExpenses);

      console.error('❌ Expenses (employee) load error:', err);
      updateStatError('sv-exp-emp');
    });
  }

  // 9️⃣ BILLING (unpaid invoices)
  fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Trips!A2:G', {
    headers: {'Authorization': 'Bearer ' + token}

  .then(r => r.json())
  .then(res => {

  .catch(err => {
    console.error('❌ Billing load error:', err);
    updateStatError('sv-billing');
  });

  // 🔟 SETTINGS (just show a static icon or user count)
  updateStat('sv-set', '⚙️');
}

// TOAST
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══ PULL TO REFRESH + AUTO REFRESH ══════════════════
function initPullToRefresh(scrollEl, onRefresh) {
  var startY      = 0;
  var pulling     = false;
  var threshold   = 70;
  var indicator   = document.createElement('div');
  indicator.className = 'ptr-indicator';
  indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>';
  document.body.appendChild(indicator);

  scrollEl.addEventListener('touchstart', function(e) {
    if (scrollEl.scrollTop === 0) {
      startY  = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  scrollEl.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dist = e.touches[0].clientY - startY;
    if (dist < 0) { pulling = false; return; }

    var progress = Math.min(dist / threshold, 1);
    indicator.classList.add('visible');

    var arrow = document.getElementById('ptr-arrow');
    if (arrow) {
      arrow.style.transform = 'rotate(' + (progress * 180) + 'deg)';
      arrow.style.color = progress >= 1 ? 'var(--red)' : 'var(--text3)';
    }
  }, { passive: true });

  scrollEl.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;

    var dist = e.changedTouches[0].clientY - startY;
    if (dist >= threshold) {
      indicator.innerHTML = '<div class="ptr-spinner spinning"></div>';
      onRefresh(function() {
        indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>';
        indicator.classList.remove('visible');
      });
    } else {
      indicator.classList.remove('visible');
    }
  });
}

function initAutoRefresh(onRefresh) {
  setInterval(function() {
    var expiry = parseInt(localStorage.getItem('pedroex-token-expiry') || '0');
    if (!token || Date.now() >= expiry) return;
    onRefresh(function() {});
  }, 5 * 60 * 1000);
}
